    .answer-check { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 12px; padding: 14px 18px; font-size: 14px; color: #166534; margin-top: 14px; line-height: 1.7; }
    .sol-step { display: flex; gap: 14px; margin-bottom: 18px; align-items: flex-start; }

    @media (max-width:480px) { .content-card { padding: 20px 18px; } .answer-big .val { font-size: 22px; } }

<div id="app">
  <div id="list-view">

<script>
const P = [
  {
    id:'L1-1', cat:'easy', catLabel:'🟢 쉬운',
    title:'$(x+b)(x+c)^2$ 전개',
    sub:'전개 후 각 차수 계수 확인',
    why:'Q20 첫 단계 — 전개 공식을 정확히 적용합니다. 계수비교의 전제.',
    prob:`<p class="prob-body">$(x+3)(x+2)^2$을 전개하여라.</p>`,
    ansVal:'x^3+7x^2+16x+12',
    ansDetail:'$(x+2)^2=x^2+4x+4$. $(x+3)(x^2+4x+4)=x^3+7x^2+16x+12$',
    ansCheck:'$x^2$ 계수: $4+3=7$ ✓. $x$ 계수: $4+12=16$ ✓. 상수: $12$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">먼저 $(x+2)^2$을 전개합니다:</div>
      </div>
      <div class="formula-box">$$(x+2)^2 = x^2+4x+4$$</div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$(x+3)$과 곱합니다:</div>
      </div>
      <div class="formula-box">$$(x+3)(x^2+4x+4) = x^3+4x^2+4x+3x^2+12x+12$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">동류항 정리:</div>
      </div>
      <div class="formula-box">$$= x^3+7x^2+16x+12$$</div>
      <div class="hl-box">📌 일반 공식: $(x+b)(x+c)^2$의 $x^2$ 계수 $= 2c+b$, $x$ 계수 $= c^2+2bc$, 상수 $= bc^2$</div>
    `
  },
  {
    id:'L1-2', cat:'easy', catLabel:'🟢 쉬운',
    title:'계수비교로 미지수 결정',
    sub:'$x^3+ax^2+bx+c=(x-1)(x+2)^2$ → $a,b,c$',
    why:'항등식 계수비교의 핵심 연습. Q20에서 3개 방정식을 세우는 바로 이 단계.',
    prob:`<p class="prob-body">$x^3+ax^2+bx+c = (x-1)(x+2)^2$일 때 $a, b, c$를 구하여라.</p>`,
    ansVal:'a=3,\\ b=0,\\ c=-4',
    ansDetail:'$(x-1)(x^2+4x+4)=x^3+3x^2+0\\cdot x-4$. $a=3, b=0, c=-4$',
    ansCheck:'$b=0$: $x$항 없음 ✓. $c=-4$: 상수항 ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$(x+2)^2=x^2+4x+4$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">전개:</div>
      </div>
      <div class="formula-box">$$(x-1)(x^2+4x+4) = x^3+4x^2+4x-x^2-4x-4 = x^3+3x^2-4$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">계수비교: $a=3$, $b=0$ ($x$항 없음), $c=-4$.</div>
      </div>
      <div class="formula-box">$$a=3, \\ b=0, \\ c=-4$$</div>
    `
  },
  {
    id:'L1-3', cat:'easy', catLabel:'🟢 쉬운',
    title:'$c=4$일 때 $a, b$ 계산',
    sub:'Q20에서 $c=4$를 대입하여 $a, b$ 결정',
    why:'Q20에서 $c$가 결정된 후 $a, b$를 구하는 단계 연습. $a=\\frac{c^3+6}{c^2-2}$ 공식 적용.',
    prob:`<p class="prob-body">$x^3+2ax^2+(6a+2)x+4a+12=(x+b)(x+c)^2$에서 $c=4$일 때 $a$와 $b$를 구하여라.</p>`,
    ansVal:'a=5,\\ b=2',
    ansDetail:'$a=\\dfrac{c^3+6}{c^2-2}=\\dfrac{64+6}{16-2}=5$. $b=2a-2c=10-8=2$',
    ansCheck:'$(x+2)(x+4)^2=x^3+10x^2+32x+32$. $a=5$: 원다항식 $x^3+10x^2+32x+32$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">Q20 풀이에서 도출된 공식: $a=\\dfrac{c^3+6}{c^2-2}$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$c=4$ 대입:</div>
      </div>
      <div class="formula-box">$$a = \\frac{4^3+6}{4^2-2} = \\frac{64+6}{16-2} = \\frac{70}{14} = 5$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$b=2a-2c=10-8=2$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">검산: $(x+2)(x+4)^2=x^3+10x^2+32x+32$. $a=5$: $x^3+10x^2+32x+32$ ✓</div>
      </div>
    `
  },
  {
    id:'M1', cat:'mid', catLabel:'🟡 중간',
    title:'이중근 위치 바꾸기',
    sub:'$p=5, q=8, r=4$ → $(x+b)^2(x+c)$ 구하기',
    why:'이중근의 위치가 바뀐 경우. Q20은 $(x+b)(x+c)^2$이었지만 이번엔 $(x+b)^2(x+c)$.',
    prob:`<p class="prob-body">$x^3+px^2+qx+r = (x+b)^2(x+c)$가 되도록 하는 정수 $b, c$를 구하여라. 단, $p=5, q=8, r=4$.</p>`,
    ansVal:'(b,c)=(2,1)',
    ansDetail:'$2b+c=5$, $b^2+2bc=8$, $b^2c=4$. $c=5-2b$ 대입: $b=2$→$c=1$',
    ansCheck:'$(x+2)^2(x+1)=x^3+5x^2+8x+4$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">전개: $(x+b)^2(x+c) = x^3+(2b+c)x^2+(b^2+2bc)x+b^2c$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">계수비교: $2b+c=5$, $b^2+2bc=8$, $b^2c=4$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$c=5-2b$ 대입: $b^2(5-2b)=5b^2-2b^3=4$.</div>
      </div>
      <div class="case-box">
        <div class="case-label">$b=1$</div>
        $5-2=3 \\ne 4$ ✗
      </div>
      <div class="case-box">
        <div class="case-label">$b=2$</div>
        $20-16=4$ ✓. $c=5-4=1$.
      </div>
      <div class="formula-box">$$(b,c) = (2,1)$$</div>
    `
  },
  {
    id:'M2', cat:'mid', catLabel:'🟡 중간',
    title:'계수에 매개변수 포함',
    sub:'$x^3+ax^2+(2a+1)x+2a=(x+1)(x+c)^2$ → $c$',
    why:'Q20처럼 계수에 $a$가 섞인 경우. 계수비교 후 연립방정식 처리 연습.',
    prob:`<p class="prob-body">$x^3+ax^2+(2a+1)x+2a = (x+1)(x+c)^2$을 만족하는 실수 $a, c$를 구하여라.</p>`,
    ansVal:'c=2\\pm\\sqrt{6}',
    ansDetail:'계수비교 후 $c^2-4c-2=0$ → $c=2\\pm\\sqrt{6}$. $a=2c+1$',
    ansCheck:'$2a=c^2$: $a=2c+1$이면 $c^2=2(2c+1)=4c+2$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">전개: $(x+1)(x+c)^2=x^3+(2c+1)x^2+(c^2+2c)x+c^2$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">계수비교: $a=2c+1$, $2a+1=c^2+2c$, $2a=c^2$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$2a=c^2$과 $a=2c+1$ 연립: $c^2=2(2c+1)=4c+2$.</div>
      </div>
      <div class="formula-box">$$c^2-4c-2=0 \\implies c = \\frac{4 \\pm \\sqrt{24}}{2} = 2\\pm\\sqrt{6}$$</div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">$a = 2c+1$로 결정됨.</div>
      </div>
    `
  },
  {
    id:'M3', cat:'mid', catLabel:'🟡 중간',
    title:'$c=4$ 경우 — 인수분해 완성 + 영점',
    sub:'$(x+2)(x+4)^2$ 완성 → 근 구하기',
    why:'Q20에서 세 $c$값 중 $c=4$ 경우를 완전히 분석합니다.',
    prob:`<p class="prob-body">Q20에서 $c=4$일 때의 인수분해식 $(x+b)(x+c)^2$를 완성하고, 이 다항식의 근을 모두 구하여라.</p>`,
    ansVal:'x=-2\\ (\\text{단순근}),\\ x=-4\\ (\\text{이중근})',
    ansDetail:'$c=4, a=5, b=2$. 인수분해: $(x+2)(x+4)^2$. 근: $x=-2$ (단순), $x=-4$ (이중근)',
    ansCheck:'$(x+2)(x+4)^2=x^3+10x^2+32x+32$. $a=5$: 원다항식 ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">L1-3에서: $c=4, a=5, b=2$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">인수분해: $(x+2)(x+4)^2$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">근 계산:</div>
      </div>
      <div class="case-box">
        <div class="case-label">$x+2=0$</div>
        $x=-2$ (단순근)
      </div>
      <div class="case-box">
        <div class="case-label">$(x+4)^2=0$</div>
        $x=-4$ (이중근 — 그래프가 $x$축에 접함)
      </div>
      <div class="hl-box">📌 이중근: 그래프가 $x$축에 접하며 꺾이지 않고 지나감. 단순근: 그래프가 $x$축을 통과.</div>
    `
  },
  {
    id:'H1', cat:'hard', catLabel:'🔴 어려운',
    title:'$M-m$ 구하기',
    sub:'세 값 19, 11, -1에서 $M-m$',
    why:'Q20에서 $M+m$ 대신 $M-m$을 구합니다. 세 값을 모두 구한 후 최대-최소.',
    prob:`<p class="prob-body">Q20의 설정에서 $a+b+c$의 최댓값을 $M$, 최솟값을 $m$이라 할 때, $M-m$의 값을 구하여라.</p>`,
    ansVal:'20',
    ansDetail:'세 값: $c=2$→19, $c=4$→11, $c=-2$→-1. $M=19$, $m=-1$. $M-m=20$',
    ansCheck:'$M=19$, $m=-1$, $M-m=19-(-1)=20$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">Q20에서 $c \\in \\{2, -2, 4\\}$의 세 $a+b+c$ 값:</div>
      </div>
      <div class="case-box">
        <div class="case-label">$c=2$</div>
        $a=7, b=10$. $a+b+c = 19$
      </div>
      <div class="case-box">
        <div class="case-label">$c=-2$</div>
        $a=-1, b=2$. $a+b+c = -1$
      </div>
      <div class="case-box">
        <div class="case-label">$c=4$</div>
        $a=5, b=2$. $a+b+c = 11$
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$M=19$, $m=-1$.</div>
      </div>
      <div class="formula-box">$$M-m = 19-(-1) = \\mathbf{20}$$</div>
    `
  },
  {
    id:'H2', cat:'hard', catLabel:'🔴 어려운',
    title:'4차 방정식 인수분해',
    sub:'$c^4-6c^3+4c^2+24c-32=0$ 인수분해',
    why:'Q20 풀이의 핵심 — 이 4차 방정식을 스스로 인수분해할 수 있어야 합니다.',
    prob:`<p class="prob-body">$c^4-6c^3+4c^2+24c-32=0$을 인수분해하여라.</p>`,
    ansVal:'(c-2)^2(c+2)(c-4)=0',
    ansDetail:'$c=2$ 이중근. 조립제법 두 번. 나머지 $c^2-2c-8=(c-4)(c+2)$. 근: $c=2, -2, 4$',
    ansCheck:'근: $c=2$ (이중), $c=4$, $c=-2$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">유리근 정리: 상수항 32의 약수 $\\pm1,\\pm2,\\pm4,\\pm8,\\pm16,\\pm32$ 시도.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$c=2$: $16-48+16+48-32=0$ ✓.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">조립제법으로 $(c-2)$ 추출 → $c^3-4c^2-4c+16$. 다시 $c=2$: $8-16-8+16=0$ ✓.</div>
      </div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">두 번째 조립제법 → $c^2-2c-8 = (c-4)(c+2)$.</div>
      </div>
      <div class="formula-box">$$(c-2)^2(c-4)(c+2) = 0$$</div>
      <div class="formula-box">$$c = 2 \\ (\\text{이중근}), \\quad c = 4, \\quad c = -2$$</div>
    `
  },
  {
    id:'H3', cat:'hard', catLabel:'🔴 어려운',
    title:'$a+b+c=11$ 경우 상세 분석',
    sub:'$c=4$ → 원다항식 + $x=1$ 대입',
    why:'Q20에서 $a+b+c=11$인 경우($c=4$)를 완전히 분석합니다. 역방향 탐구.',
    prob:`<p class="prob-body">Q20에서 $a+b+c=11$인 경우의 인수분해식 $(x+b)(x+c)^2$과 원다항식을 구하여라. 또한 이 다항식의 $x=1$에서의 값을 계산하여라.</p>`,
    ansVal:'75',
    ansDetail:'$c=4, a=5, b=2$. 인수분해: $(x+2)(x+4)^2$. $x=1$: $3 \\times 25 = 75$',
    ansCheck:'$(1+2)(1+4)^2=3\\times25=75$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$a+b+c=11$은 $c=4$ 경우 ($7+10+2=19$ ✗, $-1+2+(-2)=-1$ ✗, $5+2+4=11$ ✓).</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$c=4, a=5, b=2$: 인수분해 $(x+2)(x+4)^2$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">원다항식 ($a=5$ 대입): $x^3+10x^2+32x+32$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">$x=1$ 대입:</div>
      </div>
      <div class="formula-box">$$(1+2)(1+4)^2 = 3 \\times 25 = \\mathbf{75}$$</div>
      <div class="hl-box">📌 인수분해된 형태로 직접 대입하는 것이 전개 후 대입보다 빠릅니다.</div>
    `
  }
];

let curIdx = 0, curTab = 'prob', curCat = 'all';

function buildList() {
  document.getElementById('prob-grid').innerHTML = P.map((p,i) =>
    `<div class="prob-card ${p.cat}" id="card-${i}" onclick="openDetail(${i})">
      <div class="card-num">${p.id}</div>
      <div class="card-info"><div class="card-title">${p.title}</div><div class="card-sub">${p.sub}</div></div>
      <div class="card-arrow">›</div>
    </div>`).join('');
}

function filterCat(cat) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  P.forEach((p,i) => document.getElementById('card-'+i).classList.toggle('hidden', cat!=='all' && p.cat!==cat));
}

function openDetail(idx) {
  curIdx = idx; curTab = 'prob';
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  renderDetail();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
}

function switchTab(tab) {
  curTab = tab;
  ['prob','ans','sol'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function moveProblem(dir) {
  curIdx = Math.max(0, Math.min(P.length-1, curIdx+dir));
  curTab = 'prob'; renderDetail();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderDetail() {
  const p = P[curIdx];
  ['prob','ans','sol'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===curTab));
  document.getElementById('detail-title').textContent = `${p.id} — ${p.title}`;
  document.getElementById('btn-prev').disabled = curIdx === 0;
  document.getElementById('btn-next').disabled = curIdx === P.length-1;
  document.getElementById('nav-label').textContent = `${curIdx+1} / ${P.length}`;
  renderContent();
}

function renderContent() {
  const p = P[curIdx];
  const area = document.getElementById('content-area');
  const bc = p.cat==='easy' ? 'badge-easy' : p.cat==='mid' ? 'badge-mid' : 'badge-hard';
  if (curTab==='prob') {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel}</span>${p.prob}`;
  } else if (curTab==='ans') {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel} — 정답</span>
      <div class="why-box">💡 <strong>왜 이 문제인가?</strong><br>${p.why}</div>
      <div class="answer-big"><div class="lbl">정답</div><div class="val">$${p.ansVal}$</div></div>
      <div class="answer-check">✅ ${p.ansDetail}<br><br>🔍 <strong>검산</strong><br>${p.ansCheck}</div>`;
  } else {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel} — 풀이</span><div style="margin-top:16px;">${p.sol}</div>`;
  }
  if (window.renderMathInElement) {
    renderMathInElement(area, {
      delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
      throwOnError: false
    });
  }
}

document.addEventListener('DOMContentLoaded', () => { buildList(); });
</script>
</body>
</html>
