<script>
const P = [
  {
    id: 'L1-1', cat: 'easy', catLabel: '🟢 쉬운',
    title: '직선-포물선 교점 좌표',
    sub: '기울기 $m=2$인 직선과 포물선 교점 B',
    why: 'Q16의 핵심 첫 단계 — 기울기 $m$인 직선과 포물선을 연립해 B 좌표를 구하는 기본 스킬.',
    prob: '<p class="prob-body">$f(x)=\\dfrac{1}{2}x^2-2x$에서 원점을 지나고 기울기 $m=2$인 직선과 $f(x)$ 그래프가 만나는 O 외의 점 $B$의 좌표를 구하여라.</p>',
    ansVal: '$B=(8,16)$',
    ansDetail: '$2x=\\dfrac{1}{2}x^2-2x$ → $x\\left(\\dfrac{1}{2}x-4\\right)=0$ → $x=8$. $y=2\\times8=16$',
    ansCheck: '$f(8)=32-16=16$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">연립: $2x=\\dfrac{1}{2}x^2-2x$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">정리: $x\\left(\\dfrac{1}{2}x-4\\right)=0$ → $x=0$ (O) 또는 $x=8$ (B)</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$y=2\\times8=16$ → $B=(8,16)$</div></div>`
  },
  {
    id: 'L1-2', cat: 'easy', catLabel: '🟢 쉬운',
    title: '직각삼각형 넓이',
    sub: '$O(0,0), B(6,6), D(6,0)$ 삼각형 BOD 넓이',
    why: 'Q16에서 $S_2=2m(m+2)^2$ 계산의 핵심 단계를 별도로 연습합니다.',
    prob: '<p class="prob-body">세 점 $O(0,0)$, $B(6,6)$, $D(6,0)$으로 이루어진 삼각형 $BOD$의 넓이를 구하여라.</p>',
    ansVal: '$18$',
    ansDetail: '밑변 $OD=6$, 높이 $BD=6$. 넓이 $=\\dfrac{1}{2}\\times6\\times6=18$',
    ansCheck: '직각삼각형(D에서 직각) ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">D는 B에서 x축으로 내린 수선의 발 → $\\angle BDO = 90°$, 직각삼각형</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">밑변 $OD=6-0=6$, 높이 $BD=6-0=6$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">넓이 $=\\dfrac{1}{2}\\times6\\times6=18$</div></div>`
  },
  {
    id: 'L1-3', cat: 'easy', catLabel: '🟢 쉬운',
    title: '$m=1$에서 $S_2-S_1$ 직접 계산',
    sub: '$16m^2$ 공식 검증',
    why: 'Q16의 결과 $S_2-S_1=16m^2$을 $m=1$에서 직접 계산해 검산합니다.',
    prob: '<img src="../01_capture/figs/Q16_좌표평면.jpg" alt="Q16 참조도" style="width:100%;max-width:320px;display:block;margin:0 auto 10px;border-radius:8px;"><p class="prob-body">Q16에서 $m=1$일 때 $S_2-S_1$의 값을 구하여라.</p>',
    ansVal: '$16$',
    ansDetail: '$S_2=2(1)(3)^2=18$, $S_1=2(1)(1)^2=2$. $S_2-S_1=16=16\\cdot1^2$ ✓',
    ansCheck: '$B=(6,6), C=(2,-2), D=(6,0), E=(2,0)$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$m=1$: $B=(2(1+2), m(2(m+2)))=(6,6)$, $C=(2(2-1), -(2-1)\\cdot2(2-1))=(2,-2)$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$S_2=\\dfrac{1}{2}\\cdot OD\\cdot BD=\\dfrac{1}{2}\\cdot6\\cdot6=18$, $S_1=\\dfrac{1}{2}\\cdot AE\\cdot CE=\\dfrac{1}{2}\\cdot2\\cdot2=2$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$S_2-S_1=18-2=16=16\\cdot1^2$ ✓</div></div>`
  },
  {
    id: 'M1', cat: 'mid', catLabel: '🟡 중간',
    title: '다른 포물선 적용',
    sub: '$f(x)=x^2-4x$에서 $S$ 최댓값',
    why: 'Q16의 방법을 다른 포물선에 적용합니다. 같은 사고 흐름이 통하는지 확인.',
    prob: '<p class="prob-body">$f(x)=x^2-4x$의 $x$절편 $O(0,0), A(4,0)$. $0\\le m\\le2$에서 직선 $y=mx$ (O 통과)가 $f(x)$와 만나는 O 외의 점 $B$와 수선의 발 $D$로 삼각형 $BOD$의 넓이 $S$를 구하고, 최댓값을 구하여라.</p>',
    ansVal: '$S_{\\max}=36$',
    ansDetail: '$S=\\dfrac{m(m+4)^2}{2}$. $m=2$에서 $S=\\dfrac{2\\cdot36}{2}=36$',
    ansCheck: '$m=2$: $B=(6,12)$, $S=\\dfrac{1}{2}\\cdot6\\cdot12=36$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">연립: $mx=x^2-4x$ → $x(x-m-4)=0$ → $x=m+4$. $B=(m+4,\\ m(m+4))$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$S=\\dfrac{1}{2}\\cdot(m+4)\\cdot m(m+4)=\\dfrac{m(m+4)^2}{2}$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$[0,2]$에서 $S$는 단조증가 → 최댓값은 $m=2$: $S=\\dfrac{2\\cdot36}{2}=36$</div></div>`
  },
  {
    id: 'M2', cat: 'mid', catLabel: '🟡 중간',
    title: '$S_2/S_1$ 비율',
    sub: '$m=1$에서 넓이 비',
    why: 'Q16에서 $S_2-S_1$을 다뤘다면, $S_2/S_1$ 비율을 구하는 문제입니다. 식의 다양한 활용.',
    prob: '<img src="../01_capture/figs/Q16_좌표평면.jpg" alt="Q16 참조도" style="width:100%;max-width:320px;display:block;margin:0 auto 10px;border-radius:8px;"><p class="prob-body">Q16의 설정에서 $m=1$일 때 $\\dfrac{S_2}{S_1}$의 값을 구하여라.</p>',
    ansVal: '$9$',
    ansDetail: '$S_2=18$, $S_1=2$. $S_2/S_1=9$. 일반식: $\\left(\\dfrac{m+2}{2-m}\\right)^2$에 $m=1$: $3^2=9$',
    ansCheck: '$m=1$: $18/2=9$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$m=1$: $S_2=2(1)(3)^2=18$, $S_1=2(1)(1)^2=2$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$\\dfrac{S_2}{S_1}=\\dfrac{18}{2}=9$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">일반 공식: $\\dfrac{S_2}{S_1}=\\dfrac{2m(m+2)^2}{2m(2-m)^2}=\\left(\\dfrac{m+2}{2-m}\\right)^2$. $m=1$: $\\left(\\dfrac{3}{1}\\right)^2=9$ ✓</div></div>`
  },
  {
    id: 'M3', cat: 'mid', catLabel: '🟡 중간',
    title: '$S_1+S_2$ 최솟값',
    sub: '$\\frac{1}{2}\\le m\\le\\frac{3}{2}$에서 합 최솟값',
    why: 'Q16에서 차를 최대화했다면, 합을 최소화합니다. 단조성 분석이 핵심.',
    prob: '<img src="../01_capture/figs/Q16_좌표평면.jpg" alt="Q16 참조도" style="width:100%;max-width:320px;display:block;margin:0 auto 10px;border-radius:8px;"><p class="prob-body">Q16의 설정에서 $S_1+S_2$를 $m$으로 나타내고, $\\dfrac{1}{2}\\le m\\le\\dfrac{3}{2}$에서 최솟값을 구하여라.</p>',
    ansVal: '$\\dfrac{17}{2}$',
    ansDetail: '$S_1+S_2=4m(m^2+4)$. $g\'(m)>0$ (단조증가) → 최솟값: $m=\\dfrac{1}{2}$에서 $4\\cdot\\dfrac{1}{2}\\cdot\\dfrac{17}{4}=\\dfrac{17}{2}$',
    ansCheck: '$4\\cdot0.5\\cdot4.25=8.5=17/2$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$S_1+S_2=2m(2-m)^2+2m(m+2)^2=2m[(2-m)^2+(m+2)^2]=2m\\cdot2(m^2+4)=4m(m^2+4)$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$g(m)=4m(m^2+4)=4m^3+16m$, $g'(m)=12m^2+16>0$ → 구간에서 단조증가</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">최솟값: $m=\\dfrac{1}{2}$에서 $g\\!\\left(\\dfrac{1}{2}\\right)=4\\cdot\\dfrac{1}{2}\\cdot\\left(\\dfrac{1}{4}+4\\right)=2\\cdot\\dfrac{17}{4}=\\dfrac{17}{2}$</div></div>`
  },
  {
    id: 'H1', cat: 'hard', catLabel: '🔴 어려운',
    title: '역산 — $S_2-S_1=9$인 $m$',
    sub: '$16m^2=9$ → $m$ 결정',
    why: '$S_2-S_1$의 값이 주어질 때 $m$을 역으로 찾습니다.',
    prob: '<img src="../01_capture/figs/Q16_좌표평면.jpg" alt="Q16 참조도" style="width:100%;max-width:320px;display:block;margin:0 auto 10px;border-radius:8px;"><p class="prob-body">Q16에서 $S_2-S_1=9$가 되도록 하는 $m$의 값을 $\\dfrac{1}{2}\\le m\\le\\dfrac{3}{2}$ 범위에서 구하여라.</p>',
    ansVal: '$m=\\dfrac{3}{4}$',
    ansDetail: '$16m^2=9$ → $m^2=\\dfrac{9}{16}$ → $m=\\pm\\dfrac{3}{4}$. 범위 내 양수 $m=\\dfrac{3}{4}$',
    ansCheck: '$16\\cdot\\dfrac{9}{16}=9$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$S_2-S_1=16m^2=9$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$m^2=\\dfrac{9}{16}$ → $m=\\pm\\dfrac{3}{4}$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">범위 $\\left[\\dfrac{1}{2}, \\dfrac{3}{2}\\right]$ 내 양수 → $m=\\dfrac{3}{4}$</div></div>`
  },
  {
    id: 'H2', cat: 'hard', catLabel: '🔴 어려운',
    title: '닮음비 분석',
    sub: '두 삼각형 $\\triangle BOD$와 $\\triangle AEC$ 닮음비',
    why: 'Q16에서 두 삼각형의 $S_2/S_1$ 비율은 닮음비의 제곱입니다. 닮음 구조를 탐구합니다.',
    prob: '<img src="../01_capture/figs/Q16_좌표평면.jpg" alt="Q16 참조도" style="width:100%;max-width:320px;display:block;margin:0 auto 10px;border-radius:8px;"><p class="prob-body">Q16에서 두 삼각형 $\\triangle BOD$와 $\\triangle AEC$의 닮음비를 $m$으로 나타내어라.</p>',
    ansVal: '$\\dfrac{m+2}{2-m}$',
    ansDetail: '$OD/AE = 2(m+2)/(2(2-m)) = (m+2)/(2-m)$. 대응변 비 동일 → 닮음비 $=(m+2)/(2-m)$',
    ansCheck: '$m=1$: $3/1=3$, $S_2/S_1=9=3^2$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$B$의 $x$좌표 $=2(m+2)$ → $OD=2(m+2)$. $C$의 $x$좌표 $=2(2-m)$ → $AE=2(2-m)$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">높이 비: $BD/CE = m\\cdot2(m+2)\\ /\\ m\\cdot2(2-m) = (m+2)/(2-m)$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">두 직각삼각형의 두 변 비가 동일 → 닮음비 $=\\dfrac{m+2}{2-m}$</div></div>`
  },
  {
    id: 'H3', cat: 'hard', catLabel: '🔴 어려운',
    title: '삼각형 $OBC$ 넓이',
    sub: '$m=1$에서 $O, B, C$ 세 점 넓이',
    why: 'Q16에서 $B, C$를 이용해 새로운 삼각형의 넓이를 구합니다. 좌표 넓이 공식 응용.',
    prob: '<p class="prob-body">Q16에서 $m=1$일 때 삼각형 $OBC$의 넓이를 구하여라. ($O=(0,0)$, $B=(6,6)$, $C=(2,-2)$)</p>',
    ansVal: '$12$',
    ansDetail: '넓이 $=\\dfrac{1}{2}|0(6-(-2))+6(-2-0)+2(0-6)|=\\dfrac{1}{2}|0-12-12|=12$',
    ansCheck: '행렬식 공식으로 확인 ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">좌표 넓이 공식: $\\dfrac{1}{2}|x_O(y_B-y_C)+x_B(y_C-y_O)+x_C(y_O-y_B)|$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">대입: $\\dfrac{1}{2}|0\\cdot(6-(-2))+6\\cdot(-2-0)+2\\cdot(0-6)|=\\dfrac{1}{2}|0-12-12|$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$=\\dfrac{1}{2}\\cdot24=12$</div></div>`
  }
];

let curIdx=0, curTab='prob', curCat='all';
function buildList(){const grid=document.getElementById('prob-grid');grid.innerHTML=P.map((p,i)=>`<div class="prob-card ${p.cat}" id="card-${i}" onclick="openDetail(${i})"><div class="card-num">${p.id}</div><div class="card-info"><div class="card-title">${p.title}</div><div class="card-sub">${p.sub}</div></div><div class="card-arrow">›</div></div>`).join('');}
function filterCat(cat){curCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');P.forEach((p,i)=>{document.getElementById('card-'+i).classList.toggle('hidden',cat!=='all'&&p.cat!==cat);});}
function openDetail(idx){curIdx=idx;curTab='prob';document.getElementById('list-view').style.display='none';document.getElementById('detail-view').style.display='block';renderDetail();window.scrollTo({top:0,behavior:'smooth'});}
function showList(){document.getElementById('list-view').style.display='block';document.getElementById('detail-view').style.display='none';}
function switchTab(tab){curTab=tab;['prob','ans','sol'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',t===tab);});renderContent();window.scrollTo({top:0,behavior:'smooth'});}
function moveProblem(dir){curIdx=Math.max(0,Math.min(P.length-1,curIdx+dir));curTab='prob';renderDetail();window.scrollTo({top:0,behavior:'smooth'});}
function renderDetail(){const p=P[curIdx];['prob','ans','sol'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===curTab));document.getElementById('detail-title').textContent=`${p.id} — ${p.title}`;document.getElementById('btn-prev').disabled=curIdx===0;document.getElementById('btn-next').disabled=curIdx===P.length-1;document.getElementById('nav-label').textContent=`${curIdx+1} / ${P.length}`;renderContent();}
function renderContent(){const p=P[curIdx];const area=document.getElementById('content-area');const badgeCls=p.cat==='easy'?'badge-easy':p.cat==='mid'?'badge-mid':'badge-hard';if(curTab==='prob'){area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel}</span>${p.prob}`;}else if(curTab==='ans'){area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel} — 정답</span><div class="why-box">💡 <strong>왜 이 문제인가?</strong><br>${p.why}</div><div class="answer-big"><div class="lbl">정답</div><div class="val">${p.ansVal}</div></div><div class="answer-check">✅ ${p.ansDetail}<br><br>🔍 <strong>검산</strong><br>${p.ansCheck}</div>`;}else{area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel} — 풀이</span><div style="margin-top:16px;">${p.sol}</div>`;}if(window.renderMathInElement){renderMathInElement(area,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}}
document.addEventListener('DOMContentLoaded',()=>{buildList();});
</script>
