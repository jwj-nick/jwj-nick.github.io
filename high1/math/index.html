<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math_1_1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5; color: #333; min-height: 100vh;
    }
    header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 24px 20px 16px; }
    .back { font-size: 13px; color: #2563eb; text-decoration: none; display: inline-block; margin-bottom: 10px; }
    .back:hover { text-decoration: underline; }
    header h1 { font-size: 20px; font-weight: 700; }
    header p  { color: #888; font-size: 13px; margin-top: 4px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      padding: 24px 20px;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 18px; text-decoration: none; color: inherit;
      transition: transform 0.12s, box-shadow 0.12s; display: block;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.10); }
    .tag { font-size: 10px; font-weight: 700; letter-spacing: .04em; padding: 2px 8px;
           border-radius: 4px; display: inline-block; margin-bottom: 10px; }
    .tag-mid  { background: #fef3c7; color: #92400e; }
    .tag-prac { background: #f0fdf4; color: #166534; }
    .name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .sub  { font-size: 12px; color: #9ca3af; }
    .section-title {
      grid-column: 1 / -1;
      font-size: 11px; font-weight: 700; color: #6b7280;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 8px 2px 2px;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 2px;
    }
    .section-title:not(:first-child) { margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="../index.html">← 고1 학습 앱</a>
    <h1>Math_1_1</h1>
    <p>1학기 중간고사 오답노트 · 공통수학1</p>
  </header>
  <div class="grid" id="grid"></div>
  <script>
    const apps = [
      { q:'Q12', topic:'다항식 나눗셈', en:'Polynomial Division', base:'1sem_mid_Q12_poly_div' },
      { q:'Q13', topic:'대수 치환',     en:'Algebraic Substitution', base:'1sem_mid_Q13_alg_sub' },
      { q:'Q14', topic:'나머지 정리',   en:'Remainder Theorem', base:'1sem_mid_Q14_remainder_thm' },
      { q:'Q15', topic:'이차함수 범위', en:'Quadratic Range', base:'1sem_mid_Q15_quad_range' },
      { q:'Q16', topic:'이차함수 넓이', en:'Quadratic Area', base:'1sem_mid_Q16_quad_area' },
      { q:'Q17', topic:'삼각형·나머지', en:'Triangle & Remainder', base:'1sem_mid_Q17_tri_remainder' },
      { q:'Q18', topic:'복소수',        en:'Complex Numbers', base:'1sem_mid_Q18_complex_num' },
      { q:'Q19', topic:'접선',          en:'Tangent Line', base:'1sem_mid_Q19_tangent' },
      { q:'Q20', topic:'인수분해',      en:'Factoring', base:'1sem_mid_Q20_factoring' },
    ];
    const grid = document.getElementById('grid');
    grid.innerHTML =
      `<div class="section-title">수행평가</div>` +
      `<a class="card" href="1sem_perf_viete.html">
        <span class="tag tag-perf" style="background:#ede9fe;color:#5b21b6;">수행평가</span>
        <div class="name">비에트 공식 활용</div>
        <div class="sub">Viete's Formulas</div>
      </a>
      <a class="card" href="1sem_perf_bombelli.html">
        <span class="tag tag-perf" style="background:#ede9fe;color:#5b21b6;">수행평가</span>
        <div class="name">봄벨리 — 허수의 발견</div>
        <div class="sub">Rafael Bombelli</div>
      </a>
      <a class="card" href="1sem_perf_cardano.html">
        <span class="tag tag-perf" style="background:#ede9fe;color:#5b21b6;">수행평가</span>
        <div class="name">카르다노 — 삼차방정식</div>
        <div class="sub">Gerolamo Cardano</div>
      </a>
      <a class="card" href="1sem_perf_cayley.html">
        <span class="tag tag-perf" style="background:#ede9fe;color:#5b21b6;">수행평가</span>
        <div class="name">케일리 — 행렬의 아버지</div>
        <div class="sub">Arthur Cayley</div>
      </a>
      <a class="card" href="1sem_perf_pascal.html">
        <span class="tag tag-perf" style="background:#ede9fe;color:#5b21b6;">수행평가</span>
        <div class="name">파스칼 — 확률의 기초</div>
        <div class="sub">Blaise Pascal</div>
      </a>` +
      `<div class="section-title">오답노트</div>` +
      apps.map(a => `
        <a class="card" href="${a.base}.html">
          <span class="tag tag-mid">1학기 중간</span>
          <div class="name">${a.q} ${a.topic}</div>
          <div class="sub">${a.en}</div>
        </a>`).join('') +
      `<div class="section-title">연습문제</div>` +
      apps.map(a => `
        <a class="card" href="${a.base}_practice.html">
          <span class="tag tag-prac">연습문제</span>
          <div class="name">${a.q} ${a.topic}</div>
          <div class="sub">${a.en} · Practice</div>
        </a>`).join('');
  </script>
</body>
</html>
