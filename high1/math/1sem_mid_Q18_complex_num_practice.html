<script>
const P = [
  {
    id:'L1-1', cat:'easy', catLabel:'рҹҹў мү¬мҡҙ',
    title:'мјӨл ҲліөмҶҢмҲҳ кіұ кі„мӮ°',
    sub:'$z\\bar{z} = |z|^2$ кі„мӮ°',
    why:'Q18 мІ« лӢЁкі„ вҖ” $z\\bar{z}$к°Җ л¬ҙм—Үмқём§Җ м •нҷ•нһҲ кі„мӮ°н•©лӢҲлӢӨ. мјӨл ҲліөмҶҢмҲҳ кіұмқҙ н•ӯмғҒ мӢӨмҲҳк°Җ лҗҳлҠ” мқҙмң лҸ„ нҷ•мқён•ҙмҡ”.',
    prob:`<p class="prob-body">$z = 3 - 4i$мқј л•Ң $z\\bar{z}$мқҳ к°’мқ„ кө¬н•ҳм—¬лқј.</p>`,
    ansVal:'25',
    ansDetail:'$z\\bar{z} = (3-4i)(3+4i) = 9+16 = 25$',
    ansCheck:'$z\\bar{z} = |z|^2 = 3^2+4^2 = 25$ вң“',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$\\bar{z} = 3+4i$ (л¶Җнҳёл§Ң л°”лҖң).</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$z\\bar{z}$лҘј кі„мӮ°н•©лӢҲлӢӨ:</div>
      </div>
      <div class="formula-box">$$z\\bar{z} = (3-4i)(3+4i) = 3^2+(4)^2 = 9+16 = 25$$</div>
      <div class="hl-box">рҹ“Ң кіөмӢқ: $(a+bi)(a-bi)=a^2+b^2$. мјӨл Ҳ кіұмқҖ н•ӯмғҒ мӢӨмҲҳ!</div>
    `
  },
  {
    id:'L1-2', cat:'easy', catLabel:'рҹҹў мү¬мҡҙ',
    title:'мһҗм—°мҲҳ мҢҚ $a^2+b^2=10$',
    sub:'$a,b$ мһҗм—°мҲҳмқҙкі  $a^2+b^2=10$мқё мҢҚ кө¬н•ҳкё°',
    why:'Q18м—җм„ң $(a,b)$ мҢҚмқ„ кө¬н•ҳлҠ” н•өмӢ¬ лӢЁкі„мһ…лӢҲлӢӨ. $z_1\\bar{z_1}=5$мқҙл©ҙ $a^2+b^2=5$лҘј н’Җм–ҙм•ј н•ҳлҠ” кө¬мЎ°.',
    prob:`<p class="prob-body">$a^2+b^2=10$мқ„ л§ҢмЎұн•ҳлҠ” мһҗм—°мҲҳ мҢҚ $(a,b)$лҘј лӘЁл‘җ кө¬н•ҳм—¬лқј.</p>`,
    ansVal:'(1,3),\\ (3,1)',
    ansDetail:'$(a,b) = (1,3)$ лҳҗлҠ” $(3,1)$',
    ansCheck:'$1^2+3^2=10$ вң“, $3^2+1^2=10$ вң“',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$a=1$: $b^2=9$ вҶ’ $b=3$ вң“</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$a=2$: $b^2=6$ вҶ’ м •мҲҳ н•ҙ м—ҶмқҢ.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$a=3$: $b^2=1$ вҶ’ $b=1$ вң“</div>
      </div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">$a \\ge 4$: $a^2 \\ge 16 > 10$ вҶ’ л¶Ҳк°Җ.</div>
      </div>
      <div class="formula-box">$$\\therefore (a,b) = (1,3) \\text{ лҳҗлҠ” } (3,1)$$</div>
    `
  },
  {
    id:'L1-3', cat:'easy', catLabel:'рҹҹў мү¬мҡҙ',
    title:'ліөмҶҢмҲҳ л“ұнҳё мЎ°кұҙ',
    sub:'$z_1-z_2=3-2i$ вҶ’ мӢӨмҲҳл¶ҖВ·н—ҲмҲҳл¶Җ к°Ғк°Ғ',
    why:'Q18 г„ҙ нҢҗлі„мқҳ н•өмӢ¬ вҖ” ліөмҶҢмҲҳ л“ұнҳёлҠ” мӢӨмҲҳл¶ҖмҷҖ н—ҲмҲҳл¶Җ к°Ғк°Ғ к°ҷм•„м•ј н•©лӢҲлӢӨ.',
    prob:`<p class="prob-body">$z_1=a+bi$, $z_2=c+di$ ($a,b,c,d$лҠ” мӢӨмҲҳ)м—җ лҢҖн•ҙ $z_1-z_2=3-2i$мқҙл©ҙ $a-c$мҷҖ $b-d$мқҳ к°’мқ„ к°Ғк°Ғ кө¬н•ҳм—¬лқј.</p>`,
    ansVal:'a-c=3,\\ b-d=-2',
    ansDetail:'$a-c=3$, $b-d=-2$',
    ansCheck:'$(a-c)+(b-d)i = 3+(-2)i$ вҶ’ мӢӨмҲҳл¶ҖВ·н—ҲмҲҳл¶Җ к°Ғк°Ғ мқјм№ҳ вң“',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$z_1-z_2 = (a-c)+(b-d)i = 3-2i$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">ліөмҶҢмҲҳ л“ұнҳё: мӢӨмҲҳл¶ҖлҒјлҰ¬, н—ҲмҲҳл¶ҖлҒјлҰ¬ к°ҷмқҢ.</div>
      </div>
      <div class="formula-box">$$a-c = 3, \\ b-d = -2$$</div>
      <div class="hl-box">рҹ“Ң ліөмҶҢмҲҳ $p+qi = r+si$ вҶ” $p=r$ мқҙкі  $q=s$. л‘җ мЎ°кұҙмқ„ н•ӯмғҒ л¶„лҰ¬н•ҙм„ң мӮ¬мҡ©!</div>
    `
  },
  {
    id:'M1', cat:'mid', catLabel:'рҹҹЎ мӨ‘к°„',
    title:'$a^2+b^2=13$ + м°Ё мЎ°кұҙ',
    sub:'$z_1\\bar{z_1}=13$, $z_1-z_2=-6i$ вҶ’ мӢӨмҲҳ+н—ҲмҲҳл¶Җ н•©',
    why:'Q18кіј к°ҷмқҖ кө¬мЎ°м—җм„ң лӘЁл“Ҳлҹ¬мҠӨк°Җ лӢӨлҘј л•Ң. $a^2+b^2=5$вҶ’$13$мңјлЎң мҲ«мһҗл§Ң л°”кҫј ліҖнҳ•.',
    prob:`<p class="prob-body">$z_1=a+bi$ ($a,b$лҠ” мһҗм—°мҲҳ), $z_1\\overline{z_1}=13$мқҙкі  $z_1-z_2=-6i$мқј л•Ң, $z_2$мқҳ мӢӨмҲҳл¶ҖмҷҖ н—ҲмҲҳл¶Җмқҳ н•©мқ„ кө¬н•ҳм—¬лқј.</p>`,
    ansVal:'11',
    ansDetail:'$(a,b)=(2,3)$ лҳҗлҠ” $(3,2)$мқҙл©ҙ $a+b=5$. $z_1-z_2=-6i$вҶ’$c=a$, $d=b+6$. $c+d=11$',
    ansCheck:'$2^2+3^2=13$ вң“. $c+d=a+b+6=5+6=11$ вң“',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$a^2+b^2=13$, мһҗм—°мҲҳ: $(a,b)=(2,3)$ лҳҗлҠ” $(3,2)$. $a+b=5$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$z_1-z_2=-6i$ вҶ’ $(a-c)+(b-d)i=-6i$:</div>
      </div>
      <div class="formula-box">$$a-c=0 \\ (\\Rightarrow c=a), \\quad b-d=-6 \\ (\\Rightarrow d=b+6)$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$c+d = a+(b+6) = a+b+6 = 5+6 = \\mathbf{11}$</div>
      </div>
    `
  },
  {
    id:'M2', cat:'mid', catLabel:'рҹҹЎ мӨ‘к°„',
    title:'$|z_1+z_2|^2=40$ вҶ’ $c^2+d^2$ мөңмҶҹк°’',
    sub:'$(c+1)^2+(d+2)^2=40$м—җм„ң мһҗм—°мҲҳ н•ҙ нғҗмғү',
    why:'Q18 г„·м—җм„ң мӮ¬мҡ©н•ң $(z_1+z_2)(\\overline{z_1+z_2})$ м „к°ңлҘј лӢЁлҸ…мңјлЎң м—°мҠөн•©лӢҲлӢӨ.',
    prob:`<p class="prob-body">$z_1=1+2i$, $z_2=c+di$ ($c,d$лҠ” мһҗм—°мҲҳ), $(z_1+z_2)(\\overline{z_1}+\\overline{z_2})=40$мқј л•Ң $c^2+d^2$мқҳ мөңмҶҹк°’мқ„ кө¬н•ҳм—¬лқј.</p>`,
    ansVal:'17',
    ansDetail:'$(c+1)^2+(d+2)^2=40$. мһҗм—°мҲҳ н•ҙ: $(c,d)=(1,4)$ вҶ’ $c^2+d^2=17$',
    ansCheck:'$(1+1)^2+(4+2)^2=4+36=40$ вң“. $c^2+d^2=1+16=17$ вң“',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$(z_1+z_2)(\\overline{z_1+z_2}) = |z_1+z_2|^2$лҘј м „к°ңн•©лӢҲлӢӨ:</div>
      </div>
      <div class="formula-box">$$|z_1|^2+|z_2|^2+2\\text{Re}(z_1\\bar{z_2}) = 5+(c^2+d^2)+2(c+2d)=40$$</div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">мҷ„м „м ңкіұмӢқмңјлЎң ліҖнҷҳ:</div>
      </div>
      <div class="formula-box">$$(c+1)^2+(d+2)^2 = 40$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$40 = 4+36$: $(c+1,d+2)=(2,6)$ вҶ’ $(c,d)=(1,4)$. $c^2+d^2=17$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">$40=36+4$: $(c+1,d+2)=(6,2)$ вҶ’ $d+2=2$ вҶ’ $d=0$: мһҗм—°мҲҳ м•„лӢҳ вң—.</div>
      </div>
      <div class="formula-box">$$\\text{мөңмҶҹк°’} = \\mathbf{17}$$</div>
    `
  },
  {
    id:'M3', cat:'mid', catLabel:'рҹҹЎ мӨ‘к°„',

      </div>

    title:'$z_2\\bar{z_2}$ мөңлҢ“к°’',

    prob:`<p class="prob-body">$z_1=a+bi$ ($a,b$лҠ” мһҗм—°мҲҳ, $a^2+b^2=5$), $z_2=c+di$ ($c,d$лҠ” мһҗм—°мҲҳ)мқҙкі  $(z_1+z_2)(\\overline{z_1}+\\overline{z_2})=52$мқј л•Ң, $z_2\\overline{z_2}$мқҳ мөңлҢ“к°’мқ„ кө¬н•ҳм—¬лқј.</p>`,

      </div>

let curIdx = 0, curTab = 'prob', curCat = 'all';

function buildList() {
  document.getElementById('prob-grid').innerHTML = P.map((p,i) =>
    `<div class="prob-card ${p.cat}" id="card-${i}" onclick="openDetail(${i})">
      <div class="card-num">${p.id}</div>
      <div class="card-info"><div class="card-title">${p.title}</div><div class="card-sub">${p.sub}</div></div>
      <div class="card-arrow">вҖә</div>
    </div>`).join('');
}

function filterCat(cat) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  P.forEach((p,i) => document.getElementById('card-'+i).classList.toggle('hidden', cat!=='all' && p.cat!==cat));
}

function openDetail(idx) {
  curIdx = idx; curTab = 'prob';
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  renderDetail();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
}

function switchTab(tab) {
  curTab = tab;
  ['prob','ans','sol'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function moveProblem(dir) {
  curIdx = Math.max(0, Math.min(P.length-1, curIdx+dir));
  curTab = 'prob'; renderDetail();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderDetail() {
  const p = P[curIdx];
  ['prob','ans','sol'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===curTab));
  document.getElementById('detail-title').textContent = `${p.id} вҖ” ${p.title}`;
  document.getElementById('btn-prev').disabled = curIdx === 0;
  document.getElementById('btn-next').disabled = curIdx === P.length-1;
  document.getElementById('nav-label').textContent = `${curIdx+1} / ${P.length}`;
  renderContent();
}

function renderContent() {
  const p = P[curIdx];
  const area = document.getElementById('content-area');
  const bc = p.cat==='easy' ? 'badge-easy' : p.cat==='mid' ? 'badge-mid' : 'badge-hard';
  if (curTab==='prob') {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel}</span>${p.prob}`;
  } else if (curTab==='ans') {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel} вҖ” м •лӢө</span>
      <div class="why-box">рҹ’Ў <strong>мҷң мқҙ л¬ём ңмқёк°Җ?</strong><br>${p.why}</div>
      <div class="answer-big"><div class="lbl">м •лӢө</div><div class="val">$${p.ansVal}$</div></div>
      <div class="answer-check">вң… ${p.ansDetail}<br><br>рҹ”Қ <strong>кІҖмӮ°</strong><br>${p.ansCheck}</div>`;
  } else {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel} вҖ” н’Җмқҙ</span><div style="margin-top:16px;">${p.sol}</div>`;
  }
  if (window.renderMathInElement) {
    renderMathInElement(area, {
      delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
      throwOnError: false
    });
  }
}

document.addEventListener('DOMContentLoaded', () => { buildList(); });
</script>
