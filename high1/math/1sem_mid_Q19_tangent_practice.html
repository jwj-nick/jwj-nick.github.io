<script>
const P = [
  {
    id:'L1-1', cat:'easy', catLabel:'🟢 쉬운',
    title:'포물선-직선 접선 $D=0$',
    sub:'$y=x^2-3x+2$가 $y=x+k$에 접할 때 $k$',
    why:'Q19의 핵심 첫 단계 — 판별식 $D=0$으로 접선 조건을 구합니다. 이 패턴이 자유로워야 Q19 전체가 풀립니다.',
    prob:`<p class="prob-body">$y=x^2-3x+2$가 직선 $y=x+k$에 접할 때 $k$의 값을 구하여라.</p>`,
    ansVal:'-2',
    ansDetail:'$x^2-4x+(2-k)=0$에서 $D=16-4(2-k)=8+4k=0$ → $k=-2$',
    ansCheck:'$k=-2$: $x^2-4x+4=(x-2)^2=0$ → 이중근 $x=2$ (접함) ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">연립방정식: $x^2-3x+2=x+k$</div>
      </div>
      <div class="formula-box">$$x^2-4x+(2-k)=0$$</div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">접선 조건: 판별식 $D=0$.</div>
      </div>
      <div class="formula-box">$$D = (-4)^2-4(2-k) = 16-8+4k = 8+4k = 0 \\implies k=-2$$</div>
      <div class="hl-box">📌 핵심: 포물선과 직선이 접함 ↔ 연립 이차방정식의 $D=0$ ↔ 이중근(접점).</div>
    `
  },
  {
    id:'L1-2', cat:'easy', catLabel:'🟢 쉬운',
    title:'위로 볼록 포물선 접선',
    sub:'$y=-x^2+4x+1$이 $y=2x+k$에 접할 때 $k$',
    why:'Q19 두 번째 포물선 처리 연습 — 위로 볼록($-x^2$) 포물선도 같은 $D=0$ 방법으로 처리합니다.',
    prob:`<p class="prob-body">$y=-x^2+4x+1$이 직선 $y=2x+k$에 접할 때 $k$의 값을 구하여라.</p>`,
    ansVal:'2',
    ansDetail:'$x^2-2x-(1-k)=0$. $D=4+4(1-k)=8-4k=0$ → $k=2$',
    ansCheck:'$k=2$: $x^2-2x+1=(x-1)^2=0$ → 이중근 $x=1$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">연립: $-x^2+4x+1=2x+k$ → $-x^2+2x+(1-k)=0$ → $x^2-2x-(1-k)=0$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$D=(-2)^2-4\\cdot(-(1-k))=4+4(1-k)=8-4k=0$ → $k=2$.</div>
      </div>
      <div class="formula-box">$$k = 2$$</div>
      <div class="warn-box">💡 위로 볼록 포물선: $-x^2$이 있으면 양변에 $-1$을 곱해 $x^2$ 계수를 양수로 만든 후 $D$ 계산.</div>
    `
  },
  {
    id:'L1-3', cat:'easy', catLabel:'🟢 쉬운',
    title:'접점 좌표 구하기',
    sub:'$y=x^2-2x-3$과 $y=x+k$ 접점',
    why:'Q19 검산 단계 — 접점을 직접 구합니다. 이중근의 $x$값이 접점의 $x$좌표.',
    prob:`<p class="prob-body">$y=x^2-2x-3$이 직선 $y=x+k$에 접할 때, 접점의 좌표를 구하여라.</p>`,
    ansVal:'\\left(\\tfrac{3}{2},\\ -\\tfrac{15}{4}\\right)',
    ansDetail:'$D=0$ → $k=-\\frac{21}{4}$. 이중근 $x=\\frac{3}{2}$. $y=\\frac{3}{2}-\\frac{21}{4}=-\\frac{15}{4}$',
    ansCheck:'$\\left(\\frac{3}{2}\\right)^2-2\\cdot\\frac{3}{2}-3=\\frac{9}{4}-3-3=-\\frac{15}{4}$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">연립: $x^2-2x-3=x+k$ → $x^2-3x-(3+k)=0$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$D=9+4(3+k)=21+4k=0$ → $k=-\\dfrac{21}{4}$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">이중근 (접점의 $x$좌표): $x=\\dfrac{3}{2}$ (이차방정식의 중근).</div>
      </div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">$y = x+k = \\dfrac{3}{2}-\\dfrac{21}{4} = \\dfrac{6-21}{4} = -\\dfrac{15}{4}$.</div>
      </div>
      <div class="formula-box">$$\\text{접점} = \\left(\\frac{3}{2},\\ -\\frac{15}{4}\\right)$$</div>
    `
  },
  {
    id:'M1', cat:'mid', catLabel:'🟡 중간',
    title:'기울기 2인 접선 방정식',
    sub:'$y=x^2-4x+1$에 기울기 2인 접선',
    why:'Q19에서는 기울기가 1로 고정됐지만, 기울기가 다를 때도 같은 방법이 적용됩니다.',
    prob:`<p class="prob-body">$y=x^2-4x+1$에 접하는 직선의 기울기가 $2$일 때, 이 접선의 방정식을 구하여라.</p>`,
    ansVal:'y=2x-8',
    ansDetail:'접선 $y=2x+c$. $x^2-6x+(1-c)=0$, $D=36-4(1-c)=32+4c=0$ → $c=-8$',
    ansCheck:'접점: $x=3$, $y=9-12+1=-2$. $2(3)-8=-2$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">접선: $y=2x+c$로 설정.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">연립: $x^2-4x+1=2x+c$ → $x^2-6x+(1-c)=0$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$D=36-4(1-c)=32+4c=0$ → $c=-8$.</div>
      </div>
      <div class="formula-box">$$\\text{접선: } y = 2x-8$$</div>
      <div class="hl-box">📌 패턴: 기울기 $m$ 고정 → 접선 $y=mx+c$로 설정 → 연립 → $D=0$으로 $c$ 결정.</div>
    `
  },
  {
    id:'M2', cat:'mid', catLabel:'🟡 중간',
    title:'두 포물선 동시접 — 기울기 탐색',
    sub:'$y=x^2+2$, $y=-2x^2+k$의 공통 접선 기울기 $m$ (양수)',
    why:'Q19 변형 — 직선의 기울기가 1이 아닐 때 두 포물선의 동시접 조건을 적용합니다.',
    prob:`<p class="prob-body">두 이차함수 $y=x^2+2$, $y=-2x^2+k$가 동일한 직선에 동시에 접할 때, 그 직선의 기울기 $m$ (양수)을 구하여라.</p>`,
    ansVal:'2',
    ansDetail:'$y=x^2+2$의 기울기 $m$ 접선: $y=mx-\\frac{m^2}{4}+2$. 이 직선이 $y=-2x^2+k$에도 접 → $m=2$',
    ansCheck:'$m=2$: 접선 $y=2x+1$. $y=x^2+2$: $x^2-2x+1=(x-1)^2=0$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$y=x^2+2$에 기울기 $m$ 접선: $x^2-mx+(2-n)=0$, $D=m^2-4(2-n)=0$ → $n=2-\\dfrac{m^2}{4}$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">이 접선 $y=mx+n$이 $y=-2x^2+k$에도 접:</div>
      </div>
      <div class="formula-box">$$-2x^2+k=mx+n \\implies 2x^2+mx+(n-k)=0, \\ D=m^2-8(n-k)=0$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$y=x^2+2$의 접점 $x_0=m/2$. $y=-2x^2+k$의 접점 $x_1=-m/4$. 접점이 서로 다르므로 $m \\ne 0$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">4</div>
        <div class="sol-text">두 조건 연립하면 $m^2-8(n-k)=0$, $n=2-m^2/4$. $k=n+m^2/8=2-m^2/8$. 양수 기울기 $m$: 실제로 $m=2$ 대입 시 두 포물선 접점이 달리 결정됨을 확인.</div>
      </div>
      <div class="formula-box">$$m = 2$$</div>
    `
  },
  {
    id:'M3', cat:'mid', catLabel:'🟡 중간',
    title:'Q19 설정에서 $mn$ 구하기',
    sub:'$m=-9$, $n=-5$ → $mn$ 계산',
    why:'Q19와 완전히 같은 설정에서 $m+n$ 대신 $mn$을 구합니다. Q19 풀이를 완전히 이해했는지 확인.',
    prob:`<p class="prob-body">두 이차함수 $y=x^2-x-4$와 $y=-x^2+5x+m$이 기울기 $1$인 직선 $y=x+n$에 동시에 접할 때, $mn$의 값을 구하여라.</p>`,
    ansVal:'45',
    ansDetail:'Q19 풀이: $n=-5$, $m=-9$. $mn = (-9) \\times (-5) = 45$',
    ansCheck:'$m=-9$, $n=-5$ → $mn=45$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$y=x^2-x-4$와 $y=x+n$ 접: $x^2-2x-(4+n)=0$.</div>
      </div>
      <div class="formula-box">$$D=4+4(4+n)=20+4n=0 \\implies n=-5$$</div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$y=-x^2+5x+m$과 $y=x+n$ 접: $-x^2+4x+(m-n)=0$ → $x^2-4x-(m-n)=0$.</div>
      </div>
      <div class="formula-box">$$D=16+4(m-n)=0 \\implies m-n=-4 \\implies m=n-4=-9$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$mn = (-9) \\times (-5) = \\mathbf{45}$</div>
      </div>
    `
  },
  {
    id:'H1', cat:'hard', catLabel:'🔴 어려운',
    title:'동시접 역방향 — 접점 조건 분석',
    sub:'두 포물선이 기울기 1인 직선에 접 → 접점이 다를 조건',
    why:'"동시접"이 가능한 조건을 역으로 분석합니다. 접점이 달라야 한다는 조건이 핵심.',
    prob:`<p class="prob-body">두 이차함수 $y=x^2+a$, $y=-x^2+bx+c$가 기울기 $1$인 직선에 동시에 접하고 두 접점이 서로 다를 때, $b$의 값이 될 수 없는 것은?<br>① $0$ &nbsp; ② $1$ &nbsp; ③ $2$ &nbsp; ④ $3$ &nbsp; ⑤ $4$</p>`,
    ansVal:'② 1',
    ansDetail:'$y=x^2+a$의 접점: $x=\\frac{1}{2}$. $y=-x^2+bx+c$의 접점: $x=\\frac{b-1}{2}$. 접점이 다르려면 $\\frac{1}{2} \\ne \\frac{b-1}{2}$ → $b \\ne 1$.',
    ansCheck:'$b=1$이면 두 포물선의 접점 $x$좌표가 같아져 "서로 다른 접점" 조건 위반 ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">$y=x^2+a$에 기울기 1 접선: $x^2+a=x+n$ → $x^2-x+(a-n)=0$.</div>
      </div>
      <div class="formula-box">$$D=1-4(a-n)=0 \\implies \\text{접점} x_0 = \\frac{1}{2}$$</div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">$y=-x^2+bx+c$에 기울기 1 접선: $x^2+(1-b)x+(n-c)=0$.</div>
      </div>
      <div class="formula-box">$$\\text{접점} x_1 = \\frac{b-1}{2}$$</div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">접점이 서로 달라야: $x_0 \\ne x_1$ → $\\dfrac{1}{2} \\ne \\dfrac{b-1}{2}$ → $\\mathbf{b \\ne 1}$.</div>
      </div>
      <div class="formula-box">$$\\therefore b=1 \\text{ 은 불가} \\implies \\text{답: ②}$$</div>
    `
  },
  {
    id:'H2', cat:'hard', catLabel:'🔴 어려운',
    title:'두 접점 연결 직선 기울기',
    sub:'Q19 접점 $P_1(1,-4)$과 $P_2(2,-3)$ 기울기',
    why:'Q19에서 두 접점을 연결한 직선의 기울기가 접선의 기울기와 같다는 흥미로운 성질 확인.',
    prob:`<p class="prob-body">Q19의 설정에서 $y=x^2-x-4$의 접점 $P_1$과 $y=-x^2+5x-9$의 접점 $P_2$를 연결한 직선의 기울기를 구하여라.</p>`,
    ansVal:'1',
    ansDetail:'$P_1=(1,-4)$, $P_2=(2,-3)$. 기울기 $= \\dfrac{-3-(-4)}{2-1} = 1$',
    ansCheck:'두 점 모두 접선 $y=x-5$ 위에 있으므로 $P_1P_2$의 기울기 $=$ 접선 기울기 $=1$ ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">접점 $P_1$: $y=x^2-x-4$와 $y=x-5$ 접점. $x^2-2x+1=(x-1)^2=0$ → $x=1$, $y=-4$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">접점 $P_2$: $y=-x^2+5x-9$와 $y=x-5$ 접점. $-x^2+4x-4=-(x-2)^2=0$ → $x=2$, $y=-3$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">3</div>
        <div class="sol-text">$P_1=(1,-4)$, $P_2=(2,-3)$. 기울기:</div>
      </div>
      <div class="formula-box">$$\\frac{-3-(-4)}{2-1} = \\frac{1}{1} = \\mathbf{1}$$</div>
      <div class="hl-box">📌 두 접점이 모두 같은 접선 $y=x-5$ 위에 있기 때문에 $P_1P_2$ 기울기 $=$ 접선 기울기 = 1. 당연한 결과!</div>
    `
  },
  {
    id:'H3', cat:'hard', catLabel:'🔴 어려운',
    title:'$n$ 범위와 교점 조건',
    sub:'두 점에서 만나려면 $n > -5$',
    why:'$D=0$이 접선 조건이라면 $D>0$은 두 교점 조건. Q19 답 $n=-5$가 경계값임을 확인.',
    prob:`<p class="prob-body">$y=x^2-x-4$와 기울기 $1$인 직선 $y=x+n$이 접하지 않고 두 점에서 만나려면 $n$의 범위는?</p>`,
    ansVal:'n > -5',
    ansDetail:'$x^2-2x-(4+n)=0$. $D=4+4(4+n)=20+4n>0$ → $n>-5$',
    ansCheck:'$n=-5$: $D=0$ 접선 (Q19 답). $n>-5$: $D>0$ 두 교점. $n<-5$: $D<0$ 교점 없음 ✓',
    sol:`
      <div class="sol-step"><div class="sol-num">1</div>
        <div class="sol-text">연립: $x^2-x-4=x+n$ → $x^2-2x-(4+n)=0$.</div>
      </div>
      <div class="sol-step"><div class="sol-num">2</div>
        <div class="sol-text">두 교점 ↔ 이차방정식이 두 실근 ↔ $D>0$:</div>
      </div>
      <div class="formula-box">$$D = 4+4(4+n) = 20+4n > 0 \\implies n > -5$$</div>
      <div class="case-box">
        <div class="case-label">요약</div>
        $n=-5$: $D=0$ → 접선 (Q19)<br>
        $n>-5$: $D>0$ → 두 교점<br>
        $n<-5$: $D<0$ → 교점 없음
      </div>
    `
  }
];

let curIdx = 0, curTab = 'prob', curCat = 'all';

function buildList() {
  document.getElementById('prob-grid').innerHTML = P.map((p,i) =>
    `<div class="prob-card ${p.cat}" id="card-${i}" onclick="openDetail(${i})">
      <div class="card-num">${p.id}</div>
      <div class="card-info"><div class="card-title">${p.title}</div><div class="card-sub">${p.sub}</div></div>
      <div class="card-arrow">›</div>
    </div>`).join('');
}

function filterCat(cat) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  P.forEach((p,i) => document.getElementById('card-'+i).classList.toggle('hidden', cat!=='all' && p.cat!==cat));
}

function openDetail(idx) {
  curIdx = idx; curTab = 'prob';
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  renderDetail();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showList() {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
}

function switchTab(tab) {
  curTab = tab;
  ['prob','ans','sol'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
  renderContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function moveProblem(dir) {
  curIdx = Math.max(0, Math.min(P.length-1, curIdx+dir));
  curTab = 'prob'; renderDetail();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderDetail() {
  const p = P[curIdx];
  ['prob','ans','sol'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===curTab));
  document.getElementById('detail-title').textContent = `${p.id} — ${p.title}`;
  document.getElementById('btn-prev').disabled = curIdx === 0;
  document.getElementById('btn-next').disabled = curIdx === P.length-1;
  document.getElementById('nav-label').textContent = `${curIdx+1} / ${P.length}`;
  renderContent();
}

function renderContent() {
  const p = P[curIdx];
  const area = document.getElementById('content-area');
  const bc = p.cat==='easy' ? 'badge-easy' : p.cat==='mid' ? 'badge-mid' : 'badge-hard';
  if (curTab==='prob') {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel}</span>${p.prob}`;
  } else if (curTab==='ans') {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel} — 정답</span>
      <div class="why-box">💡 <strong>왜 이 문제인가?</strong><br>${p.why}</div>
      <div class="answer-big"><div class="lbl">정답</div><div class="val">$${p.ansVal}$</div></div>
      <div class="answer-check">✅ ${p.ansDetail}<br><br>🔍 <strong>검산</strong><br>${p.ansCheck}</div>`;
  } else {
    area.innerHTML = `<span class="prob-badge ${bc}">${p.catLabel} — 풀이</span><div style="margin-top:16px;">${p.sol}</div>`;
  }
  if (window.renderMathInElement) {
    renderMathInElement(area, {
      delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
      throwOnError: false
    });
  }
}

document.addEventListener('DOMContentLoaded', () => { buildList(); });
</script>
</body>
</html>
