<script>
const P = [
  {
    id: 'L1-1', cat: 'easy', catLabel: '🟢 쉬운',
    title: '{P(x)}² 나머지 → P(3) 합',
    sub: '$\\{P(x)\\}^2$ 을 $x-3$으로 나눈 나머지 25 → $P(3)=\\pm5$',
    why: 'Q14에서 $\\{P(x)\\}^2$을 제수 근에 대입하면 $P$ 값의 제곱이 나옵니다. 이 패턴 자체를 연습합니다.',
    prob: '<p class="prob-body">최고차항의 계수가 1인 이차다항식 $P(x)$에 대해 $\\{P(x)\\}^2$을 $x-3$으로 나눈 나머지가 $25$이다. $P(3)$의 가능한 값의 합을 구하여라.</p>',
    ansVal: '$0$',
    ansDetail: '$\\{P(3)\\}^2=25 \\Rightarrow P(3)=5$ 또는 $-5$. 합 $= 5+(-5)=0$',
    ansCheck: '두 값의 합이 0인 것은 양수+음수 대칭 ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">나머지정리: $x=3$ 대입 → $\\{P(3)\\}^2=25$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$P(3)=5$ 또는 $P(3)=-5$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">가능한 값의 합 $=5+(-5)=0$</div></div>`
  },
  {
    id: 'L1-2', cat: 'easy', catLabel: '🟢 쉬운',
    title: '두 조건으로 P(x) 결정',
    sub: '$P(1)=3$, $P(-1)=1$ → $P(0)$ 계산',
    why: 'Q14에서 나머지정리로 얻은 두 방정식으로 계수를 결정하는 과정을 집중 연습합니다.',
    prob: '<p class="prob-body">최고차항의 계수가 1인 이차다항식 $P(x)$에 대해 $P(1)=3$, $P(-1)=1$이다. $P(0)$의 값을 구하여라.</p>',
    ansVal: '$1$',
    ansDetail: '$P(x)=x^2+bx+c$: $1+b+c=3$, $1-b+c=1$ → $b=1, c=1$. $P(0)=1$',
    ansCheck: '$P(1)=1+1+1=3$ ✓, $P(-1)=1-1+1=1$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$P(x)=x^2+bx+c$로 설정 (최고차항 계수 1)</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">연립방정식: $b+c=2$, $-b+c=0$ → $b=1,\\ c=1$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$P(0)=c=1$</div></div>`
  },
  {
    id: 'L1-3', cat: 'easy', catLabel: '🟢 쉬운',
    title: '$P(0)=P(4)$ → 대칭축',
    sub: '두 점에서 같은 값 → 대칭축 위치',
    why: 'Q14의 조건 (나) "$P(0)\\ne P(6)$"은 대칭축이 $x=3$이 아님을 의미합니다. 이 역방향 문제로 이해를 확인합니다.',
    prob: '<p class="prob-body">최고차항의 계수가 1인 이차다항식 $P(x)$에 대해 $P(0)=P(4)$이다. $P(x)$의 대칭축의 $x$좌표를 구하여라.</p>',
    ansVal: '$2$',
    ansDetail: '$P(x)=x^2+bx+c$: $16+4b=0$ → $b=-4$. 대칭축 $x=-b/2=2$',
    ansCheck: '$P(0)=c$, $P(4)=16-16+c=c$. $P(0)=P(4)$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$P(0)=P(4)$ → $c = 16+4b+c$ → $16+4b=0$ → $b=-4$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">대칭축: $x = -\\dfrac{b}{2} = -\\dfrac{-4}{2} = 2$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">대칭축 $x=2$ 확인: $P(0)=c,\\ P(4)=c$ 동일 ✓</div></div>`
  },
  {
    id: 'M1', cat: 'mid', catLabel: '🟡 중간',
    title: '인수 분해된 P(x)로 Q 나머지 계산',
    sub: '$P(x)=(x-2)(x+1)$ → $\\{P\\}^2$ 을 $(x-3)(x+2)$로 나눈 나머지',
    why: 'P(x)가 이미 인수분해되어 있으면 특정 점 값을 바로 계산할 수 있습니다. Q14의 역방향 연습.',
    prob: '<p class="prob-body">최고차항의 계수가 1이고 $(x-2)(x+1)$로 나누어 떨어지는 이차다항식 $P(x)$가 있다. $\\{P(x)\\}^2$을 $(x-3)(x+2)$로 나눈 나머지를 구하여라.</p>',
    ansVal: '$16$',
    ansDetail: '$P(x)=(x-2)(x+1)$. $P(3)=(1)(4)=4$, $P(-2)=(-4)(-1)=4$. 두 근 모두 나머지 $16$이므로 나머지 $=16$',
    ansCheck: '$4^2=16$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$P(x)=(x-2)(x+1)$ (최고차항 계수 1이고 두 근이 $x=2,\\ x=-1$이므로 유일)</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$P(3)=(3-2)(3+1)=1\\cdot4=4$, $P(-2)=(-2-2)(-2+1)=(-4)(-1)=4$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">두 근에서 $\\{P\\}^2$ 값이 모두 $16$ → 나머지는 상수 $16$</div></div>`
  },
  {
    id: 'M2', cat: 'mid', catLabel: '🟡 중간',
    title: 'Q14 구조 변형 — 제수와 나머지 다름',
    sub: '나머지 4, 조건 $P(0)\\ne P(6)$ → 모든 $Q(4)$ 합',
    why: 'Q14와 완전히 같은 사고 흐름, 숫자만 다릅니다. 방법을 공식처럼 외운 것인지 진짜 이해한 것인지 구분합니다.',
    prob: '<p class="prob-body">최고차항의 계수가 1인 이차다항식 $P(x)$가 다음 조건을 만족시킨다.<br>(가) $\\{P(x)\\}^2$을 $(x-2)(x-4)$로 나눈 나머지가 $4$이다.<br>(나) $P(0) \\ne P(6)$<br>모든 $Q(4)$의 값의 합을 구하여라. (단 $Q$는 조건 (가)의 몫)</p>',
    ansVal: '$8$',
    ansDetail: '유효 경우 $Q(4)$: $0$과 $8$. 합 $=8$',
    ansCheck: '대칭 경우($b=-6$) 탈락 후 남은 두 경우 확인 ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$P(2)=\\pm2,\\ P(4)=\\pm2$ → 4가지 조합. $P(x)=x^2+bx+c$ 연립으로 각 경우의 $b,c$ 결정</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">대칭 경우 ($P(0)=P(6)$ → 대칭축이 $x=3$인 경우, 즉 $b=-6$) 탈락</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">남은 두 경우의 $Q(4)$ 합산: $0+8=8$</div></div>`
  },
  {
    id: 'M3', cat: 'mid', catLabel: '🟡 중간',
    title: '불변량 — P(3)은 c에 무관',
    sub: '$P(1)=c$, $P(5)=-c$ → $P(3)$ 결정',
    why: 'Q14와 같은 구조에서 특정 중간값이 파라미터에 무관한 상수임을 보입니다. 불변량 개념의 핵심.',
    prob: '<p class="prob-body">최고차항의 계수가 1인 이차다항식 $P(x)$에 대해 $P(1)=c$, $P(5)=-c$ ($c>0$)이다. $P(3)$의 값을 구하여라.</p>',
    ansVal: '$-4$',
    ansDetail: '$P(x)=x^2+bx+k$: $b=(-c-12)/2$, $k=(3c+10)/2$. $P(3)=9+3b+k=9-13=-4$',
    ansCheck: '$c$가 사라짐! $P(3)=-4$ ($c$ 무관) ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$P(1)=1+b+k=c$, $P(5)=25+5b+k=-c$ 연립</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">빼면: $4b+24=-2c$ → $b=\\dfrac{-c-12}{2}$, 더하면: $2k=-26+2c+4b$ → $k=\\dfrac{3c+10}{2}$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$P(3)=9+3b+k=9+\\dfrac{-3c-36}{2}+\\dfrac{3c+10}{2}=9+\\dfrac{-26}{2}=9-13=-4$</div></div>`
  },
  {
    id: 'H1', cat: 'hard', catLabel: '🔴 어려운',
    title: '나머지 100 → Q(4) 합',
    sub: '$\\{P\\}^2$ 나머지 100, $P(0)\\ne P(6)$',
    why: 'Q14에서 나머지를 64→100으로 바꾼 버전. 숫자가 커져 계산 정밀도가 더 요구됩니다.',
    prob: '<p class="prob-body">최고차항의 계수가 1인 이차다항식 $P(x)$에 대해:<br>(가) $\\{P(x)\\}^2$을 $(x-1)(x-5)$로 나눈 나머지가 $100$이다.<br>(나) $P(0) \\ne P(6)$<br>모든 $Q(4)$의 합을 구하여라.</p>',
    ansVal: '$44$',
    ansDetail: '두 유효 경우의 $Q(4)$: $12$와 $32$. 합 $=44$',
    ansCheck: '검산: $P(x)=x^2-11x+20$과 $x^2-x-10$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$P(1)=\\pm10,\\ P(5)=\\pm10$ → 4가지 조합으로 $P(x)$ 결정</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">대칭 경우: $P(1)=P(5)$ → 대칭축 $x=3$, 즉 $P(0)=P(6)$ → 탈락</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">남은 두 경우에서 $Q(4)=12$와 $Q(4)=32$ 계산. 합 $=44$</div></div>`
  },
  {
    id: 'H2', cat: 'hard', catLabel: '🔴 어려운',
    title: 'Q(4) 대신 Q(0) 합',
    sub: '$x=0$ 대입으로 $Q(0)$ 계산 — 제수 근 아닌 점',
    why: '제수의 근이 아닌 점에서는 $\\{P(a)\\}^2=(a-1)(a-5)Q(a)+64$를 직접 써서 $Q(a)$를 한 번에 구할 수 있습니다.',
    prob: '<p class="prob-body">Q14 원문 그대로. 모든 $Q(0)$의 값의 합을 구하여라.</p>',
    ansVal: '$42$',
    ansDetail: 'Q14 두 유효 $P(x)$에서 $Q(0)=45$와 $Q(0)=-3$. 합 $=42$',
    ansCheck: '$Q(0)=(P(0)^2-64)/((0-1)(0-5))=(P(0)^2-64)/5$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$x=0$ 대입: $\\{P(0)\\}^2 = (0-1)(0-5)Q(0)+64 = 5Q(0)+64$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$P(0)=17$ 경우: $5Q(0)=289-64=225$ → $Q(0)=45$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$P(0)=-7$ 경우: $5Q(0)=49-64=-15$ → $Q(0)=-3$. 합 $=45+(-3)=42$</div></div>`
  },
  {
    id: 'H3', cat: 'hard', catLabel: '🔴 어려운',
    title: 'Q(4) 소수 → 꼭짓점',
    sub: '소수 조건으로 경우 하나 선택 → 꼭짓점 좌표',
    why: 'Q14의 두 경우 중 소수 조건으로 하나를 선택하고 이차함수 분석으로 연결합니다.',
    prob: '<p class="prob-body">Q14 원문 그대로. $Q(4)$가 소수일 때, $P(x)$의 꼭짓점의 좌표를 구하여라.</p>',
    ansVal: '$(5,\\ -8)$',
    ansDetail: '$Q(4)=5$ (소수) vs $Q(4)=21=3\\times7$ (비소수). $Q(4)=5$인 경우: $P(x)=x^2-10x+17=(x-5)^2-8$',
    ansCheck: '$P(5)=25-50+17=-8$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">Q14 두 유효 경우의 $Q(4)$ 값: $5$와 $21$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">소수 판별: $5$ (소수 ✓), $21=3\\times7$ (합성수 ✗) → $Q(4)=5$인 경우 선택</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">해당 $P(x)=x^2-10x+17=(x-5)^2-8$ → 꼭짓점 $(5,-8)$</div></div>`
  }
];

let curIdx=0, curTab='prob', curCat='all';
function buildList(){const grid=document.getElementById('prob-grid');grid.innerHTML=P.map((p,i)=>`<div class="prob-card ${p.cat}" id="card-${i}" onclick="openDetail(${i})"><div class="card-num">${p.id}</div><div class="card-info"><div class="card-title">${p.title}</div><div class="card-sub">${p.sub}</div></div><div class="card-arrow">›</div></div>`).join('');}
function filterCat(cat){curCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');P.forEach((p,i)=>{document.getElementById('card-'+i).classList.toggle('hidden',cat!=='all'&&p.cat!==cat);});}
function openDetail(idx){curIdx=idx;curTab='prob';document.getElementById('list-view').style.display='none';document.getElementById('detail-view').style.display='block';renderDetail();window.scrollTo({top:0,behavior:'smooth'});}
function showList(){document.getElementById('list-view').style.display='block';document.getElementById('detail-view').style.display='none';}
function switchTab(tab){curTab=tab;['prob','ans','sol'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',t===tab);});renderContent();window.scrollTo({top:0,behavior:'smooth'});}
function moveProblem(dir){curIdx=Math.max(0,Math.min(P.length-1,curIdx+dir));curTab='prob';renderDetail();window.scrollTo({top:0,behavior:'smooth'});}
function renderDetail(){const p=P[curIdx];['prob','ans','sol'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===curTab));document.getElementById('detail-title').textContent=`${p.id} — ${p.title}`;document.getElementById('btn-prev').disabled=curIdx===0;document.getElementById('btn-next').disabled=curIdx===P.length-1;document.getElementById('nav-label').textContent=`${curIdx+1} / ${P.length}`;renderContent();}
function renderContent(){const p=P[curIdx];const area=document.getElementById('content-area');const badgeCls=p.cat==='easy'?'badge-easy':p.cat==='mid'?'badge-mid':'badge-hard';if(curTab==='prob'){area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel}</span>${p.prob}`;}else if(curTab==='ans'){area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel} — 정답</span><div class="why-box">💡 <strong>왜 이 문제인가?</strong><br>${p.why}</div><div class="answer-big"><div class="lbl">정답</div><div class="val">${p.ansVal}</div></div><div class="answer-check">✅ ${p.ansDetail}<br><br>🔍 <strong>검산</strong><br>${p.ansCheck}</div>`;}else{area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel} — 풀이</span><div style="margin-top:16px;">${p.sol}</div>`;}if(window.renderMathInElement){renderMathInElement(area,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}}
document.addEventListener('DOMContentLoaded',()=>{buildList();});
</script>
