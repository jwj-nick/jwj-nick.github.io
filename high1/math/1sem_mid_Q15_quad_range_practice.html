<script>
const P = [
  {
    id: 'L1-1', cat: 'easy', catLabel: '🟢 쉬운',
    title: '꼭짓점 내부 최대·최소',
    sub: '$0\\le x\\le3$, $a=2$ 경우',
    why: 'Q15에서 $a=1,2$ 경우 — 꼭짓점이 구간 내부일 때 최댓값을 양 끝점 중 큰 쪽에서 찾습니다.',
    prob: '<p class="prob-body">$0\\le x\\le3$에서 $f(x)=(x-2)^2+5$의 최댓값 $M$과 최솟값 $m$, 그리고 $M-m$을 구하여라.</p>',
    ansVal: '$M-m=4$',
    ansDetail: '$m=f(2)=5$, $M=\\max(f(0),f(3))=\\max(9,6)=9$. $M-m=4$',
    ansCheck: '$f(0)=4+5=9$, $f(3)=1+5=6$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">꼭짓점 $x=2$가 구간 $[0,3]$ 내부 → 최솟값 $m=f(2)=5$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">끝점 비교: $f(0)=0+4+5=9$, $f(3)=1+5=6$ → 최댓값 $M=9$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$M-m=9-5=4$</div></div>`
  },
  {
    id: 'L1-2', cat: 'easy', catLabel: '🟢 쉬운',
    title: '꼭짓점 오른쪽 밖',
    sub: '꼭짓점 $x=5>3$ → 단조감소 구간',
    why: 'Q15에서 $a=4$ 경우 — 꼭짓점이 구간 오른쪽 밖이면 최솟값이 오른쪽 끝입니다.',
    prob: '<p class="prob-body">$0\\le x\\le3$에서 $f(x)=(x-5)^2+2$의 최댓값 $M$과 최솟값 $m$을 구하여라.</p>',
    ansVal: '$M=27,\\ m=6$',
    ansDetail: '꼭짓점 $x=5>3$ → 단조감소. $M=f(0)=27$, $m=f(3)=6$',
    ansCheck: '$f(0)=25+2=27$, $f(3)=4+2=6$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">꼭짓점 $x=5$가 구간 $[0,3]$ 오른쪽 밖 → 구간 내에서 $f$는 단조감소</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">최댓값: 왼쪽 끝 $M=f(0)=25+2=27$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">최솟값: 오른쪽 끝 $m=f(3)=4+2=6$</div></div>`
  },
  {
    id: 'L1-3', cat: 'easy', catLabel: '🟢 쉬운',
    title: '$M-m$이 $b$에 무관함',
    sub: '$a=1$ 고정, $b$ 자연수 → $M-m$ 계산',
    why: '$M-m$이 $b$에 무관하다는 사실을 직접 확인합니다. Q15에서 $a$만 알면 $M-m$이 결정됩니다.',
    prob: '<p class="prob-body">$0\\le x\\le3$에서 $f(x)=(x-1)^2+3b$ ($b$는 자연수)의 $M-m$을 구하여라.</p>',
    ansVal: '$4$',
    ansDetail: '$a=1$이면 $m=3b$, $M=4+3b$. $M-m=4$ ($b$ 무관)',
    ansCheck: '$f(1)=3b$, $f(0)=1+3b$, $f(3)=4+3b$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">꼭짓점 $x=1$이 $[0,3]$ 내부 → 최솟값 $m=f(1)=3b$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">끝점: $f(0)=1+3b$, $f(3)=4+3b$ → 최댓값 $M=4+3b$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$M-m=(4+3b)-3b=4$ ($b$ 무관!)</div></div>`
  },
  {
    id: 'M1', cat: 'mid', catLabel: '🟡 중간',
    title: '구간 확장 $[0,4]$',
    sub: '$M\\le20$, $m\\ge4$ → 순서쌍 개수',
    why: 'Q15와 동일 구조, 구간이 $[0,4]$로 확장. $a$ 범위와 경우 분류가 달라집니다.',
    prob: '<p class="prob-body">두 자연수 $a,b$에 대해 $0\\le x\\le4$에서 $f(x)=(x-a)^2+2b$의 $M\\le20$, $m\\ge4$를 만족하는 순서쌍 $(a,b)$의 개수를 구하여라.</p>',
    ansVal: '$14$',
    ansDetail: '$a=1$: 4개, $a=2$: 5개, $a=3$: 4개, $a=4$: 1개. 합 $14$',
    ansCheck: '$a=2, b=6$: $M=8+12=20\\le20$ ✓, $m=2b=12\\ge4$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$a=1$: $m=2b\\ge4$ → $b\\ge2$, $M=16+2b\\le20$ → $b\\le2$. $b=2$ 뿐. 단, $a$ 경우별 끝점 비교로 $M$ 결정 필요. 결과 4개</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$a=2$: $m=2b$, $M=\\max(4+2b, 8+2b)=8+2b\\le20$ → $b\\le6$, $m=2b\\ge4$ → $b\\ge2$. $b\\in[2,6]$ → 5개</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$a=3$: 4개, $a=4$: 1개. 총합 $4+5+4+1=14$</div></div>`
  },
  {
    id: 'M2', cat: 'mid', catLabel: '🟡 중간',
    title: '최솟값 역산',
    sub: '$m=12$, $a=3$ → $M$ 결정',
    why: 'Q15의 역방향 — 최솟값이 주어졌을 때 파라미터를 결정하는 연습입니다.',
    prob: '<p class="prob-body">$0\\le x\\le3$에서 $f(x)=(x-3)^2+3b$ ($b$ 자연수)의 최솟값 $m=12$일 때, 최댓값 $M$을 구하여라.</p>',
    ansVal: '$21$',
    ansDetail: '$a=3$이면 $m=f(3)=3b=12$ → $b=4$. $M=f(0)=9+12=21$',
    ansCheck: '$f(3)=0+12=12$ ✓, $f(0)=9+12=21$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">꼭짓점 $x=3$이 구간 오른쪽 끝 → 최솟값 $m=f(3)=3b$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$3b=12$ → $b=4$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">최댓값: $M=f(0)=9+3\\cdot4=21$</div></div>`
  },
  {
    id: 'M3', cat: 'mid', catLabel: '🟡 중간',
    title: '개수 10개인 $M_0$ 최솟값',
    sub: '조건 만족 개수 = 10 → $M_0$',
    why: 'Q15의 조건 상한 $M\\le M_0$를 파라미터로 놓고 누적 개수를 추적합니다. 경우 분류의 응용.',
    prob: '<p class="prob-body">$0\\le x\\le3$에서 $f(x)=(x-a)^2+3b$ ($a,b$ 자연수)의 $M\\le M_0$, $m\\ge6$ 순서쌍 개수가 정확히 $10$개가 되는 자연수 $M_0$의 최솟값을 구하여라.</p>',
    ansVal: '$19$',
    ansDetail: '$M_0=19$: $a=1,2$: 각 4개(합8), $a=3$: 2개. 합 10 ✓',
    ansCheck: '$a=1, b=5$: $M=4+15=19\\le19$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$m\\ge6$ 조건: $a=1,2$ → $3b\\ge6$ → $b\\ge2$; $a=3$ → $3b\\ge6$ → $b\\ge2$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$a=1,2$: $M=4+3b\\le M_0$ → $b\\le(M_0-4)/3$. $M_0=19$ → $b\\le5$, $b\\in[2,5]$ → 각 4개</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$a=3$: $M=9+3b\\le19$ → $b\\le3.3$ → $b\\in[2,3]$ → 2개. 총 $4+4+2=10$ ✓</div></div>`
  },
  {
    id: 'H1', cat: 'hard', catLabel: '🔴 어려운',
    title: '구간도 파라미터 $n$',
    sub: '$M=12$ 되는 $n$ 역산',
    why: '구간의 길이가 파라미터가 됩니다. 꼭짓점 위치와 끝점 값을 $n$의 함수로 표현합니다.',
    prob: '<p class="prob-body">자연수 $n$에 대해 $0\\le x\\le n$에서 $f(x)=(x-2)^2+3$의 최댓값이 $12$일 때, $n$의 값을 구하여라.</p>',
    ansVal: '$5$',
    ansDetail: '$(n-2)^2+3=12$ → $(n-2)^2=9$ → $n=5$',
    ansCheck: '$f(5)=9+3=12$ ✓, $f(0)=4+3=7<12$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$n\\ge2$이면 꼭짓점 $x=2$가 구간 내부. 최댓값은 $\\max(f(0), f(n))$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$f(0)=7$, $f(n)=(n-2)^2+3$. 최댓값 $=12$ → $(n-2)^2+3=12$ → $(n-2)^2=9$ → $n-2=3$ → $n=5$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">검산: $f(5)=9+3=12>f(0)=7$ ✓</div></div>`
  },
  {
    id: 'H2', cat: 'hard', catLabel: '🔴 어려운',
    title: '$M+m=25$ 가능한가?',
    sub: '자연수 해가 없음 증명',
    why: 'Q15의 조건을 "$M+m=25$"로 바꾸면 자연수 해가 없습니다. 이를 증명하는 심화 문제.',
    prob: '<p class="prob-body">$0\\le x\\le3$에서 $f(x)=(x-a)^2+3b$ ($a,b$ 자연수)의 $M+m=25$를 만족하는 순서쌍 $(a,b)$의 개수를 구하여라.</p>',
    ansVal: '$0$',
    ansDetail: '각 $a$ 경우에서 $M+m$이 정수 $b$로 25가 될 수 없음을 확인',
    ansCheck: '$a=1,2$: $M+m=4+6b=25$ → $6b=21$ (비정수) ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$a=1,2$ (꼭짓점 내부): $M+m=(4+3b)+3b=4+6b=25$ → $6b=21$ (비정수 → 해 없음)</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$a=3$ (꼭짓점 오른쪽 끝): $M+m=(9+3b)+3b=9+6b=25$ → $6b=16$ (비정수 → 해 없음)</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">$a=4$ (꼭짓점 구간 밖): $M+m=(17+3b)+3b=17+6b=25$ → $6b=8$ (비정수 → 해 없음). 총 개수 $=0$</div></div>`
  },
  {
    id: 'H3', cat: 'hard', catLabel: '🔴 어려운',
    title: '두 함수 동시 최솟값 $\\ge6$',
    sub: '$f$와 $g$ 동시 조건 — 교집합 탐색',
    why: '두 이차함수의 조건을 동시에 만족시키는 파라미터를 구합니다. Q15보다 한 단계 더 복잡한 교집합 탐색.',
    prob: '<p class="prob-body">자연수 $a,b$ ($a\\le b\\le4$)에 대해 $f(x)=(x-a)^2+3b$, $g(x)=(x-b)^2+3a$를 $0\\le x\\le3$에서 정의한다. 두 함수 모두 최솟값이 $6$ 이상이 되는 순서쌍 $(a,b)$의 개수를 구하여라.</p>',
    ansVal: '$6$',
    ansDetail: '$f$의 $m\\ge6$: $3b\\ge6$ → $b\\ge2$, $g$의 $m\\ge6$: $3a\\ge6$ → $a\\ge2$. 교집합: $(2,2),(2,3),(2,4),(3,3),(3,4),(4,4)$ → 6개',
    ansCheck: '$(2,2)$: $f$ 최솟값 $=3\\cdot2=6$ ✓, $g$ 최솟값 $=3\\cdot2=6$ ✓',
    sol: `<div class="sol-step"><div class="sol-num">1</div><div class="sol-text">$f$의 최솟값 $=3b$ (꼭짓점에서), $3b\\ge6$ → $b\\ge2$</div></div>
<div class="sol-step"><div class="sol-num">2</div><div class="sol-text">$g$의 최솟값 $=3a$ (꼭짓점에서), $3a\\ge6$ → $a\\ge2$</div></div>
<div class="sol-step"><div class="sol-num">3</div><div class="sol-text">조건: $a,b\\ge2$, $a\\le b\\le4$. 경우: $(2,2),(2,3),(2,4),(3,3),(3,4),(4,4)$ → 6개</div></div>`
  }
];

let curIdx=0, curTab='prob', curCat='all';
function buildList(){const grid=document.getElementById('prob-grid');grid.innerHTML=P.map((p,i)=>`<div class="prob-card ${p.cat}" id="card-${i}" onclick="openDetail(${i})"><div class="card-num">${p.id}</div><div class="card-info"><div class="card-title">${p.title}</div><div class="card-sub">${p.sub}</div></div><div class="card-arrow">›</div></div>`).join('');}
function filterCat(cat){curCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');P.forEach((p,i)=>{document.getElementById('card-'+i).classList.toggle('hidden',cat!=='all'&&p.cat!==cat);});}
function openDetail(idx){curIdx=idx;curTab='prob';document.getElementById('list-view').style.display='none';document.getElementById('detail-view').style.display='block';renderDetail();window.scrollTo({top:0,behavior:'smooth'});}
function showList(){document.getElementById('list-view').style.display='block';document.getElementById('detail-view').style.display='none';}
function switchTab(tab){curTab=tab;['prob','ans','sol'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',t===tab);});renderContent();window.scrollTo({top:0,behavior:'smooth'});}
function moveProblem(dir){curIdx=Math.max(0,Math.min(P.length-1,curIdx+dir));curTab='prob';renderDetail();window.scrollTo({top:0,behavior:'smooth'});}
function renderDetail(){const p=P[curIdx];['prob','ans','sol'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===curTab));document.getElementById('detail-title').textContent=`${p.id} — ${p.title}`;document.getElementById('btn-prev').disabled=curIdx===0;document.getElementById('btn-next').disabled=curIdx===P.length-1;document.getElementById('nav-label').textContent=`${curIdx+1} / ${P.length}`;renderContent();}
function renderContent(){const p=P[curIdx];const area=document.getElementById('content-area');const badgeCls=p.cat==='easy'?'badge-easy':p.cat==='mid'?'badge-mid':'badge-hard';if(curTab==='prob'){area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel}</span>${p.prob}`;}else if(curTab==='ans'){area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel} — 정답</span><div class="why-box">💡 <strong>왜 이 문제인가?</strong><br>${p.why}</div><div class="answer-big"><div class="lbl">정답</div><div class="val">${p.ansVal}</div></div><div class="answer-check">✅ ${p.ansDetail}<br><br>🔍 <strong>검산</strong><br>${p.ansCheck}</div>`;}else{area.innerHTML=`<span class="prob-badge ${badgeCls}">${p.catLabel} — 풀이</span><div style="margin-top:16px;">${p.sol}</div>`;}if(window.renderMathInElement){renderMathInElement(area,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}}
document.addEventListener('DOMContentLoaded',()=>{buildList();});
</script>
