<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고1 학습 앱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 24px 20px 16px;
    }
    .back { font-size: 13px; color: #2563eb; text-decoration: none; display: inline-block; margin-bottom: 10px; }
    .back:hover { text-decoration: underline; }
    header h1 { font-size: 20px; font-weight: 700; }
    header p  { color: #888; font-size: 13px; margin-top: 4px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 32px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 28px 20px;
      text-decoration: none;
      color: inherit;
      text-align: center;
      transition: transform 0.12s, box-shadow 0.12s;
      display: block;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.10); }
    .icon { font-size: 40px; margin-bottom: 12px; }
    .label { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .sub   { font-size: 12px; color: #9ca3af; }
  </style>
</head>

      <div class="sub">수행평가 · 2 apps</div>
    </a>
    <a class="card" href="math/index.html">

      <div class="label">Math_1_1</div>
      <div class="sub">중간고사 오답노트 · 18 apps</div>
    </a>
    <a class="card" href="society/index.html">

    </a>
    <a class="card" href="history/index.html">

    <a class="card" href="korean/index.html">

    <a class="card" href="english/index.html">
