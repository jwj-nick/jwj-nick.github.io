*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
header{background:#1e293b;color:#fff;padding:10px 18px;display:flex;justify-content:space-between;align-items:center}

 ionSymbol:'Mg²⁺', ionCharge:+2, ionShells:[2,8],
 ionProcess:'전자 2개 잃음 → M껍질 소멸, L껍질 최외각',

 ek:'원자번호 12 | K:2·L:8·M:2 | Mg²⁺→K:2·L:8 | MgO 구성'},

{id:'cl', symbol:'Cl', name:'염소', Z:17, mass:35, type:'nonmetal',

 ionProcess:'전자 1개 얻음 → M껍질 8개(옥텟 완성)',
 dp:['껍질 3개 (K·L·M)','K:2, L:8, M:7','원자가 전자 7개','이온화: Cl⁻ (M껍질 전자 1개 얻음)','Cl⁻는 M껍질 8개로 옥텟 완성'],
 ek:'원자번호 17 | K:2·L:8·M:7 | Cl⁻→K:2·L:8·M:8 | 소금의 음이온'},

{id:'k', symbol:'K', name:'칼륨', Z:19, mass:39, type:'metal',

 ionProcess:'전자 1개 잃음 → N껍질 소멸, M껍질 최외각',
 dp:['껍질 4개 (K·L·M·N)','K:2, L:8, M:8, N:1','원자가 전자 1개','이온화: K⁺ (N껍질 전자 1개 잃음)'],
 ek:'원자번호 19 | K:2·L:8·M:8·N:1 | K⁺→3껍질 | KCl 구성'},

{id:'ca', symbol:'Ca', name:'칼슘', Z:20, mass:40, type:'metal',
 shells:[2,8,8,2], valence:2,

 ek:'원자번호 20 | K:2·L:8·M:8·N:2 | Ca²⁺→3껍질 | 제설제·조개'},

{id:'fe', symbol:'Fe', name:'철', Z:26, mass:56, type:'metal',
 shells:[2,8,14,2], valence:2,

 ionProcess:'전자 3개 잃음 (3d 전자 포함, 가변 원자가)',
 dp:['껍질 4개 (K·L·M·N)','K:2, L:8, M:14(3d 포함), N:2','가변 원자가 (Fe²⁺·Fe³⁺ 모두 가능)','Fe³⁺: Fe₂O₃ 구성 (녹)'],
 ek:'원자번호 26 | 전이금속 | Fe³⁺(산화철) / Fe²⁺ 가변 | 3d 전자 포함'}
];

// ══════════════════════════════════════════
// 원소 색상 팔레트
// ══════════════════════════════════════════
const EC={H:'#6b7280',C:'#374151',N:'#3b82f6',O:'#ef4444',Na:'#f59e0b',Mg:'#8b5cf6',Cl:'#84cc16',K:'#10b981',Ca:'#06b6d4',Fe:'#6b7280'};
function ecolor(sym){return EC[sym]||'#94a3b8'}

// ══════════════════════════════════════════
// Bohr 모델 SVG 렌더러
// ══════════════════════════════════════════
const SHELL_NAMES=['K','L','M','N'];
const SHELL_RADII=[36,68,100,134]; // 껍질 반지름
const SVG_W=300, SVG_H=300, CX=150, CY=150;
const NUCLEUS_R=28;

function bohrSVG(shells, symbol, Z, isIon, ionCharge){
  let o='';
  const nShells=shells.length;
  const totalR=SHELL_RADII[nShells-1]+20;
  const scale=Math.min(1, 140/totalR);
  const sr=SHELL_RADII.map(r=>Math.round(r*scale));
  const nr=Math.round(NUCLEUS_R*scale);

  // 껍질 원
  for(let i=0;i<nShells;i++){
    o+=`<circle cx="${CX}" cy="${CY}" r="${sr[i]}" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="${i>0?'4,3':''}"/>`;
    o+=`<text x="${CX+sr[i]+4}" y="${CY-4}" font-size="9" fill="#94a3b8" font-family="monospace">${SHELL_NAMES[i]}</text>`;
  }

  // 전자 배치
  for(let si=0;si<nShells;si++){
    const n=shells[si];
    const isValenceShell=(si===nShells-1);
    for(let ei=0;ei<n;ei++){
      const ang=(ei/n)*2*Math.PI - Math.PI/2;
      const ex=CX+sr[si]*Math.cos(ang);
      const ey=CY+sr[si]*Math.sin(ang);
      const isValenceElec=isValenceShell;
      const fill=isValenceElec?'#f59e0b':'#64748b';
      const stroke=isValenceElec?'#d97706':'#475569';
      o+=`<circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="5" fill="${fill}" stroke="${stroke}" stroke-width="1"/>`;
    }
  }

  // 원자핵
  const nucColor=EC[symbol]||'#64748b';
  o+=`<circle cx="${CX}" cy="${CY}" r="${nr}" fill="${nucColor}" opacity="0.9"/>`;
  o+=`<text x="${CX}" y="${CY-5}" text-anchor="middle" dominant-baseline="middle" font-size="${symbol.length>1?10:13}" font-weight="700" fill="#fff" font-family="monospace">${symbol}</text>`;
  o+=`<text x="${CX}" y="${CY+9}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="rgba(255,255,255,0.85)" font-family="monospace">${Z}p</text>`;

  // 이온 표시 배지
  if(isIon && ionCharge!==null){
    const chStr=ionCharge>0?`+${ionCharge}`:String(ionCharge);
    const bc=ionCharge>0?'#2563eb':'#dc2626';
    o+=`<rect x="${CX+nr-2}" y="${CY-nr-18}" width="34" height="16" rx="4" fill="${bc}"/>`;
    o+=`<text x="${CX+nr+15}" y="${CY-nr-10}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#fff">${symbol}${ionCharge>0?'⁺'.repeat(ionCharge):'⁻'.repeat(Math.abs(ionCharge))}</text>`;
  }

  return`<svg width="${SVG_W}" height="${SVG_H}" viewBox="0 0 ${SVG_W} ${SVG_H}">${o}</svg>`;
}

// ══════════════════════════════════════════
// 전자 배치 문자열 헬퍼
// ══════════════════════════════════════════
function shellStr(shells){
  return shells.map((n,i)=>`${SHELL_NAMES[i]}:${n}`).join('·');
}

// ══════════════════════════════════════════
// 앱 상태
// ══════════════════════════════════════════
let mode='study', curId='na';
let showIon=false;
let qOrder=[], qIdx=0, qAnswered=false, qType='valence';

function setMode(m){
  mode=m;showIon=false;
  document.getElementById('bs').classList.toggle('active',m==='study');
  document.getElementById('bq').classList.toggle('active',m==='quiz');
  if(m==='quiz'){qOrder=[...E].sort(()=>Math.random()-.5);qIdx=0;qAnswered=false;renderQuiz();}
  else renderStudy();
}

// ══════════════════════════════════════════
// 사이드바
// ══════════════════════════════════════════
function buildSidebar(){
  const metals=E.filter(e=>e.type==='metal');
  const nonmetals=E.filter(e=>e.type==='nonmetal');
  let h='';
  [{t:'nonmetal',l:'🟢 비금속',items:nonmetals},{t:'metal',l:'🔵 금속',items:metals}].forEach(g=>{
    h+=`<div class="gh">${g.l} (${g.items.length})</div>`;
    g.items.forEach(e=>{
      const ac=e.id===curId&&mode==='study'?'active':'';
      h+=`<div class="sitem ${ac} ${e.type}" onclick="sel('${e.id}')">
        <span style="font-weight:600;font-family:monospace;font-size:14px">${e.symbol}</span>
        <span style="font-size:11px;color:var(--muted)">${e.name} <span class="zbadge">Z=${e.Z}</span></span>
      </div>`;
    });
  });
  document.getElementById('sidebar').innerHTML=h;
}

// ══════════════════════════════════════════
// 학습 모드
// ══════════════════════════════════════════
function sel(id){curId=id;showIon=false;mode='study';document.getElementById('bs').classList.add('active');document.getElementById('bq').classList.remove('active');renderStudy();}
function toggleIon(){showIon=!showIon;renderStudy();}

function renderStudy(){
  const e=E.find(x=>x.id===curId)||E[0];
  buildSidebar();
  const hasIon=e.ionSymbol!==null;
  const curShells=showIon&&hasIon?e.ionShells:e.shells;
  const isIon=showIon&&hasIon;

  const svg=bohrSVG(curShells,e.symbol,e.Z,isIon,e.ionCharge);

  // 전자배치 표
  const shellNames=['K','L','M','N'];
  let thRow='<tr><th>껍질</th>',tdAtom='<tr><th>원자</th>',tdIon=hasIon?'<tr><th>이온</th>':'';
  shellNames.forEach((sn,i)=>{
    const hasShell=Math.max(e.shells.length, hasIon?e.ionShells.length:0)>i;
    if(!hasShell)return;
    thRow+=`<th>${sn}</th>`;
    const aN=i<e.shells.length?e.shells[i]:0;
    const iN=hasIon&&i<e.ionShells.length?e.ionShells[i]:0;
    const isVeAtom=(i===e.shells.length-1);
    const isVeIon=hasIon&&(i===e.ionShells.length-1);
    tdAtom+=`<td class="${isVeAtom?'ve-cell':''}">${aN}</td>`;
    if(hasIon)tdIon+=`<td class="${isVeIon?'ve-cell':''}">${iN||'—'}</td>`;
  });
  thRow+='</tr>';tdAtom+='</tr>';if(hasIon)tdIon+='</tr>';

  // 이온 설명
  const ionHTML=hasIon?`
    <div class="card">
      <div class="stitle">이온화 과정</div>
      <div class="ionbox">
        <strong>${e.symbol} (원자)</strong> → <strong>${e.ionSymbol}</strong><br>
        ${e.ionProcess}<br>
        원자 전자배치: ${shellStr(e.shells)}<br>
        이온 전자배치: ${shellStr(e.ionShells)}
      </div>
    </div>`:'';

  const dpHTML=e.dp.map(p=>`<li>${p}</li>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="card-head">
        <span class="esym" style="color:${ecolor(e.symbol)}">${e.symbol}</span>
        <div>
          <div class="ename">${e.name}</div>
          <div class="enum">원자번호 ${e.Z} | 원자량 ${e.mass} | 원자가전자 <strong style="color:#d97706">${e.valence}개</strong></div>
        </div>
        <span class="ebadge ${e.type}">${e.type==='metal'?'금속':'비금속'}</span>
      </div>
      <div style="font-size:12px;color:var(--muted)">전자 배치: <strong>${shellStr(e.shells)}</strong>${hasIon?` → ${e.ionSymbol}: <strong>${shellStr(e.ionShells)}</strong>`:''}</div>
    </div>
    <div class="two">
      <div class="card">
        <div class="stitle">Bohr 모델 (동심원 전자껍질)</div>
        <div class="svgbox">
          ${hasIon?`<div style="display:flex;gap:6px">
            <button class="togbtn ${!showIon?'on':''}" onclick="showIon=false;renderStudy()">원자 ${e.symbol}</button>
            <button class="togbtn ${showIon?'on':''}" onclick="showIon=true;renderStudy()">이온 ${e.ionSymbol}</button>
          </div>`:''}
          ${svg}
          <div class="legend">
            <span><span class="ldot" style="background:#64748b"></span>전자</span>
            <span><span class="ldot" style="background:#f59e0b"></span>원자가 전자</span>
            <span><span class="ldot" style="background:${ecolor(e.symbol)};opacity:.9"></span>원자핵(${e.Z}p)</span>
          </div>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="stitle">전자 배치표</div>
          <table>${thRow}${tdAtom}${hasIon?tdIon:''}</table>
          <div style="font-size:10px;color:#d97706;margin-top:6px">★ 노란색 = 원자가 전자 (최외각)</div>
        </div>
        ${ionHTML}
      </div>
    </div>
    <div class="two">
      <div class="card">
        <div class="stitle">✎ 시험 그림 체크리스트</div>
        <ul class="chk">${dpHTML}</ul>
      </div>
      <div class="card">
        <div class="stitle">⭐ 암기 포인트</div>
        <div class="hook">${e.ek}</div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
// 퀴즈 모드
// ══════════════════════════════════════════
// 퀴즈 유형: valence(원자가전자), shells(껍질수), name(원소이름), ion(이온식)
const QTYPES=[
  {id:'valence', label:'원자가전자 수'},
  {id:'shells',  label:'껍질 수'},
  {id:'name',    label:'원소 이름'},
  {id:'ion',     label:'이온 기호'}
];

function getAnswer(e, qt){
  if(qt==='valence') return String(e.valence)+'개';
  if(qt==='shells')  return String(e.shells.length)+'개';
  if(qt==='name')    return e.name;
  if(qt==='ion')     return e.ionSymbol||'이온 없음';
  return '';
}
function getChoices(e, qt){
  const correct=getAnswer(e,qt);
  let pool=[];
  if(qt==='valence') pool=[1,2,4,5,6,7,8].map(n=>n+'개').filter(x=>x!==correct);
  else if(qt==='shells') pool=['1개','2개','3개','4개'].filter(x=>x!==correct);
  else if(qt==='name') pool=E.map(x=>x.name).filter(x=>x!==correct);
  else if(qt==='ion') pool=E.map(x=>x.ionSymbol||'이온 없음').filter((x,i,a)=>x!==correct&&a.indexOf(x)===i);
  pool=pool.sort(()=>Math.random()-.5).slice(0,3);
  return [correct,...pool].sort(()=>Math.random()-.5);
}

function getQuestion(e, qt){
  if(qt==='valence') return {q:`원자번호 ${e.Z}번 <span style="color:${ecolor(e.symbol)};font-size:20px;font-weight:700">${e.symbol}</span> (${e.name})의<br><strong>원자가 전자 수</strong>는?`,hint:`전자배치: ${shellStr(e.shells)}`};
  if(qt==='shells')  return {q:`원자번호 ${e.Z}번 <span style="color:${ecolor(e.symbol)};font-size:20px;font-weight:700">${e.symbol}</span> (${e.name})의<br><strong>전자 껍질 수</strong>는?`,hint:`전자배치: ${shellStr(e.shells)}`};
  if(qt==='name'){
    // Bohr 모델 표시
    const svg=bohrSVG(e.shells,'?',e.Z,false,null);
    return {q:`이 Bohr 모델의 <strong>원소 이름</strong>은? (원자번호 ${e.Z})`,svg,hint:`원자번호 ${e.Z} | 전자배치: ${shellStr(e.shells)}`};
  }
  if(qt==='ion') return {q:`원자번호 ${e.Z}번 <span style="color:${ecolor(e.symbol)};font-size:20px;font-weight:700">${e.symbol}</span> (${e.name})의<br><strong>이온 기호</strong>는?`,hint:e.ionProcess||'이온을 형성하지 않음'};
  return {q:'',hint:''};
}

function renderQuiz(){
  const e=qOrder[qIdx];
  const qt=qType;
  const {q, svg:qsvg, hint}=getQuestion(e,qt);
  const choices=getChoices(e,qt);
  const correct=getAnswer(e,qt);

  const typeHTML=QTYPES.map(t=>`<button class="qtypbtn ${t.id===qType?'sel':''}" onclick="qType='${t.id}';qAnswered=false;renderQuiz()">${t.label}</button>`).join('');
  const cHTML=choices.map(c=>`<button class="qc" onclick="ansQ('${c}','${correct}')">${c}</button>`).join('');

  document.getElementById('content').innerHTML=`
    <div id="qview">
      <div class="qprog">${qIdx+1} / ${qOrder.length}</div>
      <div style="display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap">${typeHTML}</div>
      <div class="qcard">
        ${qsvg?`<div class="qsvgbox">${qsvg}</div>`:''}
        <div class="qname" style="font-size:16px;margin-bottom:12px">${q}</div>
        <div class="qchoices" id="qch">${cHTML}</div>
        <div class="qrev" id="qrev">
          <strong>정답:</strong> ${correct}<br>
          <strong>전자배치:</strong> ${shellStr(e.shells)}<br>
          ${e.ionSymbol?`<strong>이온:</strong> ${e.ionSymbol} (${e.ionProcess})<br>`:''}
          <strong>암기:</strong> ${e.ek}
        </div>
      </div>
      <div class="qctrl">
        <button class="qbtn sec" onclick="hintQ('${hint}')">💡 힌트</button>
        <button class="qbtn pri" onclick="nextQ()">다음 ▶</button>
      </div>
    </div>`;
}
function ansQ(c,correct){
  if(qAnswered)return;qAnswered=true;
  document.querySelectorAll('.qc').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===c&&c!==correct)b.classList.add('wrong');
  });
  document.getElementById('qrev').classList.add('show');
}
function hintQ(h){
  const el=document.getElementById('qrev');
  el.style.display='block';
  if(!el.classList.contains('show'))el.innerHTML=`<strong>💡 힌트:</strong> ${h}`;
}
function nextQ(){qIdx=(qIdx+1)%qOrder.length;qAnswered=false;renderQuiz();}

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
buildSidebar();renderStudy();
</script>
