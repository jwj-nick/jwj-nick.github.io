<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화학결합 학습앱 — 통합과학1 (시험 5/7)</title>
<style>
:root{--ionic:#2563eb;--cov:#16a34a;--mix:#d97706;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
header{background:#1e293b;color:#fff;padding:10px 18px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:14px;font-weight:700}
.mbtn{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px;margin-left:6px}
.mbtn.active{background:#fff;color:#1e293b}
.layout{display:flex;height:calc(100vh - 44px)}
#sidebar{width:190px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.gh{padding:7px 10px 3px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;border-top:1px solid var(--border);margin-top:4px}
.sitem{padding:5px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;font-size:12px;gap:4px}
.sitem:hover{background:var(--bg)}
.sitem.active{background:var(--bg);font-weight:700}
.sitem.active.ionic{border-left-color:var(--ionic)}
.sitem.active.covalent{border-left-color:var(--cov)}
.sitem.active.mixed{border-left-color:var(--mix)}
.fbadge{font-size:10px;color:var(--muted);font-family:monospace;white-space:nowrap}
#content{flex:1;overflow-y:auto;padding:16px}
.card{background:var(--card);border-radius:8px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.fml{font-size:26px;font-weight:700;font-family:monospace}
.bbadge{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700;color:#fff}
.bbadge.ionic{background:var(--ionic)}.bbadge.covalent{background:var(--cov)}.bbadge.mixed{background:var(--mix)}
.cname{font-size:12px;color:var(--muted)}
.stitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.svgbox{display:flex;justify-content:center;align-items:center;padding:8px 0;min-height:120px}
.steps{list-style:none}
.steps li{padding:4px 0 4px 22px;position:relative;line-height:1.5;font-size:13px}
.steps li::before{content:attr(data-n);position:absolute;left:0;font-weight:700}
.steps.ionic li::before{color:var(--ionic)}.steps.covalent li::before{color:var(--cov)}.steps.mixed li::before{color:var(--mix)}
table{width:100%;border-collapse:collapse}
td,th{padding:5px 8px;border:1px solid var(--border);font-size:12px}
th{background:var(--bg);font-weight:600;text-align:left;width:90px}
.chk{list-style:none}
.chk li{padding:2px 0 2px 18px;position:relative;font-size:12px}
.chk li::before{content:'✎';position:absolute;left:0;color:#f59e0b}
.hook{background:#fef3c7;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:0 6px 6px 0;font-weight:700;font-size:13px}
/* quiz */
#qview{max-width:560px;margin:0 auto}
.qprog{text-align:right;color:var(--muted);font-size:11px;margin-bottom:8px}
.qcard{background:var(--card);border-radius:8px;padding:32px 20px;text-align:center;border:1px solid var(--border);min-height:260px}
.qname{font-size:22px;font-weight:700;margin-bottom:6px}
.qsub{color:var(--muted);font-size:13px;margin-bottom:20px}
.qchoices{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.qc{padding:8px 18px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;background:var(--bg)}
.qc:hover{border-color:#94a3b8}
.qc.correct{background:#dcfce7;border-color:var(--cov);color:#15803d;font-weight:700}
.qc.wrong{background:#fee2e2;border-color:#dc2626;color:#b91c1c}
.qrev{background:var(--bg);border-radius:6px;padding:12px;text-align:left;margin-top:12px;display:none;font-size:13px;line-height:1.8}
.qrev.show{display:block}
.qctrl{display:flex;gap:10px;justify-content:center;margin-top:16px}
.qbtn{padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
.qbtn.pri{background:#1e293b;color:#fff}.qbtn.sec{background:var(--bg);color:var(--text);border:1px solid var(--border)}
/* ── mobile ─────────────────────────────── */
@media(max-width:640px){
  header h1{font-size:12px}
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 44px)}
  #sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);
           display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;flex-shrink:0}
  .gh{display:none}
  .sitem{flex-shrink:0;white-space:nowrap;border-left:none;border-bottom:3px solid transparent;
         padding:10px 14px;font-size:13px}
  .sitem.active{border-left:none;background:transparent;font-weight:700}
  .sitem.active.ionic{border-bottom-color:var(--ionic)}
  .sitem.active.covalent{border-bottom-color:var(--cov)}
  .sitem.active.mixed{border-bottom-color:var(--mix)}
  .fbadge{display:none}
  #content{padding:12px;overflow-y:visible}
  .two{grid-template-columns:1fr}
  .fml{font-size:20px}
  .qcard{padding:20px 14px;min-height:200px}
  .qname{font-size:18px}
}
</style>
</head>

// SVG 렌더러
// ══════════════════════════════════════════
const AC={H:'#e5e7eb',C:'#374151',N:'#3b82f6',O:'#ef4444',Na:'#f59e0b',Mg:'#8b5cf6',Ca:'#06b6d4',K:'#10b981',Cl:'#84cc16',Fe:'#6b7280',default:'#94a3b8'};
const TC={H:'#374151',C:'#fff',N:'#fff',O:'#fff',Na:'#fff',Mg:'#fff',Ca:'#fff',K:'#fff',Cl:'#fff',Fe:'#fff',default:'#fff'};
function ac(s){return AC[s]||AC.default}function tc(s){return TC[s]||TC.default}
function atom(x,y,s,r=22){return`<circle cx="${x}" cy="${y}" r="${r}" fill="${ac(s)}" stroke="#94a3b8" stroke-width="1.5"/><text x="${x}" y="${y+1}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="700" fill="${tc(s)}" font-family="monospace">${s}</text>`}
function lpDots(x,y,n,side='both'){
  const pos=[[0,-32],[0,32],[-32,0],[32,0]];
  const map={left:[0,1,2],right:[0,1,3],top:[2,3,0],bottom:[2,3,1],both:[0,1,2,3]};
  let o='';(map[side]||[0]).slice(0,n).forEach(i=>{const[dx,dy]=pos[i];o+=`<circle cx="${x+dx-4}" cy="${y+dy}" r="3" fill="#1e293b"/><circle cx="${x+dx+4}" cy="${y+dy}" r="3" fill="#1e293b"/>`});return o;
}
function svgDia(p){
  const W=300,H=130,cy=65,x1=80,x2=220,g=p.b===1?0:p.b===2?5:8;
  let bl='';
  if(p.b===1)bl=`<line x1="${x1+24}" y1="${cy}" x2="${x2-24}" y2="${cy}" stroke="#374151" stroke-width="2.5"/>`;
  else if(p.b===2)bl=`<line x1="${x1+24}" y1="${cy-g}" x2="${x2-24}" y2="${cy-g}" stroke="#374151" stroke-width="2.5"/><line x1="${x1+24}" y1="${cy+g}" x2="${x2-24}" y2="${cy+g}" stroke="#374151" stroke-width="2.5"/>`;
  else bl=`<line x1="${x1+24}" y1="${cy-g}" x2="${x2-24}" y2="${cy-g}" stroke="#374151" stroke-width="2.5"/><line x1="${x1+24}" y1="${cy}" x2="${x2-24}" y2="${cy}" stroke="#374151" stroke-width="2.5"/><line x1="${x1+24}" y1="${cy+g}" x2="${x2-24}" y2="${cy+g}" stroke="#374151" stroke-width="2.5"/>`;
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${bl}${p.l1>0?lpDots(x1,cy,p.l1,'left'):''}${p.l2>0?lpDots(x2,cy,p.l2,'right'):''}${atom(x1,cy,p.a1)}${atom(x2,cy,p.a2)}</svg>`;
}
function svgCen(p){
  const W=270,H=270,cx=135,cy=135,R=82;let o='';
  p.lg.forEach(lg=>{
    const rad=(lg.a-90)*Math.PI/180,lx=cx+R*Math.cos(rad),ly=cy+R*Math.sin(rad);
    const dx=lx-cx,dy=ly-cy,len=Math.sqrt(dx*dx+dy*dy),ux=dx/len,uy=dy/len;
    const x1s=cx+24*ux,y1s=cy+24*uy,x2e=lx-22*ux,y2e=ly-22*uy;
    if(lg.b===1)o+=`<line x1="${x1s}" y1="${y1s}" x2="${x2e}" y2="${y2e}" stroke="#374151" stroke-width="2.5"/>`;
    else if(lg.b===2){const px=-uy*5,py=ux*5;o+=`<line x1="${x1s+px}" y1="${y1s+py}" x2="${x2e+px}" y2="${y2e+py}" stroke="#374151" stroke-width="2.5"/><line x1="${x1s-px}" y1="${y1s-py}" x2="${x2e-px}" y2="${y2e-py}" stroke="#374151" stroke-width="2.5"/>`;}
    if(lg.lp>0){const d=lg.a>45&&lg.a<135?'right':lg.a>225&&lg.a<315?'left':lg.a<=45||lg.a>=315?'top':'bottom';o+=lpDots(lx,ly,lg.lp,d);}
    o+=atom(lx,ly,lg.s,20);
  });
  if(p.c.lp>0)o+=lpDots(cx,cy,p.c.lp,'top');
  o+=atom(cx,cy,p.c.s,23);
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${o}</svg>`;
}
function svgIon(p){
  const W=380,H=160;let o='';
  o+=atom(55,70,p.d.s,26);
  o+=`<text x="152" y="72" text-anchor="middle" dominant-baseline="middle" font-size="22" fill="#374151">→</text>`;
  o+=atom(225,50,p.d.s,22);
  o+=`<rect x="198" y="26" width="54" height="22" rx="3" fill="none" stroke="#2563eb" stroke-width="1.5"/>`;
  o+=`<text x="225" y="23" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="700">${p.d.ion} ${p.d.ch}</text>`;
  o+=atom(320,50,p.a.s,22);
  o+=`<rect x="293" y="26" width="54" height="22" rx="3" fill="none" stroke="#dc2626" stroke-width="1.5"/>`;
  o+=`<text x="320" y="23" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="700">${p.a.ion} ${p.a.ch}</text>`;
  o+=`<text x="272" y="55" text-anchor="middle" font-size="18" fill="#374151">+</text>`;
  o+=`<text x="152" y="105" text-anchor="middle" font-size="11" fill="#64748b">e⁻ ${p.n}개 이동 →</text>`;
  if(p.ratio)o+=`<text x="272" y="95" text-anchor="middle" font-size="11" fill="#374151">비율 ${p.ratio}</text>`;
  o+=`<text x="272" y="135" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="700">← 정전기 인력 (이온결합) →</text>`;
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${o}</svg>`;
}
function svgMix(p){
  const W=380,H=130;let o='';
  o+=atom(60,65,p.ion.s,26);
  o+=`<text x="60" y="100" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="700">${p.ion.ion}</text>`;
  o+=`<text x="155" y="55" text-anchor="middle" font-size="10" fill="#2563eb">이온결합</text>`;
  o+=`<line x1="90" y1="65" x2="215" y2="65" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>`;
  o+=`<text x="155" y="78" text-anchor="middle" font-size="13" fill="#2563eb">⟵——⟶</text>`;
  o+=`<rect x="220" y="40" width="148" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>`;
  o+=`<text x="294" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">${p.poly.f}</text>`;
  o+=`<text x="294" y="78" text-anchor="middle" font-size="10" fill="#92400e">${p.poly.in}</text>`;
  o+=`<text x="294" y="115" text-anchor="middle" font-size="10" fill="#d97706" font-weight="700">▲ 내부: 공유결합</text>`;
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${o}</svg>`;
}
function svgChain(p){
  const W=p.at.length*70+40,H=130,cy=65;let o='';
  const xs=p.at.map((_,i)=>35+i*70);
  for(let i=0;i<p.b.length;i++){const x1=xs[i]+23,x2=xs[i+1]-23;
    if(p.b[i]===1)o+=`<line x1="${x1}" y1="${cy}" x2="${x2}" y2="${cy}" stroke="#374151" stroke-width="2.5"/>`;
    else if(p.b[i]===2)o+=`<line x1="${x1}" y1="${cy-5}" x2="${x2}" y2="${cy-5}" stroke="#374151" stroke-width="2.5"/><line x1="${x1}" y1="${cy+5}" x2="${x2}" y2="${cy+5}" stroke="#374151" stroke-width="2.5"/>`;
  }
  p.at.forEach((s,i)=>{if(p.lp[i]>0){const d=i===0?'left':i===p.at.length-1?'right':'top';o+=lpDots(xs[i],cy,p.lp[i],d);}o+=atom(xs[i],cy,s,21);});
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${o}</svg>`;
}
function svgTxt(p){return`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:18px;text-align:center"><div style="font-size:20px;font-family:monospace;font-weight:700;color:#1e293b;margin-bottom:6px">${p.t}</div><div style="font-size:11px;color:#64748b">${p.s}</div></div>`;}
function renderSVG(s){
  const p=s.sp;
  switch(s.sv){
    case'dia':return svgDia(p);case'cen':return svgCen(p);
    case'ionic':return svgIon(p);case'mix':return svgMix(p);
    case'chain':return svgChain(p);case'txt':return svgTxt(p);
    default:return`<div style="text-align:center;font-size:18px;font-family:monospace">${s.f}</div>`;
  }
}

function buildSidebar(){
  const groups=[{t:'ionic',l:'🔵 이온결합'},{t:'covalent',l:'🟢 공유결합'},{t:'mixed',l:'🟡 혼합형'}];
  let h='';
  groups.forEach(g=>{

    items.forEach(s=>{

  });

}

      <div class="qctrl">
        <button class="qbtn sec" onclick="hint()">💡 화학식 힌트</button>
        <button class="qbtn pri" onclick="nextQ()">다음 ▶</button>
      </div>
    </div>`;
}
function ansQ(c,correct){
  if(qAnswered)return;qAnswered=true;
  document.querySelectorAll('.qc').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');else if(b.textContent===c&&c!==correct)b.classList.add('wrong');});
  document.getElementById('qrev').classList.add('show');
}
function hint(){document.getElementById('qsub').textContent='화학식: '+qOrder[qIdx].f;}
function nextQ(){qIdx=(qIdx+1)%qOrder.length;qAnswered=false;renderQuiz();}

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
buildSidebar();renderStudy();
</script>
</body>
</html>
