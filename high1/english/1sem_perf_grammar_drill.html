<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B · Grammar 3종 Drill — 영어 수행평가</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1f2937;line-height:1.55}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:18px 20px}
.back{font-size:13px;color:#2563eb;text-decoration:none}
.back:hover{text-decoration:underline}
h1{font-size:20px;font-weight:700;margin-top:8px}
.subtitle{font-size:12px;color:#9ca3af;margin-top:4px}

.cat-bar{display:flex;gap:6px;padding:14px 20px;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto}
.cat-btn{flex:1;min-width:130px;padding:10px;border:2px solid #e5e7eb;background:#fff;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;color:#6b7280;text-align:center}
.cat-btn.active{background:#dcfce7;border-color:#16a34a;color:#166534}
.cat-btn .count{display:block;font-size:10px;font-weight:500;opacity:.7;margin-top:2px}

main{max-width:760px;margin:0 auto;padding:20px}

.score-bar{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e5e7eb;flex-wrap:wrap;gap:10px}
.score-bar .stat{font-size:13px;color:#6b7280}
.score-bar .stat b{color:#166534;font-size:16px}
.progress{flex:1;min-width:120px;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.progress .fill{height:100%;background:#16a34a;transition:width .3s}

.q-card{background:#fff;border-radius:14px;padding:24px;margin-bottom:14px;border:1px solid #e5e7eb}
.q-tag{display:inline-block;padding:3px 10px;background:#dcfce7;color:#166534;font-size:11px;font-weight:700;border-radius:12px;margin-bottom:10px}
.q-num{font-size:11px;color:#9ca3af;margin-left:10px;font-weight:600}
.q-text{font-size:15px;color:#1f2937;margin:8px 0 16px;line-height:1.7}
.q-text .blank{display:inline-block;min-width:80px;padding:0 8px;border-bottom:2px solid #16a34a;font-weight:700;color:#16a34a}
.hint{font-size:12px;color:#6b7280;font-style:italic;margin-top:6px}

.options{display:grid;gap:8px;margin-top:12px}
.option{padding:12px 16px;background:#f9fafb;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:14px;transition:all .12s;text-align:left}
.option:hover{background:#f0fdf4;border-color:#bbf7d0}
.option.selected{background:#dcfce7;border-color:#16a34a}
.option.correct{background:#bbf7d0;border-color:#16a34a;color:#14532d;font-weight:600}
.option.wrong{background:#fecaca;border-color:#dc2626;color:#7f1d1d}
.option.disabled{cursor:not-allowed;opacity:.85}

.input-row{display:flex;gap:8px;margin-top:12px}
.input-row input{flex:1;padding:11px 14px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit}
.input-row input:focus{outline:none;border-color:#16a34a}
.btn{padding:11px 22px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn:hover{background:#15803d}
.btn-secondary{background:#fff;color:#166534;border:2px solid #16a34a}
.btn-secondary:hover{background:#dcfce7}

.feedback{margin-top:14px;padding:14px;border-radius:8px;font-size:13px;line-height:1.65}
.feedback.correct{background:#dcfce7;border-left:3px solid #16a34a;color:#14532d}
.feedback.wrong{background:#fee2e2;border-left:3px solid #dc2626;color:#7f1d1d}
.feedback b{display:block;margin-bottom:4px}
.feedback .explain{margin-top:6px;color:#374151;font-style:italic}

.nav-row{display:flex;justify-content:space-between;gap:8px;margin-top:14px}

.summary{background:#fff;border-radius:14px;padding:28px;text-align:center;border:1px solid #e5e7eb}
.summary h2{color:#166534;font-size:22px;margin-bottom:14px}
.summary .big{font-size:50px;color:#16a34a;font-weight:800;margin:10px 0}
.summary .detail{font-size:13px;color:#6b7280;margin:14px 0}

@media (max-width:640px){
  .q-card,.summary{padding:18px}
  main{padding:14px}
  .cat-btn{min-width:100px;font-size:11px}
}
</style>
</head>
<body>
<nav style="background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:7px 16px;font-size:12px;display:flex;align-items:center;gap:5px">
  <a href="../index.html" style="color:#6b7280;text-decoration:none">고1</a>
  <span style="color:#d1d5db">›</span>
  <a href="index.html" style="color:#2563eb;text-decoration:none;font-weight:600">English_1_1</a>
</nav>
<header>
  <a class="back" href="index.html">← English_1_1</a>
  <h1>B · Grammar 3종 Drill</h1>
  <p class="subtitle">관계대명사 · 가주어/진주어 · 분사 — 총 30문항</p>
</header>

<div class="cat-bar" id="catBar"></div>

<main>
<div class="score-bar">
  <div class="stat">정답 <b id="correctCount">0</b> / 시도 <b id="totalCount" style="color:#374151">0</b></div>
  <div class="progress"><div class="fill" id="progFill" style="width:0%"></div></div>
  <div class="stat">정답률 <b id="accRate">-</b></div>
  <button class="btn-secondary btn" onclick="resetScore()" style="font-size:12px;padding:7px 12px">↻ 리셋</button>
</div>

<div id="quizArea"></div>

</main>

<script>
const QUESTIONS = {
  rel: [
    {q:'Students ___ use AI tools should still think critically.', type:'mc', options:['who','which','what','whose'], answer:0, explain:'사람(Students)이 선행사 → 주격 관계대명사 who. (that도 가능)'},
    {q:'Jobs ___ require creativity will survive in the future.', type:'mc', options:['who','which','where','of which'], answer:1, explain:'사물(Jobs)이 선행사 → which (또는 that).'},
    {q:'Data ___ is collected by companies can be misused.', type:'mc', options:['who','which','whom','when'], answer:1, explain:'사물(Data) 선행사 → which/that.'},
    {q:'People ___ rely too much on AI may lose key skills.', type:'mc', options:['which','whose','who','what'], answer:2, explain:'사람(People) 선행사 → who/that.'},
    {q:'The company ___ misused personal data was fined.', type:'mc', options:['which','who','what','where'], answer:0, explain:'사물(The company) 선행사 → which/that.'},
    {q:'AI is a technology ___ changes how we live.', type:'fill', answer:['which','that'], explain:'사물 선행사 + 주격 관계대명사 → which 또는 that.'},
    {q:'A friend ___ studies coding gave me a tip.', type:'fill', answer:['who','that'], explain:'사람 선행사 + 주격 → who 또는 that.'},
    {q:'The book ___ I read was about AI ethics.', type:'fill', answer:['that','which',''], explain:'사물 선행사 + 목적격 → that/which (또는 생략 가능).'},
    {q:'다음 중 어색한 문장은?', type:'mc', options:['Students who use AI are smart.','Data which is collected can be misused.','People which work hard succeed.','Jobs that need empathy will survive.'], answer:2, explain:'사람 선행사에는 which 불가. people → who/that.'},
    {q:'밑줄 부분을 관계대명사 문장으로 합치면? — "AI is a tool. It changes our lives."', type:'mc', options:['AI is a tool which changes our lives.','AI is a tool who changes our lives.','AI is a tool what changes our lives.','AI is a tool whose changes our lives.'], answer:0, explain:'사물(tool) + 주격 → which/that.'}
  ],
  it: [
    {q:'___ is necessary to prepare for the future.', type:'mc', options:['That','It','This','There'], answer:1, explain:'가주어 It. 진주어는 뒤의 to prepare for the future.'},
    {q:'It is clear ___ AI will affect education.', type:'mc', options:['to','that','what','for'], answer:1, explain:'It is + 형용사 + that S+V. that절이 진주어.'},
    {q:'It is important ___ students to learn AI literacy.', type:'mc', options:['of','to','for','that'], answer:2, explain:'It is + 형용사 + for 사람 + to V. (의미상 주어).'},
    {q:'It is essential to ___ critically about AI output.', type:'mc', options:['thinking','thought','think','thinks'], answer:2, explain:'to + 동사원형. think.'},
    {q:'It is true ___ AI saves a lot of time.', type:'mc', options:['to','that','for','what'], answer:1, explain:'It is + 형용사 + that S+V.'},
    {q:'(빈칸 채우기) ___ ___ ___ that AI is reshaping our economy.', type:'fill', answer:['it is clear','it is true','it is obvious'], explain:'가주어-진주어 + 형용사: It is clear/true/obvious that ~'},
    {q:'다음 중 어법상 옳은 것은?', type:'mc', options:['Is necessary to learn AI.','It is necessary learn AI.','It is necessary to learn AI.','It necessary is to learn AI.'], answer:2, explain:'가주어 It 필수 + to V 형태.'},
    {q:'It is wise ___ her to study every day.', type:'mc', options:['for','of','to','at'], answer:1, explain:'사람 성격을 나타내는 형용사(wise, kind, foolish)일 때는 of 사람.'},
    {q:'다음 문장을 가주어 구문으로: "To learn AI is important."', type:'mc', options:['It is important to learn AI.','It learns AI important.','That is important to learn AI.','To learn AI it is important.'], answer:0, explain:'긴 to부정사 주어 → It 가주어 + to V 진주어.'},
    {q:'It is undeniable ___ today\'s students will face new challenges.', type:'fill', answer:['that'], explain:'It is + 형용사 + that S+V.'}
  ],
  part: [
    {q:'Students ___ AI tools should learn to verify information. (능동: AI를 사용하는)', type:'mc', options:['used','using','use','to use'], answer:1, explain:'능동·진행 (학생들이 직접 사용) → 현재분사 using.'},
    {q:'Data ___ by companies can be dangerous. (수동: 회사에 의해 수집된)', type:'mc', options:['collecting','collected','collects','to collect'], answer:1, explain:'수동 (데이터가 수집됨) → 과거분사 collected.'},
    {q:'Jobs ___ creativity will not disappear. (능동: 요구하는)', type:'mc', options:['required','requiring','require','requires'], answer:1, explain:'능동 (jobs가 요구하는) → 현재분사 requiring.'},
    {q:'Decisions ___ by algorithms may be biased. (수동: 만들어진)', type:'mc', options:['making','made','make','to make'], answer:1, explain:'수동 (결정이 만들어짐) → 과거분사 made.'},
    {q:'People ___ on AI may lose key skills. (능동: 의존하는)', type:'mc', options:['relied','relying','rely','to rely'], answer:1, explain:'능동 (사람들이 의존) → 현재분사 relying.'},
    {q:'Information ___ by AI is not always accurate. (수동: 생성된)', type:'fill', answer:['generated','produced','created'], explain:'수동 (정보가 생성됨) → PP: generated/produced/created.'},
    {q:'Skills ___ empathy are essential. (능동: 포함하는)', type:'fill', answer:['involving','requiring'], explain:'능동 (skills가 포함) → 현재분사 involving/requiring.'},
    {q:'다음 중 옳은 표현은?', type:'mc', options:['Students used AI tools','Students using AI tools','Students use AI tools (분사 X)','Students who using AI tools'], answer:1, explain:'명사 뒤 분사구 — 능동이므로 현재분사 using.'},
    {q:'A book ___ in English is on the table. (수동: 영어로 쓰여진)', type:'mc', options:['writing','wrote','written','writes'], answer:2, explain:'수동 (책이 쓰여짐) → 과거분사 written.'},
    {q:'AI is a technology ___ industries worldwide. (능동: 변화시키는)', type:'mc', options:['changing','changed','changes','to change'], answer:0, explain:'능동 (AI가 변화시킴) → 현재분사 changing.'}
  ]
};
const CATS = [
  {key:'rel', label:'관계대명사', count:10},
  {key:'it', label:'가주어-진주어', count:10},
  {key:'part', label:'분사', count:10}
];
const STORE_KEY = 'eng_grammar_drill';
let state = loadState() || {cat:'rel', idx:0, score:{total:0, correct:0}, answers:{}};

function loadState(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ return null; } }
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function renderCatBar(){
  const bar = document.getElementById('catBar');
  bar.innerHTML = CATS.map(c=>{
    const ansCount = Object.keys(state.answers).filter(k=>k.startsWith(c.key+'_')).length;
    return `<button class="cat-btn ${state.cat===c.key?'active':''}" onclick="selectCat('${c.key}')">${c.label}<span class="count">${ansCount}/${c.count} 풀이</span></button>`;
  }).join('');
}
function selectCat(key){
  state.cat = key;
  state.idx = 0;
  saveState();
  render();
}

function render(){
  renderCatBar();
  renderScore();
  renderQuiz();
}

function renderScore(){
  document.getElementById('correctCount').textContent = state.score.correct;
  document.getElementById('totalCount').textContent = state.score.total;
  const acc = state.score.total ? Math.round(state.score.correct/state.score.total*100) : 0;
  document.getElementById('accRate').textContent = state.score.total ? acc + '%' : '-';
  document.getElementById('progFill').style.width = acc + '%';
}

function renderQuiz(){
  const cat = state.cat;
  const i = state.idx;
  const qs = QUESTIONS[cat];
  if(i >= qs.length){
    document.getElementById('quizArea').innerHTML = `
      <div class="summary">
        <h2>🎉 ${CATS.find(c=>c.key===cat).label} 완료</h2>
        <div class="big">${state.score.correct}/${state.score.total}</div>
        <div class="detail">전체 정답률 ${state.score.total?Math.round(state.score.correct/state.score.total*100):0}%</div>
        <button class="btn" onclick="resetCat('${cat}')">다시 풀기</button>
      </div>`;
    return;
  }
  const q = qs[i];
  const key = cat + '_' + i;
  const answered = state.answers[key];

  let html = `<div class="q-card">
    <span class="q-tag">${CATS.find(c=>c.key===cat).label}</span>
    <span class="q-num">${i+1} / ${qs.length}</span>
    <div class="q-text">${formatQuestion(q.q)}</div>`;

  if(q.type === 'mc'){
    html += '<div class="options">';
    q.options.forEach((opt,j)=>{
      let cls = 'option';
      if(answered !== undefined){
        cls += ' disabled';
        if(j === q.answer) cls += ' correct';
        if(j === answered && j !== q.answer) cls += ' wrong';
      }
      html += `<div class="${cls}" onclick="answerMC(${j})">${String.fromCharCode(65+j)}. ${opt}</div>`;
    });
    html += '</div>';
  } else if(q.type === 'fill'){
    html += `<div class="input-row"><input type="text" id="fillInput" placeholder="빈칸에 들어갈 단어..." ${answered!==undefined?'disabled value="'+escapeHtml(answered)+'"':''}><button class="btn" onclick="answerFill()" ${answered!==undefined?'disabled':''}>확인</button></div>`;
    if(answered === undefined){
      html += `<div class="hint">힌트: 정답은 ${q.answer.length}개의 답이 가능합니다.</div>`;
    }
  }

  if(answered !== undefined){
    const correct = (q.type === 'mc') ? (answered === q.answer) : isCorrectFill(answered, q.answer);
    html += `<div class="feedback ${correct?'correct':'wrong'}">
      <b>${correct?'✅ 정답!':'❌ 오답'}</b>
      ${q.type==='mc' ? `<div>정답: <b>${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}</b></div>` : `<div>정답 예시: <b>${q.answer.filter(a=>a).join(' / ')}</b></div>`}
      <div class="explain">💡 ${q.explain}</div>
    </div>`;
  }

  html += `<div class="nav-row">
    <button class="btn-secondary btn" onclick="navQ(-1)" ${i===0?'disabled':''}>← 이전</button>
    <button class="btn" onclick="navQ(1)">다음 →</button>
  </div></div>`;

  document.getElementById('quizArea').innerHTML = html;
  setTimeout(()=>{ const inp=document.getElementById('fillInput'); if(inp&&!inp.disabled) inp.focus(); },50);
  const inp = document.getElementById('fillInput');
  if(inp && !inp.disabled){
    inp.addEventListener('keypress', e=>{ if(e.key==='Enter') answerFill(); });
  }
}

function formatQuestion(q){
  return q.replace(/___/g, '<span class="blank">_____</span>');
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function isCorrectFill(user, answers){
  const u = String(user||'').trim().toLowerCase();
  return answers.some(a => a.trim().toLowerCase() === u);
}

function answerMC(j){
  const key = state.cat + '_' + state.idx;
  if(state.answers[key] !== undefined) return;
  state.answers[key] = j;
  const q = QUESTIONS[state.cat][state.idx];
  state.score.total++;
  if(j === q.answer) state.score.correct++;
  saveState();
  render();
}
function answerFill(){
  const key = state.cat + '_' + state.idx;
  if(state.answers[key] !== undefined) return;
  const inp = document.getElementById('fillInput');
  const val = inp.value.trim();
  if(!val) return;
  state.answers[key] = val;
  const q = QUESTIONS[state.cat][state.idx];
  state.score.total++;
  if(isCorrectFill(val, q.answer)) state.score.correct++;
  saveState();
  render();
}
function navQ(d){
  state.idx = Math.max(0, Math.min(QUESTIONS[state.cat].length, state.idx + d));
  saveState();
  render();
}
function resetCat(key){
  Object.keys(state.answers).forEach(k=>{ if(k.startsWith(key+'_')) delete state.answers[k]; });
  state.cat = key;
  state.idx = 0;
  saveState();
  render();
}
function resetScore(){
  if(!confirm('모든 점수와 답변을 초기화할까요?')) return;
  state = {cat:'rel', idx:0, score:{total:0, correct:0}, answers:{}};
  saveState();
  render();
}

render();
</script>
</body>
</html>
