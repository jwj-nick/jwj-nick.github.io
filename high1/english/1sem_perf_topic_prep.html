<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D · Topic Prep Pack — 영어 수행평가</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1f2937;line-height:1.55}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:18px 20px}
.back{font-size:13px;color:#2563eb;text-decoration:none}
h1{font-size:20px;font-weight:700;margin-top:8px}
.subtitle{font-size:12px;color:#9ca3af;margin-top:4px}

.tab-bar{display:flex;gap:5px;padding:14px 20px;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:8px 12px;border:2px solid #e5e7eb;background:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;color:#6b7280;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px}
.tab-btn.active{background:#dbeafe;border-color:#2563eb;color:#1e40af}
.tab-btn .id{font-size:16px}
.tab-btn .area{font-size:9px;opacity:.7;letter-spacing:.05em}

#mob-sel{display:none}

main{max-width:820px;margin:0 auto;padding:18px}
.q-banner{background:linear-gradient(135deg,#dbeafe 0%,#e0e7ff 100%);border:1px solid #93c5fd;border-radius:14px;padding:18px 20px;margin-bottom:16px}
.q-banner .area{font-size:11px;font-weight:700;color:#1e40af;letter-spacing:.05em}
.q-banner .qtext{font-size:16px;color:#1e3a8a;margin-top:8px;font-weight:600;line-height:1.5}

.section{background:#fff;border-radius:14px;padding:20px 22px;margin-bottom:14px;border:1px solid #e5e7eb}
.section h2{font-size:15px;font-weight:700;margin-bottom:12px;color:#1e40af;display:flex;align-items:center;gap:8px}
.section h2 .icon{font-size:16px}

.stance-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.stance{padding:14px;border-radius:10px;border:2px solid}
.stance.pro{background:#dbeafe;border-color:#3b82f6}
.stance.con{background:#fee2e2;border-color:#ef4444}
.stance .label{font-size:11px;font-weight:700;letter-spacing:.05em;margin-bottom:6px}
.stance.pro .label{color:#1e3a8a}
.stance.con .label{color:#991b1b}
.stance .claim{font-size:13px;color:#374151;line-height:1.5}

.fact-card{padding:12px 14px;background:#f9fafb;border-radius:8px;border-left:3px solid #2563eb;margin-bottom:8px}
.fact-card .src{font-size:10px;font-weight:700;letter-spacing:.05em;color:#2563eb;margin-bottom:4px}
.fact-card .body{font-size:13px;color:#374151;line-height:1.55}
.fact-card b{color:#1e40af}

.frame-row{padding:10px 14px;background:#eff6ff;border-radius:8px;margin:6px 0;font-size:13px;color:#1e3a8a}
.frame-row b{color:#1e40af}

.example-box{background:#f0f9ff;border:1px dashed #93c5fd;border-radius:10px;padding:14px;margin:8px 0;font-size:13px;color:#1e3a8a;line-height:1.65}
.example-box .label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;color:#1e40af;margin-bottom:6px}

@media (max-width:640px){
  .stance-grid{grid-template-columns:1fr}
  main{padding:14px}
  .section{padding:16px}
}
</style>
</head>
<body>
<nav style="background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:7px 16px;font-size:12px;display:flex;align-items:center;gap:5px">
  <a href="../index.html" style="color:#6b7280;text-decoration:none">고1</a>
  <span style="color:#d1d5db">›</span>
  <a href="index.html" style="color:#2563eb;text-decoration:none;font-weight:600">English_1_1</a>
</nav>
<header>
  <a class="back" href="index.html">← English_1_1</a>
  <h1>D · Topic Prep Pack</h1>
  <p class="subtitle">6주제별 자료·논점·hook·ending — 실전에서 외워서 변형 적용</p>
</header>

<div class="tab-bar" id="tabBar"></div>
<select id="mob-sel" onchange="setTopic(this.value)"></select>

<main id="content"></main>

<script>
const TOPICS = [
  {
    id:'W1', area:'WORK',
    q:'Do you think AI will take away many more jobs or create new opportunities for people?',
    stances:{
      pro:'AI will create more opportunities than it takes away — new types of work will emerge, and human-only skills will gain value.',
      con:'AI may cause large-scale unemployment, especially for routine white-collar jobs, widening inequality.'
    },
    recommended:'pro',
    facts:[
      {src:'World Economic Forum, Future of Jobs Report 2023', body:'<b>69 million new jobs</b> will appear and <b>83 million jobs</b> will be displaced by 2027 — a net reduction of about 14 million.'},
      {src:'McKinsey Global Institute, 2023', body:'About <b>30%</b> of work activities globally could be automated by 2030.'},
      {src:'OECD Employment Outlook 2023', body:'Approximately <b>27%</b> of jobs in OECD countries are at risk of automation.'},
      {src:'Goldman Sachs, 2023', body:'Generative AI could affect <b>300 million</b> full-time jobs worldwide.'}
    ],
    hooks:[
      'Imagine a world where machines write essays, drive cars, and diagnose diseases — that world is already here.',
      'According to the WEF, AI will create 69 million new jobs by 2027, but it will also eliminate 83 million.'
    ],
    endings:[
      'AI is not the end of work, but the **transformation** of it.',
      'The future belongs to those who can do **what AI cannot** — imagine, empathize, and create.'
    ]
  },
  {
    id:'W2', area:'WORK',
    q:'What kinds of jobs do you think will still need humans in the future? Why?',
    frame:'Care · Creativity · Judgment · Hands-on',
    types:[
      {cat:'돌봄·공감 (Care)', jobs:'teachers, nurses, counselors', why:'human trust and emotional connection'},
      {cat:'창의·예술 (Creativity)', jobs:'writers, designers, chefs', why:'original imagination and cultural context'},
      {cat:'윤리·판단 (Judgment)', jobs:'judges, doctors, ethicists', why:'moral responsibility and complex values'},
      {cat:'현장·손기술 (Hands-on)', jobs:'surgeons, technicians, first responders', why:'precision and adaptation in unstructured settings'}
    ],
    facts:[
      {src:'WEF Future of Jobs Report 2023', body:'<b>"Analytical thinking, creative thinking, and AI literacy"</b> will be the most important skills by 2027.'},
      {src:'McKinsey, 2023', body:'Healthcare, education, and creative roles are <b>most resistant to automation</b>.'},
      {src:'OECD Skills Outlook 2023', body:'Social and emotional skills are rising in labor market value.'}
    ],
    hooks:[
      'While AI can write code in seconds, can it truly comfort a crying child or make an ethical decision in a crisis?'
    ],
    endings:[
      'What makes us irreplaceable is not what we know, but **what we feel and create**.'
    ]
  },
  {
    id:'L1', area:'LIBERTY & AI',
    q:'Do you think governments should regulate AI development? Why or why not?',
    stances:{
      pro:'Governments should regulate AI to ensure safety, prevent discrimination, and protect human rights — innovation needs responsible boundaries.',
      con:'Excessive regulation may slow innovation and push AI companies to less-regulated countries, creating an uneven global market.'
    },
    recommended:'pro',
    facts:[
      {src:'European Union AI Act (2024)', body:'World\'s first comprehensive AI law. Classifies systems by risk: <b>unacceptable / high / limited / minimal</b>.'},
      {src:'Stanford AI Index Report 2024', body:'AI-related legislation in the US has <b>increased 9-fold</b> over five years.'},
      {src:'Pew Research, 2023', body:'<b>52% of US adults</b> say they are more concerned than excited about AI.'},
      {src:'UNESCO Recommendation on AI Ethics (2021)', body:'Adopted by <b>193 countries</b> — first global consensus on AI ethics.'}
    ],
    hooks:[
      'When a self-driving car causes an accident, who is responsible — the driver, the company, or the algorithm?',
      'According to Pew Research, more than half of Americans worry about AI more than they feel excited.'
    ],
    endings:[
      'Innovation without ethics is dangerous; regulation without innovation is stagnant. **We need both, in balance.**',
      'The goal of regulation is not to stop AI but to make sure it serves humanity.'
    ]
  },
  {
    id:'L2', area:'LIBERTY & AI',
    q:'How much personal information do you think people should share online?',
    frame:'Principle: **Data minimization** — share as little as possible.',
    facts:[
      {src:'EU GDPR (2018)', body:'Data minimization is a legal principle. Violations can cost <b>4% of global revenue</b>.'},
      {src:'IBM Cost of a Data Breach Report 2023', body:'Average cost of a data breach: <b>$4.45 million</b>.'},
      {src:'Pew Research, 2023', body:'<b>45%</b> of US teens say they are online "almost constantly."'},
      {src:'Statista, 2023', body:'Global cost of cybercrime estimated at <b>$8 trillion</b>.'}
    ],
    hooks:[
      'Every click, like, and search you make is recorded — by companies, governments, and sometimes by criminals.',
      'Imagine your 13-year-old post being seen by your future employer ten years later.'
    ],
    endings:[
      'Your data is your identity. **Once it is shared, it is no longer yours alone.**',
      'The safest principle is: share less, protect more.'
    ]
  },
  {
    id:'E1', area:'EDUCATION',
    q:'Since AI can provide information easily, what abilities should humans develop that AI cannot replace?',
    frame:'5C: **Critical thinking, Creativity, Communication, Collaboration, Compassion**',
    types:[
      {cat:'Critical thinking', jobs:'-', why:'verify, compare, evaluate AI output'},
      {cat:'Creativity', jobs:'-', why:'invent new ideas by combining experiences'},
      {cat:'Communication', jobs:'-', why:'persuade and connect with people'},
      {cat:'Collaboration', jobs:'-', why:'coordinate complex teams'},
      {cat:'Compassion', jobs:'-', why:'understand and care for others'}
    ],
    facts:[
      {src:'WEF Future of Jobs Report 2023', body:'Top skills: <b>analytical thinking, creative thinking, resilience</b>.'},
      {src:'OECD Learning Compass 2030', body:'"Transformative competencies": creating new value, reconciling tensions, taking responsibility.'},
      {src:'MIT Sloan Management Review, 2023', body:'AI excels at <b>pattern recognition</b>; humans excel at <b>judgment, leadership, and empathy</b>.'}
    ],
    hooks:[
      'If AI can answer any factual question in seconds, what is left for humans to learn?'
    ],
    endings:[
      'Knowledge is now a commodity. **Judgment, imagination, and humanity** are the new luxuries.',
      'AI tells us *what is*, but only humans can decide *what should be*.'
    ]
  },
  {
    id:'E2', area:'EDUCATION',
    q:'Do you think schools should change what they teach to prepare students for the future?',
    stances:{
      pro:'Schools must change — rote memorization is obsolete in the AI era. AI literacy, critical thinking, and collaboration must be central.',
      con:'Basic literacy and numeracy must remain — without foundations, no advanced skill can develop.'
    },
    recommended:'pro',
    facts:[
      {src:'UNESCO AI Competency Framework for Students (2024)', body:'12 core competencies — including AI ethics, data literacy, human-AI collaboration.'},
      {src:'OECD PISA 2022', body:'Digital tool usage and academic achievement follow a <b>U-shape</b>: moderate use helps, excessive use hurts.'},
      {src:'한국 교육부 (Korea Ministry of Education)', body:'<b>AI-based digital textbooks</b> for math, English, and information will be introduced in 2025.'},
      {src:'World Bank, 2022', body:'Global learning poverty (children unable to read by age 10): <b>70%</b>.'}
    ],
    hooks:[
      'Today\'s students will work in jobs that do not yet exist, using technologies not yet invented.',
      'South Korea will introduce AI-based digital textbooks for math, English, and information starting in 2025.'
    ],
    endings:[
      'We cannot prepare students for the future by teaching them only the past.',
      'Schools must evolve — or become irrelevant.'
    ]
  }
];
const STORE_KEY = 'eng_topic_prep';
let state = loadState() || {topic:'W1'};

function loadState(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ return null; } }
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function renderTabBar(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = TOPICS.map(t=>`<button class="tab-btn ${state.topic===t.id?'active':''}" onclick="setTopic('${t.id}')"><span class="id">${t.id}</span><span class="area">${t.area}</span></button>`).join('');
  const sel = document.getElementById('mob-sel');
  sel.innerHTML = TOPICS.map(t=>`<option value="${t.id}" ${state.topic===t.id?'selected':''}>${t.id} — ${t.area} — ${t.q.substring(0,40)}...</option>`).join('');
}
function setTopic(id){ state.topic=id; saveState(); render(); }

function render(){
  renderTabBar();
  const t = TOPICS.find(x=>x.id===state.topic);
  let html = `<div class="q-banner"><div class="area">${t.area} · ${t.id}</div><div class="qtext">${t.q}</div></div>`;

  if(t.stances){
    html += `<div class="section"><h2><span class="icon">⚖️</span> 양면 논점</h2>
      <div class="stance-grid">
        <div class="stance pro"><div class="label">🟦 PRO (찬성)${t.recommended==='pro'?' · ⭐ 추천':''}</div><div class="claim">${t.stances.pro}</div></div>
        <div class="stance con"><div class="label">🟥 CON (반대)${t.recommended==='con'?' · ⭐ 추천':''}</div><div class="claim">${t.stances.con}</div></div>
      </div></div>`;
  }
  if(t.frame){
    html += `<div class="section"><h2><span class="icon">🧩</span> 핵심 프레임</h2><div class="frame-row">${t.frame}</div>${t.types?renderTypes(t.types):''}</div>`;
  }
  html += `<div class="section"><h2><span class="icon">📊</span> 객관적 자료 (시험장 인용용)</h2>
    ${t.facts.map(f=>`<div class="fact-card"><div class="src">${f.src}</div><div class="body">${f.body}</div></div>`).join('')}</div>`;

  html += `<div class="section"><h2><span class="icon">🎣</span> 추천 Hook</h2>
    ${t.hooks.map(h=>`<div class="example-box"><span class="label">시작 문장 예시</span>"${h}"</div>`).join('')}</div>`;

  html += `<div class="section"><h2><span class="icon">💫</span> 추천 Powerful Ending</h2>
    ${t.endings.map(e=>`<div class="example-box"><span class="label">끝 문장 예시</span>"${e.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}"</div>`).join('')}</div>`;

  document.getElementById('content').innerHTML = html;
  window.scrollTo({top:0});
}

function renderTypes(types){
  return `<div style="display:grid;gap:8px;margin-top:10px">${types.map(t=>`
    <div class="fact-card" style="border-left-color:#10b981">
      <div class="src" style="color:#10b981">${t.cat}</div>
      <div class="body">${t.jobs!=='-'?'<b>'+t.jobs+'</b> — ':''}${t.why}</div>
    </div>`).join('')}</div>`;
}

render();

// Mobile select toggle on resize
function checkMobile(){
  const isMobile = window.innerWidth <= 640;
  document.getElementById('tabBar').style.display = isMobile ? 'none' : 'flex';
  document.getElementById('mob-sel').style.display = isMobile ? 'block' : 'none';
}
window.addEventListener('resize', checkMobile);
checkMobile();
</script>
<style>
@media (max-width:640px){
  #mob-sel{display:block !important;width:calc(100% - 28px);margin:14px;padding:11px 14px;font-size:14px;border:2px solid #2563eb;background:#fff;border-radius:8px;font-weight:600}
}
</style>
</body>
</html>
