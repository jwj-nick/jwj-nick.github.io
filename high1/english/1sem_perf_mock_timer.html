<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E · Mock Timer — 영어 수행평가</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1f2937;line-height:1.55}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:18px 20px}
.back{font-size:13px;color:#2563eb;text-decoration:none}
h1{font-size:20px;font-weight:700;margin-top:8px}
.subtitle{font-size:12px;color:#9ca3af;margin-top:4px}

main{max-width:820px;margin:0 auto;padding:18px}

.timer-bar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.timer{font-size:34px;font-weight:800;color:#1f2937;font-feature-settings:'tnum';font-variant-numeric:tabular-nums}
.timer.warn{color:#f59e0b}
.timer.danger{color:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
.timer-info{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.word-counter{padding:6px 14px;background:#1f2937;color:#fff;border-radius:14px;font-size:14px;font-weight:700}
.word-counter.ok{background:#059669}
.word-counter.warn{background:#dc2626}
.timer-btn{padding:8px 14px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.timer-btn.start{background:#dc2626}
.timer-btn.pause{background:#f59e0b}
.timer-btn.resume{background:#10b981}

.start-screen{background:#fff;border-radius:14px;padding:24px;border:1px solid #e5e7eb;margin-bottom:14px}
.start-screen h2{font-size:18px;font-weight:700;color:#7f1d1d;margin-bottom:14px}
.q-banner{background:linear-gradient(135deg,#fee2e2 0%,#fecaca 100%);border:1px solid #fca5a5;border-radius:12px;padding:18px 20px;margin:14px 0}
.q-banner .area{font-size:11px;font-weight:700;color:#7f1d1d;letter-spacing:.05em}
.q-banner .qtext{font-size:16px;color:#7f1d1d;margin-top:8px;font-weight:600;line-height:1.5}

.essay-area{background:#fff;border-radius:14px;padding:20px;border:1px solid #e5e7eb;margin-bottom:14px}
.essay-area textarea{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px;font-family:'Times New Roman',serif;line-height:1.8;min-height:380px;resize:vertical}
.essay-area textarea:focus{outline:none;border-color:#dc2626}

.grammar-check{background:#fff;border-radius:14px;padding:18px;border:1px solid #e5e7eb;margin-bottom:14px}
.grammar-check h3{font-size:14px;color:#7f1d1d;font-weight:700;margin-bottom:10px}
.gc-row{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13px}
.gc-row input{width:18px;height:18px;accent-color:#dc2626}
.gc-row .label{color:#374151}
.gc-row .pattern{font-family:'Courier New',monospace;font-size:11px;background:#f3f4f6;padding:2px 6px;border-radius:4px;color:#7f1d1d}

.btn{padding:11px 22px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn:hover{background:#b91c1c}
.btn-secondary{background:#fff;color:#7f1d1d;border:2px solid #dc2626}
.btn-secondary:hover{background:#fee2e2}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:14px 0}
.opt-card{padding:12px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;background:#fff;font-size:13px;color:#374151}
.opt-card:hover{border-color:#dc2626;background:#fef2f2}
.opt-card.selected{border-color:#dc2626;background:#fee2e2;color:#7f1d1d;font-weight:700}

.result-panel{background:#fff;border-radius:14px;padding:24px;border:1px solid #e5e7eb;margin-bottom:14px}
.result-panel h2{font-size:20px;color:#7f1d1d;margin-bottom:14px}
.score-bar-result{display:flex;justify-content:space-around;text-align:center;margin:18px 0;flex-wrap:wrap;gap:14px}
.score-item{flex:1;min-width:110px}
.score-item .num{font-size:32px;font-weight:800;color:#dc2626}
.score-item .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}

.history{margin-top:14px;background:#fff;border-radius:14px;padding:18px;border:1px solid #e5e7eb}
.history h3{font-size:14px;color:#7f1d1d;font-weight:700;margin-bottom:10px}
.history-row{padding:10px 12px;background:#f9fafb;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.history-row .date{color:#6b7280}
.history-row .topic{font-weight:700;color:#7f1d1d}
.history-row .words{color:#374151}

@media (max-width:640px){
  main{padding:12px}
  .timer{font-size:28px}
  .options-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav style="background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:7px 16px;font-size:12px;display:flex;align-items:center;gap:5px">
  <a href="../index.html" style="color:#6b7280;text-decoration:none">고1</a>
  <span style="color:#d1d5db">›</span>
  <a href="index.html" style="color:#2563eb;text-decoration:none;font-weight:600">English_1_1</a>
</nav>
<header>
  <a class="back" href="index.html">← English_1_1</a>
  <h1>E · 30분 Mock Timer</h1>
  <p class="subtitle">실전 모의시험 · 30분 카운트다운 · 자동 채점</p>
</header>

<main id="appArea"></main>

<script>
const TOPICS = [
  {id:'W1', area:'WORK', q:'Do you think AI will take away many more jobs or create new opportunities for people?'},
  {id:'W2', area:'WORK', q:'What kinds of jobs do you think will still need humans in the future? Why?'},
  {id:'L1', area:'LIBERTY & AI', q:'Do you think governments should regulate AI development? Why or why not?'},
  {id:'L2', area:'LIBERTY & AI', q:'How much personal information do you think people should share online?'},
  {id:'E1', area:'EDUCATION', q:'Since AI can provide information easily, what abilities should humans develop that AI cannot replace?'},
  {id:'E2', area:'EDUCATION', q:'Do you think schools should change what they teach to prepare students for the future?'}
];
const STORE_KEY = 'eng_mock_timer';
const HISTORY_KEY = 'eng_mock_history';
const DURATION_SEC = 30 * 60;

let state = loadState() || {phase:'setup', topic:null, startTime:null, elapsed:0, paused:false, essay:'', checks:{}};
let history = loadHistory() || [];
let timerInterval = null;

function loadState(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ return null; } }
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)); }catch(e){ return []; } }
function saveHistory(){ localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

function render(){
  if(state.phase === 'setup') renderSetup();
  else if(state.phase === 'writing') renderWriting();
  else if(state.phase === 'review') renderReview();
}

function renderSetup(){
  document.getElementById('appArea').innerHTML = `
    <div class="start-screen">
      <h2>⏱️ 30분 모의시험 — 주제 선택</h2>
      <p style="color:#6b7280;font-size:13px">한 주제를 선택하면 30분 카운트다운이 시작됩니다. 단어 수는 실시간 표시. 30분이 지나면 자동 종료.</p>
      <div class="options-grid">
        ${TOPICS.map(t=>`<div class="opt-card" onclick="startMock('${t.id}')"><div style="font-weight:700;color:#7f1d1d">${t.id}. ${t.area}</div><div style="margin-top:6px;color:#374151">${t.q}</div></div>`).join('')}
        <div class="opt-card" onclick="startMock('random')" style="border-color:#dc2626;background:#fee2e2;text-align:center;display:flex;flex-direction:column;justify-content:center"><div style="font-size:18px">🎲</div><div style="font-weight:700;margin-top:4px;color:#7f1d1d">랜덤 (실전 모드)</div></div>
      </div>
      ${history.length ? renderHistoryFull() : ''}
    </div>`;
}

function renderHistoryFull(){
  return `<div class="history">
    <h3>📜 지난 모의시험 기록</h3>
    ${history.slice(-10).reverse().map(h=>`
      <div class="history-row">
        <span class="date">${h.date}</span>
        <span class="topic">${h.topic}</span>
        <span class="words">${h.words} words · 문법 ${h.grammars}/3 · ${h.completed?'⏱️ 완료':'⏸️ 중단'}</span>
      </div>`).join('')}
  </div>`;
}

function startMock(idOrRandom){
  const topicId = (idOrRandom === 'random') ? TOPICS[Math.floor(Math.random()*TOPICS.length)].id : idOrRandom;
  state = {phase:'writing', topic:topicId, startTime:Date.now(), elapsed:0, paused:false, essay:'', checks:{}};
  saveState();
  render();
  startTimer();
}

function renderWriting(){
  const t = TOPICS.find(x=>x.id === state.topic);
  document.getElementById('appArea').innerHTML = `
    <div class="timer-bar">
      <div id="timerDisp" class="timer">30:00</div>
      <div class="timer-info">
        <span class="word-counter" id="wordCounter">0 words</span>
        <button class="timer-btn pause" id="pauseBtn" onclick="togglePause()">⏸ 일시정지</button>
        <button class="timer-btn" onclick="endMock()" style="background:#374151">⏹ 종료</button>
      </div>
    </div>
    <div class="q-banner">
      <div class="area">${t.area} · ${t.id}</div>
      <div class="qtext">${t.q}</div>
    </div>
    <div class="essay-area">
      <textarea id="essayInput" placeholder="여기에 영어 에세이를 작성하세요 (150~250 words 목표)...

[3종 문법 슬롯 가이드]
- 가주어-진주어: It is clear that ~ / It is necessary to ~
- 관계대명사: people who ~ / data which ~
- 분사: students using AI / data collected by ~"></textarea>
    </div>
    <div class="grammar-check">
      <h3>🎯 3종 문법 사용 자가 체크 (마음으로만 — 종료 시 자동 추정)</h3>
      <div class="gc-row"><input type="checkbox" id="gc_it"><label for="gc_it"><span class="label">가주어-진주어</span> <span class="pattern">It is ~ that/to ~</span></label></div>
      <div class="gc-row"><input type="checkbox" id="gc_rel"><label for="gc_rel"><span class="label">관계대명사</span> <span class="pattern">who / which / that</span></label></div>
      <div class="gc-row"><input type="checkbox" id="gc_part"><label for="gc_part"><span class="label">분사</span> <span class="pattern">Ving / Past Participle</span></label></div>
    </div>`;

  const ta = document.getElementById('essayInput');
  ta.value = state.essay;
  ta.addEventListener('input', ()=>{
    state.essay = ta.value;
    saveState();
    updateWordCount();
  });
  ['gc_it','gc_rel','gc_part'].forEach(id=>{
    const el = document.getElementById(id);
    el.checked = !!state.checks[id];
    el.addEventListener('change', ()=>{ state.checks[id] = el.checked; saveState(); });
  });
  updateWordCount();
  ta.focus();
}

function updateWordCount(){
  const n = (state.essay||'').trim().split(/\s+/).filter(Boolean).length;
  const el = document.getElementById('wordCounter');
  if(!el) return;
  el.textContent = n + ' words';
  el.classList.remove('ok','warn');
  if(n>=150 && n<=250) el.classList.add('ok');
  else if(n>0) el.classList.add('warn');
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(state.paused) return;
    state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    saveState();
    updateTimerDisplay();
    if(state.elapsed >= DURATION_SEC){
      endMock();
    }
  }, 1000);
  updateTimerDisplay();
}

function updTimerDispClass(remain){
  const el = document.getElementById('timerDisp');
  if(!el) return;
  el.classList.remove('warn','danger');
  if(remain <= 60) el.classList.add('danger');
  else if(remain <= 300) el.classList.add('warn');
}

function updateTimerDisplay(){
  const el = document.getElementById('timerDisp');
  if(!el) return;
  const remain = Math.max(0, DURATION_SEC - state.elapsed);
  const m = Math.floor(remain/60), s = remain%60;
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  updTimerDispClass(remain);
}

function togglePause(){
  state.paused = !state.paused;
  if(state.paused){
    state.pauseStart = Date.now();
  } else {
    if(state.pauseStart){
      state.startTime += (Date.now() - state.pauseStart);
      state.pauseStart = null;
    }
  }
  saveState();
  const btn = document.getElementById('pauseBtn');
  btn.textContent = state.paused ? '▶ 재개' : '⏸ 일시정지';
  btn.classList.toggle('resume', state.paused);
  btn.classList.toggle('pause', !state.paused);
}

function endMock(){
  if(timerInterval) clearInterval(timerInterval);
  const words = (state.essay||'').trim().split(/\s+/).filter(Boolean).length;
  const itDetected = detectIt(state.essay);
  const relDetected = detectRel(state.essay);
  const partDetected = detectPart(state.essay);
  const grammars = (itDetected?1:0) + (relDetected?1:0) + (partDetected?1:0);

  history.push({
    date: new Date().toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    topic: state.topic,
    words,
    grammars,
    completed: state.elapsed >= DURATION_SEC,
    elapsedMin: Math.floor(state.elapsed/60)
  });
  saveHistory();

  state.phase = 'review';
  state.detected = {it:itDetected, rel:relDetected, part:partDetected};
  saveState();
  render();
}

function detectIt(t){
  return /\b[Ii]t\s+(is|was|seems|becomes)\s+\w+\s+(that|to)\b/.test(t);
}
function detectRel(t){
  // word + who/which/that + verb
  return /\b(who|which|that)\s+(is|are|was|were|has|have|had|can|could|will|would|may|might|do|does|did|make|makes|made|use|uses|used|require|requires|required|need|needs|needed|work|works|worked|help|helps|helped|cause|causes|caused|provide|provides|provided)\b/i.test(t);
}
function detectPart(t){
  // noun + Ving + noun OR noun + PP + by
  return /\b\w+\s+(using|requiring|involving|including|providing|making|generating|relying|trusting|teaching|learning|creating|developing)\s+\w+/i.test(t)
      || /\b\w+\s+(used|made|collected|generated|written|taught|created|developed|provided|trained|automated|displaced)\s+(by|in|from|to|with)\b/i.test(t);
}

function renderReview(){
  const t = TOPICS.find(x=>x.id === state.topic);
  const words = (state.essay||'').trim().split(/\s+/).filter(Boolean).length;
  const d = state.detected || {it:false, rel:false, part:false};
  const grammars = (d.it?1:0)+(d.rel?1:0)+(d.part?1:0);
  const usedMin = Math.floor(state.elapsed/60), usedSec = state.elapsed%60;

  // Score estimation (만점 14)
  let score = 0;
  if(words>=150 && words<=250) score += 2;
  else if(words>=130 || (words<=270 && words>250)) score += 1;
  score += grammars; // 0-3
  if(/Intro|introduction|in my opinion|firmly believe|i agree|i disagree/i.test(state.essay)) score += 1;
  if(/conclusion|to sum up|in short|in brief|overall/i.test(state.essay)) score += 1;
  if(/according to|study by|research/i.test(state.essay)) score += 2;
  if(/first|to begin|moreover|furthermore/i.test(state.essay)) score += 1;
  if(/for example|for instance/i.test(state.essay)) score += 1;
  if(/on the other hand|nevertheless|however|even though/i.test(state.essay)) score += 1;

  document.getElementById('appArea').innerHTML = `
    <div class="result-panel">
      <h2>📝 모의시험 결과 — ${t.id}</h2>
      <p style="font-size:13px;color:#6b7280">Q: ${t.q}</p>
      <div class="score-bar-result">
        <div class="score-item"><div class="num">${words}</div><div class="label">단어 수</div></div>
        <div class="score-item"><div class="num">${grammars}/3</div><div class="label">3종 문법</div></div>
        <div class="score-item"><div class="num">${usedMin}m</div><div class="label">소요 시간</div></div>
        <div class="score-item"><div class="num">${Math.min(score,14)}/14</div><div class="label">추정 점수</div></div>
      </div>

      <h3 style="font-size:14px;color:#7f1d1d;margin:14px 0 8px">자동 문법 검출</h3>
      <div style="display:grid;gap:6px">
        <div style="padding:10px;background:${d.it?'#dcfce7':'#fee2e2'};border-radius:8px;font-size:13px;color:${d.it?'#065f46':'#7f1d1d'}">${d.it?'✅':'❌'} 가주어-진주어 (It ~ that/to ~)</div>
        <div style="padding:10px;background:${d.rel?'#dcfce7':'#fee2e2'};border-radius:8px;font-size:13px;color:${d.rel?'#065f46':'#7f1d1d'}">${d.rel?'✅':'❌'} 관계대명사 (who/which/that + V)</div>
        <div style="padding:10px;background:${d.part?'#dcfce7':'#fee2e2'};border-radius:8px;font-size:13px;color:${d.part?'#065f46':'#7f1d1d'}">${d.part?'✅':'❌'} 분사 (Ving / PP)</div>
      </div>

      <h3 style="font-size:14px;color:#7f1d1d;margin:14px 0 8px">내가 쓴 글</h3>
      <div style="padding:14px;background:#f9fafb;border-radius:8px;font-family:'Times New Roman',serif;line-height:1.8;font-size:14px;white-space:pre-wrap">${escapeHtml(state.essay||'(빈 글)')}</div>

      <div class="btn-row">
        <button class="btn-secondary btn" onclick="restartMock()">🔄 다시 시도</button>
        <a class="btn-secondary btn" style="text-decoration:none;display:inline-block" href="1sem_perf_self_review.html">→ F · Self-Review로 자세히 채점</a>
        <button class="btn" onclick="newMock()">새 모의시험</button>
      </div>
    </div>
    ${renderHistoryFull()}`;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function restartMock(){
  startMock(state.topic);
}
function newMock(){
  state = {phase:'setup', topic:null, startTime:null, elapsed:0, paused:false, essay:'', checks:{}};
  saveState();
  render();
}

// Restore writing phase if reloaded mid-test
if(state.phase === 'writing' && state.startTime){
  render();
  startTimer();
} else {
  render();
}
</script>
