<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디오판토스 — Unit 04 — 일차방정식</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
    }

    .stage {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }

    /* 모든 장면은 절대 좌표로 겹쳐서 fade로 전환 */
    .scene {
      position: absolute;
      inset: 0;
      width: 1280px;
      height: 720px;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 96px;
    }

    /* ─── Scene 1: 타이틀 ────────────────────────────── */
    .s1 .title {
      font-family: var(--font-serif);
      font-size: var(--title-size);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      text-align: center;
    }
    .s1 .era {
      margin-top: 16px;
      font-size: var(--subtitle-size);
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: none;
    }
    .s1 .unit-label {
      position: absolute;
      bottom: 48px;
      right: 64px;
      font-size: var(--caption-size);
      color: var(--accent);
      letter-spacing: 2px;
    }

    /* ─── Scene 2: 인물 등장 ─────────────────────────── */
    .s2 {
      flex-direction: row;
      gap: 56px;
      align-items: center;
      justify-content: center;
    }
    .s2 .visual {
      width: 360px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .s2 .visual svg {
      width: 100%;
      height: 100%;
    }
    .s2 .text {
      max-width: 560px;
      text-align: left;
    }
    .s2 .head {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.3;
      margin-bottom: 24px;
    }
    .s2 .body {
      font-size: var(--body-size);
      line-height: 1.65;
      color: var(--text);
    }

    /* ─── Scene 3: 결정적 순간 ───────────────────────── */
    .s3 {
      flex-direction: column;
      gap: 36px;
    }
    .s3 .metaphor {
      width: 480px;
      height: 320px;
      color: var(--accent);
    }
    .s3 .metaphor svg { width: 100%; height: 100%; }
    .s3 .keyword {
      font-family: var(--font-serif);
      font-size: 52px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .s3 .text {
      max-width: 880px;
      text-align: center;
      font-size: 26px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ─── Scene 4: 수학 연결 ─────────────────────────── */
    .s4 {
      gap: 28px;
    }
    .s4 .head {
      font-family: var(--font-serif);
      font-size: 38px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .s4 .diagram {
      width: 480px;
      height: 240px;
      color: var(--accent);
    }
    .s4 .diagram svg { width: 100%; height: 100%; }
    .s4 .text {
      max-width: 880px;
      text-align: center;
      font-size: 24px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ─── Scene 5: 마무리 ────────────────────────────── */
    .s5 {
      flex-direction: column;
      gap: 28px;
    }
    .s5 .text {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.5px;
    }
    .s5 .unit-mark {
      font-size: var(--subtitle-size);
      color: var(--accent);
      letter-spacing: 6px;
    }
  </style>
</head>

<body class="unit-04">
  <div
    id="root"
    class="stage"
    data-composition-id="story-unit04"
    data-start="0"
    data-duration="45"
    data-width="1280"
    data-height="720">

    <!-- ─── Scene 1: 타이틀 (0~5s) ─── -->
    <div class="scene s1" id="scene1">
      <div class="title">디오판토스</div>
      <div class="era">3세기 · 알렉산드리아</div>
      <div class="unit-label">Unit 04 — 일차방정식</div>
    </div>

    <!-- ─── Scene 2: 인물 등장 (5~15s) ─── -->
    <div class="scene s2" id="scene2">
      <div class="visual"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 18 C20 12, 28 8, 36 12 L72 12 C80 8, 88 12, 88 18 L88 22 C88 28, 80 32, 72 28 L36 28 C28 32, 20 28, 20 22 Z" fill="currentColor" fill-opacity="0.18"/>
  <path d="M28 28 L28 72"/>
  <path d="M80 28 L80 72"/>
  <path d="M28 72 C28 78, 36 82, 44 78 L80 78"/>
  <path d="M40 40 L70 40"/>
  <path d="M40 50 L66 50"/>
  <path d="M40 60 L72 60"/>
</svg></div>
      <div class="text">
        <div class="head">방정식의 아버지</div>
        <div class="body">그의 묘비에는 일생을 적어놓은 수수께끼가 새겨져 있었어요. 답은 방정식을 풀어야 알 수 있었지요.</div>
      </div>
    </div>

    <!-- ─── Scene 3: 결정적 순간 (15~32s) ─── -->
    <div class="scene s3" id="scene3">
      <div class="metaphor"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <line x1="50" y1="22" x2="50" y2="78"/>
  <line x1="50" y1="78" x2="36" y2="86"/>
  <line x1="50" y1="78" x2="64" y2="86"/>
  <line x1="36" y1="86" x2="64" y2="86"/>

  <circle cx="50" cy="22" r="3" fill="currentColor"/>
</svg></div>
      <div class="keyword">미지수의 발견</div>
      <div class="text">모르는 수에 이름을 붙이자. 그 수를 x라 부르고, 양쪽이 같다는 식을 세우면.</div>
    </div>

    <!-- ─── Scene 4: 수학 연결 (32~45s) ─── -->
    <div class="scene s4" id="scene4">
      <div class="head">오늘 우리는</div>
      <div class="diagram"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
  <circle cx="50" cy="50" r="18" fill="currentColor" fill-opacity="0.3"/>
  <line x1="50" y1="10" x2="50" y2="22"/>
  <line x1="50" y1="78" x2="50" y2="90"/>
  <line x1="10" y1="50" x2="22" y2="50"/>
  <line x1="78" y1="50" x2="90" y2="50"/>
  <line x1="21.7" y1="21.7" x2="30.2" y2="30.2"/>
  <line x1="69.8" y1="69.8" x2="78.3" y2="78.3"/>
  <line x1="78.3" y1="21.7" x2="69.8" y2="30.2"/>
  <line x1="30.2" y1="69.8" x2="21.7" y2="78.3"/>
</svg></div>
      <div class="text">x를 놓고, 식을 세우고, 양변을 정리해서 답을 찾습니다.</div>
    </div>

    <!-- ─── Scene 5: 마무리 (45~50s) ─── -->
    <div class="scene s5" id="scene5">
      <div class="text">이 단원에서, 디오판토스를 만나봅시다</div>
      <div class="unit-mark">Unit 04 — 일차방정식</div>
    </div>
  </div>

  <script>
    /* ─── GSAP 타임라인 (5장면 fade in/out) ─── */
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    /* 장면 절대 시간 — 실제 영상 길이에 비례 스케일링 (기준 50s) */
    const DUR = parseFloat(document.getElementById('root').dataset.duration) || 50;
    const SCALE = DUR / 51;  /* duration은 audio+1, 기준 50s 매핑 */
    const T = {
      s1: 0.0,
      s2: 5.0 * SCALE,
      s3: 15.0 * SCALE,
      s4: 32.0 * SCALE,
      s5: 45.0 * SCALE,
      end: 50.0 * SCALE,
    };

    /* Scene 1 in */
    tl.to('#scene1', { opacity: 1, duration: 0.8 }, T.s1);
    /* Scene 1 out / Scene 2 in (cross-fade at 5s) */
    tl.to('#scene1', { opacity: 0, duration: 0.8 }, T.s2 - 0.4);
    tl.to('#scene2', { opacity: 1, duration: 0.8 }, T.s2);

    /* Scene 2 → 3 */
    tl.to('#scene2', { opacity: 0, duration: 0.8 }, T.s3 - 0.4);
    tl.to('#scene3', { opacity: 1, duration: 0.8 }, T.s3);

    /* Scene 3 → 4 */
    tl.to('#scene3', { opacity: 0, duration: 0.8 }, T.s4 - 0.4);
    tl.to('#scene4', { opacity: 1, duration: 0.8 }, T.s4);

    /* Scene 4 → 5 */
    tl.to('#scene4', { opacity: 0, duration: 0.8 }, T.s5 - 0.4);
    tl.to('#scene5', { opacity: 1, duration: 0.8 }, T.s5);

    /* Final fade out */
    tl.to('#scene5', { opacity: 0, duration: 1.0 }, T.end - 1.0);

    /* 내부 요소 미세 모션 — 정적 영상 방지 */
    /* S1 부제는 살짝 늦게 등장 */
    tl.from('#scene1 .era', { opacity: 0, y: 12, duration: 0.8 }, T.s1 + 1.2);
    tl.from('#scene1 .unit-label', { opacity: 0, duration: 0.6 }, T.s1 + 2.0);

    /* S2 본문은 헤드라인 직후 */
    tl.from('#scene2 .body', { opacity: 0, y: 16, duration: 0.8 }, T.s2 + 1.4);

    /* S3 키워드 살짝 강조 */
    tl.from('#scene3 .keyword', { scale: 0.96, duration: 1.2, ease: 'power1.out' }, T.s3 + 0.6);
    tl.from('#scene3 .text', { opacity: 0, y: 12, duration: 1.0 }, T.s3 + 2.0);

    /* S4 다이어그램은 헤드 이후 */
    tl.from('#scene4 .diagram', { opacity: 0, scale: 0.95, duration: 1.0 }, T.s4 + 1.2);
    tl.from('#scene4 .text', { opacity: 0, y: 12, duration: 0.8 }, T.s4 + 2.4);

    window.__timelines['story-unit04'] = tl;
    tl.play();
  </script>

  <!-- Audio button must come BEFORE the audio script so getElementById works -->
  <button id="audio-btn" style="
    position:fixed; bottom:20px; right:20px;
    background:rgba(0,0,0,0.6); color:#fff;
    border:1.5px solid rgba(255,255,255,0.3); border-radius:20px;
    padding:8px 20px; font-size:13px; cursor:pointer; z-index:200;
    font-family:-apple-system,sans-serif;
  ">🔊 음성 켜기</button>

  <script>
    const NARRATION = `3세기 알렉산드리아. 한 묘비 앞에서. 그의 묘비에는 한 편의 수수께끼가 새겨져 있었어요. 그의 일생이 방정식 안에 숨어 있었지요. 답을 알려면, 식을 풀어야 했어요. 모르는 수에 이름을 붙이자. 그 수를 x라고 부르고, 양쪽이 같다는 식을 세웁니다. 양변을 똑같이 다루며 답을 찾아가는 방법. 그가 수학에 남긴 가장 큰 선물이에요. x를 놓고, 식을 세우고, 양변을 같게 정리하며 답을 찾는 일. 일차방정식의 시작이 여기 있어요. 이 단원에서, 디오판토스를 만나봅시다.`;

    let _speaking = false;
    const btn = document.getElementById('audio-btn');

    function speak() {
      const utter = new SpeechSynthesisUtterance(NARRATION);
      utter.lang = 'ko-KR';
      utter.rate = 0.85;
      const voices = speechSynthesis.getVoices();
      const koVoice = voices.find(v => v.lang.startsWith('ko'));
      if (koVoice) utter.voice = koVoice;
      utter.onend = () => { _speaking = false; btn.textContent = '🔊 음성 켜기'; };
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
      _speaking = true;
      btn.textContent = '🔇 음성 끄기';
    }

    btn.addEventListener('click', function () {
      if (_speaking) {
        speechSynthesis.cancel();
        _speaking = false;
        btn.textContent = '🔊 음성 켜기';
      } else {
        tl.restart();
        if (speechSynthesis.getVoices().length > 0) {
          speak();
        } else {
          speechSynthesis.onvoiceschanged = () => { speak(); };
          speak();
        }
      }
    });
  </script>
  <script>
    (function(){
      function fit(){
        var s=Math.min(window.innerWidth/1280,window.innerHeight/720);
        if(s<1){
          document.body.style.transform='scale('+s+')';
          document.body.style.transformOrigin='top left';
          document.documentElement.style.overflow='hidden';
          document.documentElement.style.height=(720*s)+'px';
        }
      }
      fit();
      window.addEventListener('resize',fit);
    })();
  </script>
</body>
