  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
    }

    .stage {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }

    /* 모든 장면은 절대 좌표로 겹쳐서 fade로 전환 */
    .scene {
      position: absolute;
      inset: 0;
      width: 1280px;
      height: 720px;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 96px;
    }

    /* ─── Scene 1: 타이틀 ────────────────────────────── */
    .s1 .title {
      font-family: var(--font-serif);
      font-size: var(--title-size);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      text-align: center;
    }
    .s1 .era {
      margin-top: 16px;
      font-size: var(--subtitle-size);
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: none;
    }
    .s1 .unit-label {
      position: absolute;
      bottom: 48px;
      right: 64px;
      font-size: var(--caption-size);
      color: var(--accent);
      letter-spacing: 2px;
    }

    /* ─── Scene 2: 인물 등장 ─────────────────────────── */
    .s2 {
      flex-direction: row;
      gap: 56px;
      align-items: center;
      justify-content: center;
    }
    .s2 .visual {
      width: 360px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .s2 .visual svg {
      width: 100%;
      height: 100%;
    }
    .s2 .text {
      max-width: 560px;
      text-align: left;
    }
    .s2 .head {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.3;
      margin-bottom: 24px;
    }
    .s2 .body {
      font-size: var(--body-size);
      line-height: 1.65;
      color: var(--text);
    }

    /* ─── Scene 3: 결정적 순간 ───────────────────────── */
    .s3 {
      flex-direction: column;
      gap: 36px;
    }
    .s3 .metaphor {
      width: 480px;
      height: 320px;
      color: var(--accent);
    }
    .s3 .metaphor svg { width: 100%; height: 100%; }
    .s3 .keyword {
      font-family: var(--font-serif);
      font-size: 52px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .s3 .text {
      max-width: 880px;
      text-align: center;
      font-size: 26px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ─── Scene 4: 수학 연결 ─────────────────────────── */
    .s4 {
      gap: 28px;
    }
    .s4 .head {
      font-family: var(--font-serif);
      font-size: 38px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .s4 .diagram {
      width: 480px;
      height: 240px;
      color: var(--accent);
    }
    .s4 .diagram svg { width: 100%; height: 100%; }
    .s4 .text {
      max-width: 880px;
      text-align: center;
      font-size: 24px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ─── Scene 5: 마무리 ────────────────────────────── */
    .s5 {
      flex-direction: column;
      gap: 28px;
    }
    .s5 .text {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.5px;
    }
    .s5 .unit-mark {
      font-size: var(--subtitle-size);
      color: var(--accent);
      letter-spacing: 6px;
    }
  </style>
</head>

<body class="unit-05">
  <div
    id="root"
    class="stage"
    data-composition-id="story-unit05"
    data-start="0"
    data-duration="43"
    data-width="1280"
    data-height="720">

    <!-- ─── Scene 1: 타이틀 (0~5s) ─── -->
    <div class="scene s1" id="scene1">
      <div class="title">르네 데카르트</div>
      <div class="era">1637년 · 프랑스</div>
      <div class="unit-label">Unit 05 — 좌표와 그래프</div>
    </div>

    <!-- ─── Scene 2: 인물 등장 (5~15s) ─── -->
    <div class="scene s2" id="scene2">
      <div class="visual"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <path d="M50 22 L50 84"/>

</svg></div>
      <div class="text">
        <div class="head">침대 위의 철학자</div>
        <div class="body">어릴 적부터 몸이 약해 늦잠 자는 습관이 있었어요. 어느 날 침대에서 천장의 파리 한 마리를 보았지요.</div>
      </div>
    </div>

    <!-- ─── Scene 3: 결정적 순간 (15~32s) ─── -->
    <div class="scene s3" id="scene3">
      <div class="metaphor"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

      <div class="text">구석에서 가로 몇, 세로 몇. 단 두 숫자면 어떤 점이든 정확히 찍을 수 있다.</div>
    </div>

    <!-- ─── Scene 4: 수학 연결 (32~45s) ─── -->
    <div class="scene s4" id="scene4">
      <div class="head">오늘 우리는</div>
      <div class="diagram"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
  <rect x="8" y="40" width="84" height="20" fill="currentColor" fill-opacity="0.15" stroke="currentColor"/>
  <line x1="16" y1="40" x2="16" y2="48"/>

  <line x1="32" y1="40" x2="32" y2="46"/>

  <line x1="48" y1="40" x2="48" y2="46"/>
  <line x1="56" y1="40" x2="56" y2="46"/>
  <line x1="64" y1="40" x2="64" y2="48"/>

</svg></div>
      <div class="text">x와 y 두 축으로 위치를 정하고, 점과 선과 도형을 자유롭게 그립니다.</div>
    </div>

    <!-- ─── Scene 5: 마무리 (45~50s) ─── -->
    <div class="scene s5" id="scene5">
      <div class="text">이 단원에서, 데카르트를 만나봅시다</div>
      <div class="unit-mark">Unit 05 — 좌표와 그래프</div>
    </div>
  </div>

  <script>
    /* ─── GSAP 타임라인 (5장면 fade in/out) ─── */
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    /* 장면 절대 시간 — 실제 영상 길이에 비례 스케일링 (기준 50s) */
    const DUR = parseFloat(document.getElementById('root').dataset.duration) || 50;
    const SCALE = DUR / 51;  /* duration은 audio+1, 기준 50s 매핑 */
    const T = {
      s1: 0.0,
      s2: 5.0 * SCALE,
      s3: 15.0 * SCALE,
      s4: 32.0 * SCALE,
      s5: 45.0 * SCALE,
      end: 50.0 * SCALE,
    };

    /* Scene 1 in */
    tl.to('#scene1', { opacity: 1, duration: 0.8 }, T.s1);
    /* Scene 1 out / Scene 2 in (cross-fade at 5s) */
    tl.to('#scene1', { opacity: 0, duration: 0.8 }, T.s2 - 0.4);
    tl.to('#scene2', { opacity: 1, duration: 0.8 }, T.s2);

    /* Scene 2 → 3 */
    tl.to('#scene2', { opacity: 0, duration: 0.8 }, T.s3 - 0.4);
    tl.to('#scene3', { opacity: 1, duration: 0.8 }, T.s3);

    /* Scene 3 → 4 */
    tl.to('#scene3', { opacity: 0, duration: 0.8 }, T.s4 - 0.4);
    tl.to('#scene4', { opacity: 1, duration: 0.8 }, T.s4);

    /* Scene 4 → 5 */
    tl.to('#scene4', { opacity: 0, duration: 0.8 }, T.s5 - 0.4);
    tl.to('#scene5', { opacity: 1, duration: 0.8 }, T.s5);

    /* Final fade out */
    tl.to('#scene5', { opacity: 0, duration: 1.0 }, T.end - 1.0);

    /* 내부 요소 미세 모션 — 정적 영상 방지 */
    /* S1 부제는 살짝 늦게 등장 */
    tl.from('#scene1 .era', { opacity: 0, y: 12, duration: 0.8 }, T.s1 + 1.2);
    tl.from('#scene1 .unit-label', { opacity: 0, duration: 0.6 }, T.s1 + 2.0);

    /* S2 본문은 헤드라인 직후 */
    tl.from('#scene2 .body', { opacity: 0, y: 16, duration: 0.8 }, T.s2 + 1.4);

    /* S3 키워드 살짝 강조 */
    tl.from('#scene3 .keyword', { scale: 0.96, duration: 1.2, ease: 'power1.out' }, T.s3 + 0.6);
    tl.from('#scene3 .text', { opacity: 0, y: 12, duration: 1.0 }, T.s3 + 2.0);

    /* S4 다이어그램은 헤드 이후 */
    tl.from('#scene4 .diagram', { opacity: 0, scale: 0.95, duration: 1.0 }, T.s4 + 1.2);
    tl.from('#scene4 .text', { opacity: 0, y: 12, duration: 0.8 }, T.s4 + 2.4);

    window.__timelines['story-unit05'] = tl;
    tl.play();
  </script>

  <!-- Audio button must come BEFORE the audio script so getElementById works -->
  <button id="audio-btn" style="
    position:fixed; bottom:20px; right:20px;
    background:rgba(0,0,0,0.6); color:#fff;
    border:1.5px solid rgba(255,255,255,0.3); border-radius:20px;
    padding:8px 20px; font-size:13px; cursor:pointer; z-index:200;
    font-family:-apple-system,sans-serif;
  ">🔊 음성 켜기</button>

  <script>
    const NARRATION = `17세기 프랑스. 한 사람이 침대에 누워 천장을 봅니다. 어릴 적부터 몸이 약해, 늦잠을 자는 습관이 있었어요. 어느 날 침대에 누워, 천장을 기어가는 파리 한 마리를 보았지요. 이 파리의 위치를 어떻게 정확히 표현할까. 구석에서 가로 몇, 세로 몇. 단 두 숫자면 어떤 점도 찍을 수 있다. 그 순간 좌표평면이 태어났어요. x와 y, 두 축으로 위치를 정하고, 점과 선과 도형을 그립니다. 그가 침대에서 떠올린 생각 위에서. 이 단원에서, 데카르트를 만나봅시다.`;

    let _speaking = false;
    const btn = document.getElementById('audio-btn');

    function speak() {
      const utter = new SpeechSynthesisUtterance(NARRATION);
      utter.lang = 'ko-KR';
      utter.rate = 0.85;
      const voices = speechSynthesis.getVoices();
      const koVoice = voices.find(v => v.lang.startsWith('ko'));
      if (koVoice) utter.voice = koVoice;
      utter.onend = () => { _speaking = false; btn.textContent = '🔊 음성 켜기'; };
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
      _speaking = true;
      btn.textContent = '🔇 음성 끄기';
    }

    btn.addEventListener('click', function () {
      if (_speaking) {
        speechSynthesis.cancel();
        _speaking = false;
        btn.textContent = '🔊 음성 켜기';
      } else {
        tl.restart();
        if (speechSynthesis.getVoices().length > 0) {
          speak();
        } else {
          speechSynthesis.onvoiceschanged = () => { speak(); };
          speak();
        }
      }
    });
  </script>
  <script>
    (function(){
      function fit(){
        var s=Math.min(window.innerWidth/1280,window.innerHeight/720);
        if(s<1){
          document.body.style.transform='scale('+s+')';
          document.body.style.transformOrigin='top left';
          document.documentElement.style.overflow='hidden';
          document.documentElement.style.height=(720*s)+'px';
        }
      }
      fit();
      window.addEventListener('resize',fit);
    })();
  </script>
</body>
