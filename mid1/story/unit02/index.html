<!doctype html>
<!-- story-master.html — Story 영상 마스터 템플릿 v1. 명세: 90_video/_docs/STORY_VIDEO_GUIDE.md -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, height=720" />
  <title>브라마굽타 — Unit 02 — 정수와 유리수</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../_assets/palettes.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
    }

    .stage {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }

    /* 모든 장면은 절대 좌표로 겹쳐서 fade로 전환 */
    .scene {
      position: absolute;
      inset: 0;
      width: 1280px;
      height: 720px;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 96px;
    }

    /* ─── Scene 1: 타이틀 ────────────────────────────── */
    .s1 .title {
      font-family: var(--font-serif);
      font-size: var(--title-size);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      text-align: center;
    }
    .s1 .era {
      margin-top: 16px;
      font-size: var(--subtitle-size);
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: none;
    }
    .s1 .unit-label {
      position: absolute;
      bottom: 48px;
      right: 64px;
      font-size: var(--caption-size);
      color: var(--accent);
      letter-spacing: 2px;
    }

    /* ─── Scene 2: 인물 등장 ─────────────────────────── */
    .s2 {
      flex-direction: row;
      gap: 56px;
      align-items: center;
      justify-content: center;
    }
    .s2 .visual {
      width: 360px;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .s2 .visual svg {
      width: 100%;
      height: 100%;
    }
    .s2 .text {
      max-width: 560px;
      text-align: left;
    }
    .s2 .head {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.3;
      margin-bottom: 24px;
    }
    .s2 .body {
      font-size: var(--body-size);
      line-height: 1.65;
      color: var(--text);
    }

    /* ─── Scene 3: 결정적 순간 ───────────────────────── */
    .s3 {
      flex-direction: column;
      gap: 36px;
    }
    .s3 .metaphor {
      width: 480px;
      height: 320px;
      color: var(--accent);
    }
    .s3 .metaphor svg { width: 100%; height: 100%; }
    .s3 .keyword {
      font-family: var(--font-serif);
      font-size: 52px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .s3 .text {
      max-width: 880px;
      text-align: center;
      font-size: 26px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ─── Scene 4: 수학 연결 ─────────────────────────── */
    .s4 {
      gap: 28px;
    }
    .s4 .head {
      font-family: var(--font-serif);
      font-size: 38px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .s4 .diagram {
      width: 480px;
      height: 240px;
      color: var(--accent);
    }
    .s4 .diagram svg { width: 100%; height: 100%; }
    .s4 .text {
      max-width: 880px;
      text-align: center;
      font-size: 24px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ─── Scene 5: 마무리 ────────────────────────────── */
    .s5 {
      flex-direction: column;
      gap: 28px;
    }
    .s5 .text {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.5px;
    }
    .s5 .unit-mark {
      font-size: var(--subtitle-size);
      color: var(--accent);
      letter-spacing: 6px;
    }
  </style>
</head>

<body class="unit-02">
  <div
    id="root"
    class="stage"
    data-composition-id="story-unit02"
    data-start="0"
    data-duration="44"
    data-width="1280"
    data-height="720">

    <!-- ─── Scene 1: 타이틀 (0~5s) ─── -->
    <div class="scene s1" id="scene1">
      <div class="title">브라마굽타</div>
      <div class="era">628년 · 인도 라자스탄</div>
      <div class="unit-label">Unit 02 — 정수와 유리수</div>
    </div>

    <!-- ─── Scene 2: 인물 등장 (5~15s) ─── -->
    <div class="scene s2" id="scene2">
      <div class="visual"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 18 C20 12, 28 8, 36 12 L72 12 C80 8, 88 12, 88 18 L88 22 C88 28, 80 32, 72 28 L36 28 C28 32, 20 28, 20 22 Z" fill="currentColor" fill-opacity="0.18"/>
  <path d="M28 28 L28 72"/>
  <path d="M80 28 L80 72"/>
  <path d="M28 72 C28 78, 36 82, 44 78 L80 78"/>
  <path d="M40 40 L70 40"/>
  <path d="M40 50 L66 50"/>
  <path d="M40 60 L72 60"/>
</svg></div>
      <div class="text">
        <div class="head">0을 수로 받아들인 사람</div>
        <div class="body">그 전까지 '아무것도 없음'은 수가 아니었어요. 그는 이렇게 적었습니다 — 0은 수다.</div>
      </div>
    </div>

    <!-- ─── Scene 3: 결정적 순간 (15~32s) ─── -->
    <div class="scene s3" id="scene3">
      <div class="metaphor"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 50 C 20 32, 40 32, 50 50 C 60 68, 80 68, 80 50 C 80 32, 60 32, 50 50 C 40 68, 20 68, 20 50 Z"/>
  <circle cx="50" cy="50" r="3.5" fill="currentColor" stroke="none"/>
</svg></div>
      <div class="keyword">빚과 재산</div>
      <div class="text">재산을 양수, 빚을 음수로. 처음으로 음수의 덧셈·뺄셈을 적은 책.</div>
    </div>

    <!-- ─── Scene 4: 수학 연결 (32~45s) ─── -->
    <div class="scene s4" id="scene4">
      <div class="head">수직선 위에서</div>
      <div class="diagram"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <line x1="10" y1="50" x2="92" y2="50"/>
  <line x1="50" y1="92" x2="50" y2="10"/>
  <path d="M92 50 L86 47 L86 53 Z" fill="currentColor"/>
  <path d="M50 10 L47 16 L53 16 Z" fill="currentColor"/>
  <circle cx="68" cy="32" r="4" fill="currentColor"/>
  <line x1="50" y1="32" x2="68" y2="32" stroke-dasharray="2,3"/>
  <line x1="68" y1="50" x2="68" y2="32" stroke-dasharray="2,3"/>
  <text x="72" y="28" font-family="Noto Sans KR" font-size="9" fill="currentColor" stroke="none">P</text>
</svg></div>
      <div class="text">0을 중심으로 양쪽으로 무한히 펼쳐지는 수. 음수, 양수, 그리고 0.</div>
    </div>

    <!-- ─── Scene 5: 마무리 (45~50s) ─── -->
    <div class="scene s5" id="scene5">
      <div class="text">이 단원에서, 브라마굽타를 만나봅시다</div>
      <div class="unit-mark">Unit 02 — 정수와 유리수</div>
    </div>
  </div>

  <script>
    /* ─── GSAP 타임라인 (5장면 fade in/out) ─── */
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    /* 장면 절대 시간 — 실제 영상 길이에 비례 스케일링 (기준 50s) */
    const DUR = parseFloat(document.getElementById('root').dataset.duration) || 50;
    const SCALE = DUR / 51;  /* duration은 audio+1, 기준 50s 매핑 */
    const T = {
      s1: 0.0,
      s2: 5.0 * SCALE,
      s3: 15.0 * SCALE,
      s4: 32.0 * SCALE,
      s5: 45.0 * SCALE,
      end: 50.0 * SCALE,
    };

    /* Scene 1 in */
    tl.to('#scene1', { opacity: 1, duration: 0.8 }, T.s1);
    /* Scene 1 out / Scene 2 in (cross-fade at 5s) */
    tl.to('#scene1', { opacity: 0, duration: 0.8 }, T.s2 - 0.4);
    tl.to('#scene2', { opacity: 1, duration: 0.8 }, T.s2);

    /* Scene 2 → 3 */
    tl.to('#scene2', { opacity: 0, duration: 0.8 }, T.s3 - 0.4);
    tl.to('#scene3', { opacity: 1, duration: 0.8 }, T.s3);

    /* Scene 3 → 4 */
    tl.to('#scene3', { opacity: 0, duration: 0.8 }, T.s4 - 0.4);
    tl.to('#scene4', { opacity: 1, duration: 0.8 }, T.s4);

    /* Scene 4 → 5 */
    tl.to('#scene4', { opacity: 0, duration: 0.8 }, T.s5 - 0.4);
    tl.to('#scene5', { opacity: 1, duration: 0.8 }, T.s5);

    /* Final fade out */
    tl.to('#scene5', { opacity: 0, duration: 1.0 }, T.end - 1.0);

    /* 내부 요소 미세 모션 — 정적 영상 방지 */
    /* S1 부제는 살짝 늦게 등장 */
    tl.from('#scene1 .era', { opacity: 0, y: 12, duration: 0.8 }, T.s1 + 1.2);
    tl.from('#scene1 .unit-label', { opacity: 0, duration: 0.6 }, T.s1 + 2.0);

    /* S2 본문은 헤드라인 직후 */
    tl.from('#scene2 .body', { opacity: 0, y: 16, duration: 0.8 }, T.s2 + 1.4);

    /* S3 키워드 살짝 강조 */
    tl.from('#scene3 .keyword', { scale: 0.96, duration: 1.2, ease: 'power1.out' }, T.s3 + 0.6);
    tl.from('#scene3 .text', { opacity: 0, y: 12, duration: 1.0 }, T.s3 + 2.0);

    /* S4 다이어그램은 헤드 이후 */
    tl.from('#scene4 .diagram', { opacity: 0, scale: 0.95, duration: 1.0 }, T.s4 + 1.2);
    tl.from('#scene4 .text', { opacity: 0, y: 12, duration: 0.8 }, T.s4 + 2.4);

    window.__timelines['story-unit02'] = tl;
    tl.play();
  </script>
</body>
</html>
