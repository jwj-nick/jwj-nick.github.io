    .s2 .text {
      max-width: 560px;
      text-align: left;
    }
    .s2 .head {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.3;

    /* ─── Scene 3: 결정적 순간 ───────────────────────── */

    /* ─── Scene 4: 수학 연결 ─────────────────────────── */

    }
    .s5 .unit-mark {
      font-size: var(--subtitle-size);
      color: var(--accent);

  </style>

<body class="unit-09">
  <div
    id="root"
    class="stage"
    data-composition-id="story-unit09"
    data-start="0"
    data-duration="46"
    data-width="1280"
    data-height="720">

    <!-- ─── Scene 1: 타이틀 (0~5s) ─── -->
    <div class="scene s1" id="scene1">
      <div class="title">카를 가우스</div>
      <div class="era">1796년 · 독일 괴팅겐</div>
      <div class="unit-label">Unit 09 — 다각형</div>
    </div>

    <!-- ─── Scene 2: 인물 등장 (5~15s) ─── -->
    <div class="scene s2" id="scene2">
      <div class="visual"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <path d="M50 22 L50 84"/>
  <path d="M50 22 C40 16, 22 16, 14 20 L14 78 C22 74, 40 74, 50 80" fill="currentColor" fill-opacity="0.12"/>
  <path d="M50 22 C60 16, 78 16, 86 20 L86 78 C78 74, 60 74, 50 80" fill="currentColor" fill-opacity="0.12"/>
  <path d="M22 32 L40 32"/>

</svg></div>

        <div class="body">어릴 적 선생님이 1부터 100까지 더하라 하자, 그는 1분 만에 답을 했어요. 짝을 지어 더하면 5050이에요.</div>

    <div class="scene s3" id="scene3">

  <path d="M50 10 L50 50 L14 30"/>

      <div class="diagram"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <path d="M50 6 L61 38 L95 38 L67 58 L78 92 L50 72 L22 92 L33 58 L5 38 L39 38 Z"/>
</svg></div>
      <div class="text">삼각형, 사각형, 오각형… 변의 수에 따라 펼쳐지는 다각형의 세계를 만납니다.</div>
    </div>

    <!-- ─── Scene 5: 마무리 (45~50s) ─── -->
    <div class="scene s5" id="scene5">
      <div class="text">이 단원에서, 가우스를 만나봅시다</div>
      <div class="unit-mark">Unit 09 — 다각형</div>
    </div>
  </div>

  <script>
    /* ─── GSAP 타임라인 (5장면 fade in/out) ─── */
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    /* 장면 절대 시간 — 실제 영상 길이에 비례 스케일링 (기준 50s) */
    const DUR = parseFloat(document.getElementById('root').dataset.duration) || 50;
    const SCALE = DUR / 51;  /* duration은 audio+1, 기준 50s 매핑 */
    const T = {
      s1: 0.0,
      s2: 5.0 * SCALE,
      s3: 15.0 * SCALE,
      s4: 32.0 * SCALE,
      s5: 45.0 * SCALE,
      end: 50.0 * SCALE,
    };

    /* Scene 1 in */
    tl.to('#scene1', { opacity: 1, duration: 0.8 }, T.s1);
    /* Scene 1 out / Scene 2 in (cross-fade at 5s) */
    tl.to('#scene1', { opacity: 0, duration: 0.8 }, T.s2 - 0.4);
    tl.to('#scene2', { opacity: 1, duration: 0.8 }, T.s2);

    /* Scene 2 → 3 */
    tl.to('#scene2', { opacity: 0, duration: 0.8 }, T.s3 - 0.4);
    tl.to('#scene3', { opacity: 1, duration: 0.8 }, T.s3);

    /* Scene 3 → 4 */
    tl.to('#scene3', { opacity: 0, duration: 0.8 }, T.s4 - 0.4);
    tl.to('#scene4', { opacity: 1, duration: 0.8 }, T.s4);

    /* Scene 4 → 5 */
    tl.to('#scene4', { opacity: 0, duration: 0.8 }, T.s5 - 0.4);
    tl.to('#scene5', { opacity: 1, duration: 0.8 }, T.s5);

    /* Final fade out */
    tl.to('#scene5', { opacity: 0, duration: 1.0 }, T.end - 1.0);

    /* 내부 요소 미세 모션 — 정적 영상 방지 */
    /* S1 부제는 살짝 늦게 등장 */
    tl.from('#scene1 .era', { opacity: 0, y: 12, duration: 0.8 }, T.s1 + 1.2);
    tl.from('#scene1 .unit-label', { opacity: 0, duration: 0.6 }, T.s1 + 2.0);

    /* S2 본문은 헤드라인 직후 */
    tl.from('#scene2 .body', { opacity: 0, y: 16, duration: 0.8 }, T.s2 + 1.4);

    /* S3 키워드 살짝 강조 */
    tl.from('#scene3 .keyword', { scale: 0.96, duration: 1.2, ease: 'power1.out' }, T.s3 + 0.6);
    tl.from('#scene3 .text', { opacity: 0, y: 12, duration: 1.0 }, T.s3 + 2.0);

    /* S4 다이어그램은 헤드 이후 */
    tl.from('#scene4 .diagram', { opacity: 0, scale: 0.95, duration: 1.0 }, T.s4 + 1.2);
    tl.from('#scene4 .text', { opacity: 0, y: 12, duration: 0.8 }, T.s4 + 2.4);

    window.__timelines['story-unit09'] = tl;
    tl.play();
  </script>

  <!-- Audio button must come BEFORE the audio script so getElementById works -->
  <button id="audio-btn" style="
    position:fixed; bottom:20px; right:20px;
    background:rgba(0,0,0,0.6); color:#fff;
    border:1.5px solid rgba(255,255,255,0.3); border-radius:20px;
    padding:8px 20px; font-size:13px; cursor:pointer; z-index:200;
    font-family:-apple-system,sans-serif;
  ">🔊 음성 켜기</button>

  <script>
    const NARRATION = `18세기 독일. 열아홉 살의 한 청년이 잠 못 들어 했습니다. 어릴 적 선생님이 1부터 100까지 더하라 하자, 그는 1분 만에 답했어요. 짝을 지어 더하면 5050. 그는 이미 수학의 황태자였습니다. 2천 년 동안 아무도 풀지 못한 문제가 있었어요. 정17각형을 자와 컴퍼스만으로 그릴 수 있을까. 19살의 그는, 어느 새벽 그 길을 찾아냈어요. 삼각형, 사각형, 오각형. 변의 수에 따라 펼쳐지는 다각형의 세계. 그가 사랑한 도형들의 이야기에요. 이 단원에서, 가우스를 만나봅시다.`;

    let _speaking = false;
    const btn = document.getElementById('audio-btn');

    function speak() {
      const utter = new SpeechSynthesisUtterance(NARRATION);
      utter.lang = 'ko-KR';
      utter.rate = 0.85;
      const voices = speechSynthesis.getVoices();
      const koVoice = voices.find(v => v.lang.startsWith('ko'));
      if (koVoice) utter.voice = koVoice;
      utter.onend = () => { _speaking = false; btn.textContent = '🔊 음성 켜기'; };
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
      _speaking = true;
      btn.textContent = '🔇 음성 끄기';
    }

    btn.addEventListener('click', function () {
      if (_speaking) {
        speechSynthesis.cancel();
        _speaking = false;
        btn.textContent = '🔊 음성 켜기';
      } else {
        tl.restart();
        if (speechSynthesis.getVoices().length > 0) {
          speak();
        } else {
          speechSynthesis.onvoiceschanged = () => { speak(); };
          speak();
        }
      }
    });
  </script>
